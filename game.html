        // 绘制Boss导弹尾焰动画（使用精灵图）
        function drawBossMissileTail(missile) {
            // 优先使用精灵图，回退到序列帧
            const sprite = assets.missileTailSprite;
            const spriteData = assets.missileTailSpriteData;

            // 调试日志
            if (!window.tailDebugLogged) {
                console.log('导弹尾焰绘制检查:', {
                    spriteComplete: sprite.complete,
                    spriteWidth: sprite.naturalWidth,
                    hasSpriteData: !!spriteData,
                    framesCount: spriteData ? Object.keys(spriteData.frames).length : 0,
                    missileRiseStartTime: missile.riseStartTime
                });
                window.tailDebugLogged = true;
            }
            
            // 每100帧输出一次调试信息
            if (!window.tailDebugCounter) window.tailDebugCounter = 0;
            window.tailDebugCounter++;
            if (window.tailDebugCounter % 100 === 0) {
                console.log('尾焰绘制状态:', {
                    spriteComplete: sprite.complete,
                    spriteWidth: sprite.naturalWidth,
                    hasSpriteData: !!spriteData
                });
            }

            if (spriteData && sprite.complete && sprite.naturalWidth > 0) {
                // 使用精灵图渲染
                const frames = Object.keys(spriteData.frames);
                const tailElapsed = Date.now() - missile.riseStartTime;
                const tailFrameIndex = Math.floor((tailElapsed / 50) % frames.length);
                const frameName = frames[tailFrameIndex];
                const frameData = spriteData.frames[frameName];

                if (frameData) {
                    ctx.save();
                    ctx.globalAlpha = 0.5;
                    const tailScale = 0.345; // 缩放比例（0.3 * 1.15 = 0.345，放大15%）
                    const frame = frameData.frame;
                    const tailWidth = frame.w * tailScale;
                    const tailHeight = frame.h * tailScale;
                    // 尾焰应该显示在导弹尾部（下方），调整位置
                    const tailY = missile.height/2 + 20; // 导弹尾部下方

                    // 调试日志
                    if (!window.tailDrawDebugLogged) {
                        console.log('尾焰绘制参数:', {
                            frame: frame,
                            tailWidth: tailWidth,
                            tailHeight: tailHeight,
                            tailY: tailY,
                            missileHeight: missile.height
                        });
                        window.tailDrawDebugLogged = true;
                    }

                    ctx.drawImage(
                        sprite,
                        frame.x, frame.y, frame.w, frame.h,
                        -tailWidth/2, tailY, tailWidth, tailHeight
                    );
                    ctx.restore();
                }
            } else if (assets.missileTailFrames.length > 0) {
                // 回退到序列帧
                const tailFrames = assets.missileTailFrames;
                const tailElapsed = Date.now() - missile.riseStartTime;
                const tailFrameIndex = Math.floor((tailElapsed / 50) % tailFrames.length);
                const tailFrame = tailFrames[tailFrameIndex];

                if (tailFrame && tailFrame.complete && tailFrame.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.5;
                    const tailScale = 0.5;
                    const tailWidth = tailFrame.naturalWidth * tailScale;
                    const tailHeight = tailFrame.naturalHeight * tailScale;
                    const tailOffsetY = 350;
                    const tailY = -missile.height/2 - tailHeight + tailOffsetY;
                    ctx.drawImage(tailFrame, -tailWidth/2, tailY, tailWidth, tailHeight);
                    ctx.restore();
                }
            }
        }

        // 绘制Boss激光
        function drawBossLaser() {
            // 绘制激光预警（红外线瞄准，一闪而过）
            if (boss.laserWarning) {
                const warningElapsed = Date.now() - boss.laserWarningStartTime;
                // 前140ms显示红色瞄准线，一闪而过（与预警时间210ms成比例）
                if (warningElapsed < 140) {
                    const laserX = boss.x + boss.width / 2;
                    const bossCenterY = boss.y + boss.height / 2;

                    // 绘制渐变红线（从中心向两侧渐变消失）
                    ctx.save();
                    const lineWidth = 16; // 加粗线条
                    const halfWidth = lineWidth / 2;

                    // 创建水平渐变（从中心向两侧渐变）
                    const gradient = ctx.createLinearGradient(laserX - halfWidth, 0, laserX + halfWidth, 0);
                    gradient.addColorStop(0, 'rgba(255, 0, 0, 0)');     // 左侧透明
                    gradient.addColorStop(0.3, 'rgba(255, 0, 0, 0.8)');  // 左侧过渡
                    gradient.addColorStop(0.5, 'rgba(255, 0, 0, 1)');    // 中心最亮
                    gradient.addColorStop(0.7, 'rgba(255, 0, 0, 0.8)');  // 右侧过渡
                    gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');     // 右侧透明

                    ctx.fillStyle = gradient;
                    ctx.fillRect(laserX - halfWidth, 0, lineWidth, bossCenterY);
                    ctx.restore();
                }
                return;
            }
            
            if (!boss.laserActive) return;
            
            const laserX = boss.x + boss.width / 2;
            const laserWidth = 608; // 激光碰撞宽度与贴图显示宽度一致
            
            // 使用序列帧动画绘制激光
            const frames = assets.bossLaserFrames;
            if (frames.length > 0) {
                // 根据激光持续时间计算当前帧
                const laserElapsed = Date.now() - boss.laserStartTime;
                const frameIndex = Math.min(
                    Math.floor((laserElapsed / boss.laserDuration) * frames.length),
                    frames.length - 1
                );
                const currentFrame = frames[frameIndex];
                
                if (currentFrame && currentFrame.complete && currentFrame.naturalWidth > 0) {
                    // 激光贴图尺寸：608*1080
                    const laserImgWidth = currentFrame.naturalWidth;
                    const laserImgHeight = currentFrame.naturalHeight;
                    const targetWidth = 608; // 目标显示宽度
                    const targetHeight = 1080; // 目标显示高度
                    
                    // 激光从Boss中心点向上发射
                    // Boss中心点位置
                    const bossCenterX = boss.x + boss.width / 2;
                    const bossCenterY = boss.y + boss.height / 2;
                    
                    // 绘制激光（垂直向上）
                    ctx.save();
                    // 移动到Boss中心点位置
                    ctx.translate(bossCenterX, bossCenterY);
                    // 旋转180度使激光向上
                    ctx.rotate(Math.PI);
                    ctx.drawImage(
                        currentFrame,
                        -targetWidth / 2,
                        0,
                        targetWidth,
                        targetHeight
                    );
                    ctx.restore();
                }
            }
            
            // 检查激光与玩家碰撞（延迟280ms后开始判定，等激光完全射出来）
            const laserElapsed = Date.now() - boss.laserStartTime;
            const collisionDelay = 280; // 延迟280ms开始判定
            const collisionEndTime = 1500; // 判定结束时间提前到1500ms（总时长2000ms）
            if (laserElapsed >= collisionDelay && laserElapsed <= collisionEndTime &&
                player.x + player.width / 2 > laserX - laserWidth / 2 &&
                player.x + player.width / 2 < laserX + laserWidth / 2) {
                // 检查护盾效果
                if (player.shield && player.shield.active) {
                    // 护盾激活，免疫伤害
                } else {
                    // Boss激光-20点生命值
                    hp -= 20;
                }

                // 启动HP动画
                hpAnimation.active = true;
                hpAnimation.startTime = Date.now();
                hpAnimation.fromHp = hpAnimation.displayHp;
                hpAnimation.toHp = hp;

                triggerDamageFlash();

                // 使用玩家死亡爆炸动画（参考Boss失败的爆炸动画）
                if (hp <= 0 && !playerDefeatState.active) {
                    // 检查是否可以触发致命伤害免疫
                    if (!checkFatalDamageImmunity()) {
                        playerDefeated();
                    }
                }
            }
        }

        // 激活护盾效果
        function activateShield() {
            if (!player.shield) {
                player.shield = { active: false, startTime: 0, duration: 3000 };
            }
            player.shield.active = true;
            player.shield.startTime = Date.now();
            
            // 全屏攻击所有潜艇1次
            performScreenClearAttack();
        }
        
        // 全屏攻击所有潜艇
        function performScreenClearAttack() {
            // 对所有潜艇造成伤害
            for (let i = submarines.length - 1; i >= 0; i--) {
                const sub = submarines[i];
                const baseScore = sub.isGold ? 100 : 10; // 稀有潜艇100分，普通潜艇10分
                const multiplier = getComboMultiplier();
                const scoreValue = Math.floor(baseScore * multiplier);
                createExplosion(sub.x + sub.width / 2, sub.y + sub.height / 2, false, scoreValue);
                submarines.splice(i, 1);
                score += scoreValue;
                triggerCombo(); // 触发连击
            }
        }
        
        // 更新护盾状态
        function updateShield() {
            if (player.shield && player.shield.active) {
                const elapsed = Date.now() - player.shield.startTime;
                if (elapsed >= player.shield.duration) {
                    player.shield.active = false;
                }
            }
        }

        // 检查并触发致命伤害免疫（2级血量技能）
        function checkFatalDamageImmunity() {
            // 只有2级血量且未使用过免疫效果时才触发
            if (player.skillLevels.hp >= 2 && !player.fatalDamageImmunity.used) {
                player.fatalDamageImmunity.used = true;
                hp = player.fatalDamageImmunity.hpRestore;

                // 显示免疫伤害提示气泡
                immunityBubble.active = true;
                immunityBubble.startTime = Date.now();

                // 激活蓝色护盾效果
                activateShield();

                return true; // 免疫生效
            }
            return false; // 免疫未生效
        }

        // 更新免疫伤害提示气泡
        function updateImmunityBubble() {
            if (immunityBubble.active) {
                const elapsed = Date.now() - immunityBubble.startTime;
                if (elapsed >= immunityBubble.duration) {
                    immunityBubble.active = false;
                }
            }
        }
        
        // 更新连击状态
        function updateCombo() {
            if (comboSystem.active) {
                const elapsed = Date.now() - comboSystem.lastKillTime;
                if (elapsed >= comboSystem.timeout) {
                    // 超过1秒没有新击毁，退出连击状态
                    comboSystem.active = false;
                    comboSystem.count = 0;
                }
            }
        }
        
        // 触发连击（击毁潜艇时调用）
        function triggerCombo() {
            const now = Date.now();
            
            if (!comboSystem.active) {
                // 首次进入连击状态
                comboSystem.active = true;
                comboSystem.count = 1;
                comboSystem.displayCount = 1;
                comboSystem.animationQueue = [];
            } else {
                // 继续连击
                const elapsed = now - comboSystem.lastKillTime;
                if (elapsed < comboSystem.timeout) {
                    comboSystem.count++;
                    // 将目标数字加入动画队列
                    comboSystem.animationQueue.push(comboSystem.count);
                } else {
                    // 超时，重新开始连击
                    comboSystem.count = 1;
                    comboSystem.displayCount = 1;
                    comboSystem.animationQueue = [];
                }
            }
            
            // 更新最高连击数
            if (comboSystem.count > comboSystem.maxCount) {
                comboSystem.maxCount = comboSystem.count;
                console.log('更新最高连击数:', comboSystem.maxCount);
            }

            comboSystem.lastKillTime = now;
        }
        
        // 更新连击数字动画
        function updateComboAnimation() {
            if (comboSystem.animationQueue.length > 0 && !comboSystem.animating) {
                // 开始新的数字动画
                comboSystem.animating = true;
                comboSystem.animationStartTime = Date.now();
                // 动态计算每个数字的动画时长，确保总时长不超过1秒
                comboSystem.stepDuration = Math.min(
                    comboSystem.animationDuration / comboSystem.animationQueue.length,
                    200 // 每个数字最多200ms
                );
            }
            
            if (comboSystem.animating) {
                const elapsed = Date.now() - comboSystem.animationStartTime;
                const stepDuration = comboSystem.stepDuration || 200;
                const totalSteps = comboSystem.animationQueue.length;
                
                // 计算当前应该显示到第几个数字
                const currentStep = Math.min(Math.floor(elapsed / stepDuration), totalSteps);
                const stepProgress = (elapsed % stepDuration) / stepDuration;
                
                // 使用缓动函数
                const easeProgress = 1 - Math.pow(1 - stepProgress, 3);
                
                if (currentStep >= totalSteps) {
                    // 动画完成，显示最终数字
                    comboSystem.displayCount = comboSystem.animationQueue[totalSteps - 1] || comboSystem.displayCount;
                    comboSystem.animationQueue = []; // 清空队列
                    comboSystem.animating = false;
                } else {
                    // 在当前步骤内插值
                    const startCount = currentStep === 0 ? comboSystem.displayCount : comboSystem.animationQueue[currentStep - 1];
                    const targetCount = comboSystem.animationQueue[currentStep];
                    comboSystem.displayCount = startCount + (targetCount - startCount) * easeProgress;
                }
            }
        }
        
        // 获取连击倍率（1.5表示+50%）
        function getComboMultiplier() {
            return comboSystem.active && comboSystem.count >= 2 ? 1.5 : 1.0;
        }

        function updatePlayer() {
            // 生命值归0时，不能移动
            if (hp <= 0) {
                // 减速到停止
                const deceleration = player.maxSpeed * 0.2;
                if (player.velocityX > 0) {
                    player.velocityX = Math.max(player.velocityX - deceleration, 0);
                } else if (player.velocityX < 0) {
                    player.velocityX = Math.min(player.velocityX + deceleration, 0);
                }
                player.x += player.velocityX;
                return;
            }

            // 目标速度计算
            let targetVelocityX = 0;
            if (keys.ArrowLeft && player.x > 0) {
                targetVelocityX = -player.maxSpeed;
            }
            if (keys.ArrowRight && player.x < canvas.width - player.width) {
                targetVelocityX = player.maxSpeed;
            }
            
            // 缓动动画：平滑过渡到目标速度
            const acceleration = player.maxSpeed * 0.15; // 加速度
            const deceleration = player.maxSpeed * 0.1;  // 减速度
            
            if (targetVelocityX !== 0) {
                // 加速阶段
                if (player.velocityX < targetVelocityX) {
                    player.velocityX = Math.min(player.velocityX + acceleration, targetVelocityX);
                } else if (player.velocityX > targetVelocityX) {
                    player.velocityX = Math.max(player.velocityX - acceleration, targetVelocityX);
                }
            } else {
                // 减速阶段（停止时的缓动）
                if (player.velocityX > 0) {
                    player.velocityX = Math.max(player.velocityX - deceleration, 0);
                } else if (player.velocityX < 0) {
                    player.velocityX = Math.min(player.velocityX + deceleration, 0);
                }
            }
            
            // 应用速度
            player.x += player.velocityX;
            
            // 边界检查
            if (player.x < 0) {
                player.x = 0;
                player.velocityX = 0;
            }
            if (player.x > canvas.width - player.width) {
                player.x = canvas.width - player.width;
                player.velocityX = 0;
            }
        }

        function updateMines() {
            for (let i = mines.length - 1; i >= 0; i--) {
                const mine = mines[i];
                mine.y += mine.speed;
                
                // 分裂水雷逻辑：下降200距离后分裂为两个
                if (mine.isSplitMine && !mine.hasSplit && mine.y > player.y + player.height + 200) {
                    mine.hasSplit = true;
                    // 在原水雷位置创建两个新的水雷，向左右分开
                    mines.push({
                        x: mine.x - 30,
                        y: mine.y,
                        width: 60,
                        height: 61,
                        speed: mine.speed,
                        isSplitMine: false,
                        hasSplit: false,
                        vx: -2 // 向左偏移
                    });
                    mines.push({
                        x: mine.x + 30,
                        y: mine.y,
                        width: 60,
                        height: 61,
                        speed: mine.speed,
                        isSplitMine: false,
                        hasSplit: false,
                        vx: 2 // 向右偏移
                    });
                    // 移除原水雷
                    mines.splice(i, 1);
                    continue;
                }
                
                // 应用水平速度（用于分裂后的水雷）
                if (mine.vx) {
                    mine.x += mine.vx;
                }
                
                if (mine.y > canvas.height) {
                    mines.splice(i, 1);
                }
            }
        }

        function updateSubmarines() {
            const speed = getSubmarineSpeed();
            const missileCooldown = getMissileCooldown();
            const missileChance = getMissileChance();
            
            for (let i = submarines.length - 1; i >= 0; i--) {
                const sub = submarines[i];
                // 金色潜艇更慢(0.7倍)，普通潜艇更快
                // 橘色潜艇(subType=0)比灰色潜艇(subType=1)快10%
                let subSpeed;
                if (sub.isGold) {
                    subSpeed = speed * 0.7;
                } else {
                    const typeMultiplier = sub.subType === 0 ? 1.32 : 1.2; // 橘色潜艇快10%
                    subSpeed = speed * typeMultiplier;
                }
                sub.x -= subSpeed;

                if (sub.x < -240) {
                    // Boss出场或被击败后，潜艇移出画面即删除，不再刷新
                    submarines.splice(i, 1);
                }

                // 发射导弹 - 使用动态难度，限制屏幕上最多8枚导弹
                // Boss出场后潜艇不再发射导弹
                if (!boss.active && !sub.isGold && missiles.length < 8 && Date.now() - sub.lastMissileTime > missileCooldown) {
                    if (Math.random() < missileChance) {
                        fireMissile(sub);
                        sub.lastMissileTime = Date.now();
                    }
                }
            }

            // Boss出场后或被击败后，不再生成敌方小潜艇
            if (!boss.active && !bossDefeatState.showBubble) {
                // 动态补充潜艇 - 根据分数增加密度，但限制最大数量
                const targetSubCount = Math.min(6 + Math.floor(score / 6), 14); // 最多14艘，增长更快
                const normalSubCount = submarines.filter(s => !s.isGold).length;
                if (normalSubCount < targetSubCount) {
                    if (Math.random() < 0.02) { // 2%概率每帧补充
                        spawnNewSubmarine();
                    }
                }

                // 生成金色潜艇
                if (score >= 5 && !submarines.some(s => s.isGold)) {
                    if (Date.now() % 10000 < 50) { // 每10秒检查一次
                        spawnGoldSubmarine();
                    }
                }
            }
        }
        
        function spawnNewSubmarine() {
            let x = canvas.width + 150;
            let y = 680 + Math.random() * 320;
            const subType = Math.random() > 0.5 ? 1 : 0; // 随机选择普通潜艇类型
            // 橘色潜艇 192*72，银色潜艇 192*80
            const width = 192;
            const height = subType === 1 ? 80 : 72;
            
            // 尝试找到不重叠的位置（最多尝试10次）
            let attempts = 0;
            while (isOverlapping(x, y, width, height) && attempts < 10) {
                y = 680 + Math.random() * 320;
                attempts++;
            }
            
            // 如果找到合适位置才生成
            if (!isOverlapping(x, y, width, height)) {
                submarines.push({
                    x: x,
                    y: y,
                    width: width,
                    height: height,
                    id: 'sub_' + Date.now(),
                    isGold: false,
                    subType: subType,
                    lastMissileTime: 0,
                    hitEffect: { active: false, startTime: 0, shakeOffset: { x: 0, y: 0 } },
                    recoilEffect: { active: false, startTime: 0, offsetY: 0 }
                });
            }
        }

        function fireMissile(sub) {
            // 导弹先斜向发射，然后转为垂直
            const direction = Math.random() > 0.5 ? 1 : -1;
            missiles.push({
                x: sub.x + sub.width / 2,
                y: sub.y,
                width: 20, // 素材旋转90度后的宽度
                height: 104, // 素材旋转90度后的高度
                phase: 'diagonal', // diagonal, vertical
                direction: direction,
                startY: sub.y,
                targetHeight: sub.y - 150,
                startTime: Date.now() // 导弹发射时间，用于尾焰动画
            });
            
            // 创建导弹发射气泡特效
            // 位置在潜艇驾驶室右侧（潜艇上方偏右）
            const bubbleX = sub.x + sub.width * 0.6; // 驾驶室右侧
            const bubbleY = sub.y - 10; // 潜艇上方
            createMissileLaunchBubble(bubbleX, bubbleY, sub.id);
            
            // 触发潜艇后坐力效果（向下震动）
            sub.recoilEffect.active = true;
            sub.recoilEffect.startTime = Date.now();
        }
        
        // 创建导弹发射气泡特效
        function createMissileLaunchBubble(x, y, subId) {
            missileLaunchBubbles.push({
                x: x,
                y: y,
                subId: subId, // 关联的潜艇ID，用于跟随移动
                startTime: Date.now(),
                duration: 1000 // 动画总时长1秒
            });
        }
        
        // 更新导弹发射气泡特效
        function updateMissileLaunchBubbles() {
            for (let i = missileLaunchBubbles.length - 1; i >= 0; i--) {
                const bubble = missileLaunchBubbles[i];
                const elapsed = Date.now() - bubble.startTime;
                
                // 动画结束，移除
                if (elapsed >= bubble.duration) {
                    missileLaunchBubbles.splice(i, 1);
                    continue;
                }
                
                // 查找关联的潜艇，更新位置（跟随潜艇移动）
                const sub = submarines.find(s => s.id === bubble.subId);
                if (sub) {
                    bubble.x = sub.x + sub.width * 0.6;
                    bubble.y = sub.y - 10;
                }
            }
        }

        function updateMissiles() {
            const missileSpeed = 2.21 * getDifficultyMultiplier(); // 基础速度加快20%
            const waterLevelY = 274; // 水平面Y坐标
            
            for (let i = missiles.length - 1; i >= 0; i--) {
                const missile = missiles[i];
                const prevY = missile.y; // 记录上一帧的Y坐标
                
                if (missile.phase === 'diagonal') {
                    // 45度斜向移动：direction为1时向左上，-1时向右上
                    missile.x += missile.direction * missileSpeed * 0.7;
                    missile.y -= missileSpeed * 0.7;
                    if (missile.y <= missile.targetHeight) {
                        // 转为垂直阶段，以导弹尾部为圆点调整位置
                        missile.phase = 'vertical';
                        // 45度时，导弹尾部相对于中心点的偏移
                        // 导弹朝左上或右上运动，direction为1或-1
                        // 以尾部为圆点，需要调整位置使尾部保持在原位
                        const tailOffsetX = missile.direction * missile.height / 2 * Math.sin(Math.PI / 4);
                        const tailOffsetY = missile.height / 2 * (1 - Math.cos(Math.PI / 4));
                        missile.x += tailOffsetX;
                        missile.y += tailOffsetY;
                    }
                } else {
                    missile.y -= missileSpeed * 0.9;
                }
                
                // 检测导弹是否飞出海平面（从水下到水上）
                const wasBelowWater = prevY + missile.height > waterLevelY;
                const isAboveWater = missile.y < waterLevelY;
                
                if (wasBelowWater && isAboveWater && !missile.splashCreated) {
                    // 导弹飞出海平面，创建浪花特效
                    createWaterSplash(missile.x + missile.width / 2, waterLevelY);
                    missile.splashCreated = true; // 标记已创建浪花，避免重复创建
                }

                // 延迟移除导弹，让尾焰有足够时间显示（从-50改为-200）
                if (missile.y < -200) {
                    missiles.splice(i, 1);
                }
            }
        }
        
        // 创建海面浪花特效
        function createWaterSplash(x, y) {
            // 根据当前场景决定使用哪种浪花特效
            const isNightOrBoss = isNightScene || boss.active || bossDefeatState.showBubble;
            waterSplashes.push({
                x: x,
                y: y,
                startTime: Date.now(),
                duration: 700, // 0.7秒播放完（加快30%）
                frameIndex: 0,
                isNight: isNightOrBoss // 记录创建时的场景类型
            });
        }

        // 激光产生的浪花特效（持续时间减少30%，大小增加20%）
        function createLaserWaterSplash(x, y) {
            // 根据当前场景决定使用哪种浪花特效
            const isNightOrBoss = isNightScene || boss.active || bossDefeatState.showBubble;
            waterSplashes.push({
                x: x,
                y: y,
                startTime: Date.now(),
                duration: 490, // 0.49秒播放完（比正常减少30%）
                frameIndex: 0,

                scale: 1.2 // 大小增加20%
            });

        // Boss子弹产生的浪花特效（大小为原大小的23%）
        function createBossBulletWaterSplash(x, y) {
            // 根据当前场景决定使用哪种浪花特效
            const isNightOrBoss = isNightScene || boss.active || bossDefeatState.showBubble;
            waterSplashes.push({
                x: x,
                y: y,
                startTime: Date.now(),
                duration: 700, // 0.7秒播放完
                frameIndex: 0,

                scale: 0.23 // 大小增加15%（从20%增加到23%）

        // 更新海面浪花特效
        function updateWaterSplashes() {
            for (let i = waterSplashes.length - 1; i >= 0; i--) {
                const splash = waterSplashes[i];
                const elapsed = Date.now() - splash.startTime;
                
                // 播放1次后结束
                if (elapsed >= splash.duration) {
                    waterSplashes.splice(i, 1);
                }
            }
        }
        
        // 绘制海面浪花特效
        function drawWaterSplashes() {
            waterSplashes.forEach(splash => {
                // 使用水花创建时记录的场景类型来选择对应的帧数组
                const frames = splash.isNight ? assets.waterSplashFramesNight : assets.waterSplashFrames;
                const frameCount = frames.length;
                if (frameCount === 0) return;

                const elapsed = Date.now() - splash.startTime;
                const progress = elapsed / splash.duration;
                const frameIndex = Math.min(Math.floor(progress * frameCount), frameCount - 1);

                const frame = frames[frameIndex];
                if (frame && frame.complete && frame.naturalWidth > 0) {
                    // 应用缩放（默认为1，Boss子弹为0.2）
                    const scale = splash.scale || 1;
                    const width = frame.naturalWidth * scale;
                    const height = frame.naturalHeight * scale;
                    ctx.drawImage(frame, splash.x - width / 2, splash.y - height / 2, width, height);
                }
            });
        }

        function updateExplosions() {
            for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                // 使用每个爆炸自己的动画时长（稀有潜艇750ms，普通500ms）
                const animationDuration = exp.animationDuration || 500;
                
                if (Date.now() - exp.startTime > animationDuration) {
                    explosions.splice(i, 1);
                }
            }
        }

        function updatePowerUps() {
            // 道具上浮速度比敌方导弹快50%，再上调20%
            const powerUpSpeed = 2.3 * 1.5 * 1.2;
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const pu = powerUps[i];
                pu.y -= powerUpSpeed;
                if (pu.y < -60) {
                    powerUps.splice(i, 1);
                }
            }
        }

        function updateFragments() {
            for (let i = fragments.length - 1; i >= 0; i--) {
                const frag = fragments[i];
                frag.y += frag.speedY;
                frag.x += frag.speedX;
                frag.alpha -= 0.01;
                
                if (frag.alpha <= 0) {
                    fragments.splice(i, 1);
                }
            }
        }

        function updateMineRegen() {
            if (mineAmmo < maxMineAmmo) {
                const now = Date.now();
                const regenInterval = 1000 * (player.mineRegenRate || 1);
                if (now - mineRegenTime >= regenInterval) {
                    mineAmmo++;
                    mineRegenTime = now;
                }
            }
        }

        // ==================== 绘制函数 ====================
        function draw() {
            // 更新游戏开始黑色渐现效果
            if (gameStartFade.active) {
                const elapsed = Date.now() - gameStartFade.startTime;
                const progress = Math.min(elapsed / gameStartFade.duration, 1);
                // 从完全不透明渐变到完全透明
                gameStartFade.alpha = 1 - progress;
                
                if (progress >= 1) {
                    gameStartFade.active = false;
                    gameStartFade.alpha = 0;
                }
            }
            
            drawMissileLaunchBubbles();
            drawSubmarines();
            drawMissiles();
            drawMines();
            drawPowerUps();
            drawFragments();
            drawBossLaser(); // Boss激光在Boss贴图下方
            drawBoss();
            drawBossDefeatEffects(); // Boss死亡对话气泡（在Boss上方）
            drawVisibilityMask();
            drawSuperWeaponEffect();
            drawExplosions(); // 爆炸效果在黑色遮罩上方
            drawBossMissiles(); // Boss导弹在海浪下方
            drawWaterSplashes(); // 海面浪花特效在玩家船下方
            drawPlayer();
            drawControlHintBubble(); // 绘制操作提示气泡
            drawPlayerHitExplosions();
            drawBossBullets();
            drawBossWarning();
            drawBossHpBar();
            drawBossDefeatHpBar(); // Boss死亡时血条随爆炸消失
            drawUI();

            // 绘制免疫防护气泡（在最上层）
            drawImmunityBubble();

            // 绘制游戏开始黑色渐现效果（在最上层）
            if (gameStartFade.active && gameStartFade.alpha > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(0, 0, 0, ${gameStartFade.alpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
        }
        
        // 绘制强敌来袭横幅
        function drawBossWarning() {
            if (!bossWarningEffect.active) return;
            
            const now = Date.now();
            const elapsed = now - bossWarningEffect.startTime;
            
            // 计算闪烁周期：0-1之间循环
            const flashCycle = (now % bossWarningEffect.flashSpeed) / bossWarningEffect.flashSpeed;
            // 使用正弦波计算高亮图透明度：0 到 1 之间变化（间歇性闪烁）
            const highlightOpacity = Math.abs(Math.sin(flashCycle * Math.PI));
            
            // 横幅位置
            const bannerX = canvas.width / 2;
            const bannerY = bossWarningEffect.currentY;
            
            // 绘制普通版本（底层，透明度始终为1）
            if (assets.bossWarning.complete && assets.bossWarning.naturalWidth > 0) {
                const img = assets.bossWarning;
                const width = img.naturalWidth;
                const height = img.naturalHeight;
                ctx.drawImage(img, bannerX - width / 2, bannerY, width, height);
            }
            
            // 绘制高亮版本（上层，带透明度动画）
            if (assets.bossWarningHighlight.complete && assets.bossWarningHighlight.naturalWidth > 0) {
                const img = assets.bossWarningHighlight;
                const width = img.naturalWidth;
                const height = img.naturalHeight;
                
                ctx.save();
                ctx.globalAlpha = highlightOpacity;
                ctx.drawImage(img, bannerX - width / 2, bannerY, width, height);
                ctx.restore();
            }
        }
        
        // 游戏结束菜单选项
        let gameOverOption = 0; // 0 = 重新挑战, 1 = 重新配置
        
        // 显示游戏结束画面
        function showGameOverScreen() {
            const gameOverScreen = document.getElementById('gameOverScreen');
            const finalScoreEl = document.getElementById('finalScore');
            const btnRetry = document.getElementById('btnRetry');
            const btnConfig = document.getElementById('btnConfig');
            
            // 记录最终游戏时间（毫秒）
            finalGameTime = Date.now() - gameStartTime;

            // 更新时间（秒:毫秒格式）
            const gameOverSeconds = Math.floor(finalGameTime / 1000).toString().padStart(2, '0');
            const gameOverMs = (finalGameTime % 1000).toString().padStart(3, '0').slice(0, 2);

            // 更新按钮选中状态
            updateGameOverButtons();
            
            // 显示游戏结束画面
            gameOverScreen.classList.add('active');

        // 隐藏游戏结束画面
        function hideGameOverScreen() {
            const gameOverScreen = document.getElementById('gameOverScreen');
            gameOverScreen.classList.remove('active');
        }
        
        // 更新游戏结束按钮状态
        function updateGameOverButtons() {
            const btnRetry = document.getElementById('btnRetry');
            const btnConfig = document.getElementById('btnConfig');
            
            btnRetry.classList.toggle('active', gameOverOption === 0);

        function drawBackground() {
            // 检查超级武器特效是否激活（包括黑屏消退时间200ms）
            if (superWeaponEffect.active) {
                const elapsed = Date.now() - superWeaponEffect.startTime;
                const totalEffectTime = superWeaponEffect.duration + 200; // 加上黑屏消退时间
                if (elapsed >= totalEffectTime) {
                    superWeaponEffect.active = false;
                    // 重置时停duration为默认值
                    timeStopEffect.duration = 200;
                }
            }
            
            // 根据场景选择背景图（500分后切换到夜晚场景）
            let bgImgDay = assets.backgroundWide;
            let bgImgNight = assets.backgroundNight;
            
            // 检查是否有有效的背景图
            const hasDayBg = bgImgDay.complete && bgImgDay.naturalWidth > 0;
            const hasNightBg = bgImgNight.complete && bgImgNight.naturalWidth > 0;
            
            // 优先使用超宽背景图
            if (hasDayBg) {
                const imgWidth = bgImgDay.naturalWidth;
                const imgHeight = bgImgDay.naturalHeight;
                
                // 计算缩放比例，使背景图高度填满画布
                const scale = canvas.height / imgHeight;
                const scaledWidth = imgWidth * scale;
                
                // 更新滚动位置（从右向左）
                // 夜晚场景滚动速度增加500%，使用线性过渡
                // Boss出场或被击败后都使用白天速率
                let currentScrollSpeed = backgroundScrollSpeed;
                if ((boss.active || bossDefeatState.showBubble) && bossSceneSpeedTransition.active) {
                    // Boss出场时从夜晚速度过渡回白天速度
                    const elapsed = Date.now() - bossSceneSpeedTransition.startTime;
                    const progress = Math.min(elapsed / bossSceneSpeedTransition.duration, 1);
                    currentScrollSpeed = bossSceneSpeedTransition.fromSpeed + 
                        (bossSceneSpeedTransition.toSpeed - bossSceneSpeedTransition.fromSpeed) * progress;
                    // 过渡完成后标记为 inactive
                    if (progress >= 1) {
                        bossSceneSpeedTransition.active = false;
                    }
                } else if (isNightScene && !boss.active && !bossDefeatState.showBubble) {
                    // 夜晚场景且Boss未出场/未被击败时使用夜晚速度
                    if (sceneSpeedTransition.active) {
                        // 线性插值计算当前速度
                        const elapsed = Date.now() - sceneSpeedTransition.startTime;
                        const progress = Math.min(elapsed / sceneSpeedTransition.duration, 1);
                        currentScrollSpeed = sceneSpeedTransition.fromSpeed + 
                            (sceneSpeedTransition.toSpeed - sceneSpeedTransition.fromSpeed) * progress;
                    } else {
                        // 过渡完成，使用最大速度
                        currentScrollSpeed = sceneSpeedTransition.toSpeed;
                    }
                }
                backgroundScrollX -= currentScrollSpeed;
                
                // 当滚动超过一张图宽度时重置，实现无缝循环
                if (Math.abs(backgroundScrollX) >= scaledWidth) {
                    backgroundScrollX = 0;
                }
                
                // 绘制背景（支持渐变过渡）
                // 使用-1像素偏移消除接缝
                const overlap = 1;
                if (isNightScene && hasNightBg && sceneBgTransition.active) {
                    // 渐变过渡阶段：同时绘制白天和夜晚背景，使用透明度混合
                    const fadeProgress = sceneBgTransition.progress;
                    
                    // 绘制白天背景（底层）
                    ctx.globalAlpha = 1;
                    ctx.drawImage(bgImgDay, backgroundScrollX, 0, scaledWidth, canvas.height);
                    ctx.drawImage(bgImgDay, backgroundScrollX + scaledWidth - overlap, 0, scaledWidth, canvas.height);
                    
                    // 绘制夜晚背景（上层，逐渐增加透明度）
                    ctx.globalAlpha = fadeProgress;
                    ctx.drawImage(bgImgNight, backgroundScrollX, 0, scaledWidth, canvas.height);
                    ctx.drawImage(bgImgNight, backgroundScrollX + scaledWidth - overlap, 0, scaledWidth, canvas.height);
                    
                    // 恢复透明度
                    ctx.globalAlpha = 1;
                } else if (isNightScene && hasNightBg) {
                    // 完全夜晚场景
                    ctx.drawImage(bgImgNight, backgroundScrollX, 0, scaledWidth, canvas.height);
                    ctx.drawImage(bgImgNight, backgroundScrollX + scaledWidth - overlap, 0, scaledWidth, canvas.height);
                } else {
                    // 白天场景
                    ctx.drawImage(bgImgDay, backgroundScrollX, 0, scaledWidth, canvas.height);
                    ctx.drawImage(bgImgDay, backgroundScrollX + scaledWidth - overlap, 0, scaledWidth, canvas.height);
                }
                
                
            } else if (assets.background.complete && assets.background.naturalWidth > 0) {
                // 备用：使用原来的背景图
                ctx.drawImage(assets.background, 0, 0, canvas.width, canvas.height);
            } else {
                // 备用渐变背景
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#1a3a5c');
                gradient.addColorStop(0.5, '#0d2137');
                gradient.addColorStop(1, '#061220');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        // 绘制超级武器特效皮肤（在可视范围遮罩上方）
        function drawSuperWeaponEffect() {
            if (!superWeaponEffect.active) return;
            
            const elapsed = Date.now() - superWeaponEffect.startTime;
            const totalDuration = superWeaponEffect.duration;
            
            // 计算黑屏透明度
            let blackAlpha = 0;
            
            // 阶段1: 0-100ms 黑屏渐现（0 -> 0.85）
            if (elapsed < 100) {
                blackAlpha = 0.85 * (elapsed / 100);
            }
            // 阶段2: 100ms - 总时长 黑屏保持0.85（持续到皮肤放完、潜艇爆炸完）
            else if (elapsed < totalDuration) {
                blackAlpha = 0.85;
            }
            // 阶段3: 总时长后 黑屏逐渐消退
            else {
                const fadeElapsed = elapsed - totalDuration;
                const fadeDuration = 200; // 200ms快速消退
                if (fadeElapsed < fadeDuration) {
                    blackAlpha = 0.85 * (1 - fadeElapsed / fadeDuration);
                }
            }
            
            // 绘制黑屏遮罩（在可视遮罩上方）
            if (blackAlpha > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(0, 0, 0, ${blackAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
            
            // 绘制超级武器背景皮肤（100ms后开始显示，从黑屏上方滑入）
            if (elapsed >= 100 && elapsed < totalDuration + 200) {
                const skinElapsed = elapsed - 100;
                const skinDuration = totalDuration - 100;
                const progress = Math.min(skinElapsed / skinDuration, 1);
                
                // 入场动画：前15%时间快速从右侧滑入
                let entryProgress = 1;
                if (progress < 0.15) {
                    entryProgress = progress / 0.15;
                    entryProgress = 1 - Math.pow(1 - entryProgress, 3);
                }
                
                // 渐隐效果：最后30%时间快速渐隐
                let alpha = 1;
                if (progress > 0.7) {
                    alpha = Math.max(0, 1 - (progress - 0.7) / 0.3);
                }
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // 绘制超级武器动态皮肤（居中显示）
                const frames = assets.superWeaponBgFrames;
                if (frames.length > 0 && frames[0].complete && frames[0].naturalWidth > 0) {
                    // 根据进度计算当前帧索引
                    const frameIndex = Math.min(
                        Math.floor(progress * frames.length),
                        frames.length - 1
                    );
                    const bgImg = frames[frameIndex];
                    const imgWidth = bgImg.naturalWidth;
                    const imgHeight = bgImg.naturalHeight;
                    
                    const scaleX = canvas.width / imgWidth;
                    const scaledWidth = imgWidth * scaleX;
                    const scaledHeight = imgHeight * scaleX;
                    
                    // 计算基础位置（居中）
                    const centerX = (canvas.width - scaledWidth) / 2;
                    const centerY = (canvas.height - scaledHeight) / 2;
                    
                    // 从左下向右上斜向滑入的偏移量
                    // entryProgress: 0 = 完全在左侧外（左下）, 1 = 到达中心位置
                    // 水平方向：从左侧进入，向右侧飞出
                    const offsetX = (1 - entryProgress) * (-canvas.width * 0.8);
                    // 垂直方向：从左下向右上移动
                    const offsetY = (1 - entryProgress) * (canvas.height * 0.3);
                    
                    const drawX = centerX + offsetX;
                    const drawY = centerY + offsetY;
                    
                    ctx.drawImage(bgImg, drawX, drawY, scaledWidth, scaledHeight);
                } else if (assets.superWeaponBg.complete && assets.superWeaponBg.naturalWidth > 0) {
                    // 备用：使用静态图片
                    const bgImg = assets.superWeaponBg;
                    const imgWidth = bgImg.naturalWidth;
                    const imgHeight = bgImg.naturalHeight;
                    
                    const scaleX = canvas.width / imgWidth;
                    const scaledWidth = imgWidth * scaleX;
                    const scaledHeight = imgHeight * scaleX;
                    
                    const centerX = (canvas.width - scaledWidth) / 2;
                    const centerY = (canvas.height - scaledHeight) / 2;
                    
                    const offsetX = (1 - entryProgress) * (-canvas.width * 0.8);
                    const offsetY = (1 - entryProgress) * (canvas.height * 0.3);
                    
                    const drawX = centerX + offsetX;
                    const drawY = centerY + offsetY;
                    
                    ctx.drawImage(bgImg, drawX, drawY, scaledWidth, scaledHeight);
                }
                
                ctx.restore();
            }
        }

        function drawPlayer() {
            const skillLevels = player.skillLevels || { speed: 0, hp: 0, ammo: 0 };
            
            // 技能面板中 playerShipDisplay 的尺寸（参考容器）
            const displayWidth = 522;
            const displayHeight = 223;
            
            // 游戏内玩家船只尺寸
            const shipWidth = player.width;
            const shipHeight = player.height;
            
            // 计算缩放比例 - 游戏内船只相对于技能面板容器的比例
            const scale = shipWidth / displayWidth;
            
            // 计算抖动偏移
            let shakeX = 0;
            let shakeY = 0;
            if (player.shake && player.shake.active) {
                const elapsed = Date.now() - player.shake.startTime;
                if (elapsed >= player.shake.duration) {
                    player.shake.active = false;
                } else {
                    // 随机方向抖动
                    const angle = Math.random() * Math.PI * 2;
                    const intensity = player.shake.intensity * (1 - elapsed / player.shake.duration);
                    shakeX = Math.cos(angle) * intensity;
                    shakeY = Math.sin(angle) * intensity;
                }
            }
            
            // 计算入场动画偏移
            let entryOffsetX = 0;
            if (playerEntry.active) {
                const elapsed = Date.now() - playerEntry.startTime;
                const progress = Math.min(elapsed / playerEntry.duration, 1);
                
                // 使用缓动函数 easeOutCubic
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                entryOffsetX = playerEntry.startX * (1 - easeProgress);
                
                if (progress >= 1) {
                    playerEntry.active = false;
                    entryOffsetX = 0;
                }
            }
            
            // 基础船位置 - 使用 player.x, player.y 作为基准，加上抖动偏移和入场偏移
            // 技能面板中 #shipBase 的 top: 0，所以基础船从 player.y 开始
            // 整体向下偏移50px，使船只位置与技能面板展示更一致
            const baseX = player.x + shakeX + entryOffsetX;
            const baseY = player.y + shakeY + 50;
            
            // 按层级顺序绘制：涡轮增压(底层) -> 弹药库 -> 基础船 -> 装甲(顶层)
            
            // 1. 涡轮增压层 (最下层)
            // CSS: #shipTurbo { width: 115px; top: 27px; left: 13px; }
            // 调整Y偏移：从27px改为123px（+96px），使其与技能面板展示位置一致
            if (skillLevels.speed >= 1 && assets.shipTurbo.complete && assets.shipTurbo.naturalWidth > 0) {
                const turboDisplayWidth = 115;
                const turboWidth = turboDisplayWidth * scale;
                const turboHeight = assets.shipTurbo.naturalHeight * (turboWidth / assets.shipTurbo.naturalWidth);
                const turboX = baseX + 13 * scale;
                const turboY = baseY + 123 * scale;
                ctx.drawImage(assets.shipTurbo, turboX, turboY, turboWidth, turboHeight);
            }

            // 2. 弹药库层
            // CSS: #shipAmmo { width: 60px; left: 364px; top: 19px; }
            // 调整Y偏移：从19px改为115px（+96px），使其与技能面板展示位置一致
            if (skillLevels.ammo >= 1 && assets.shipAmmo.complete && assets.shipAmmo.naturalWidth > 0) {
                const ammoDisplayWidth = 60;
                const ammoWidth = ammoDisplayWidth * scale;
                const ammoHeight = assets.shipAmmo.naturalHeight * (ammoWidth / assets.shipAmmo.naturalWidth);
                const ammoX = baseX + 364 * scale;
                const ammoY = baseY + 115 * scale;
                ctx.drawImage(assets.shipAmmo, ammoX, ammoY, ammoWidth, ammoHeight);
            }
            
            // 3. 基础船只层
            // CSS: #shipBase { top: 0px; width: 100%(522px); }
            if (assets.shipBase.complete && assets.shipBase.naturalWidth > 0) {
                const baseImgWidth = assets.shipBase.naturalWidth;
                const baseImgHeight = assets.shipBase.naturalHeight;
                // 保持宽高比，按宽度缩放
                const drawWidth = shipWidth;
                const drawHeight = baseImgHeight * (drawWidth / baseImgWidth);
                ctx.drawImage(assets.shipBase, baseX, baseY, drawWidth, drawHeight);
            } else {
                // 备用绘制
                ctx.fillStyle = '#4a9eff';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }
            
            // 4. 装甲层 (最上层)
            // CSS: #shipArmor { width: 240px; left: 84px; top: 55px; }
            // 调整Y偏移：从55px改为151px（+96px），使其与技能面板展示位置一致
            if (skillLevels.hp >= 1 && assets.shipArmor.complete && assets.shipArmor.naturalWidth > 0) {
                const armorDisplayWidth = 240;
                const armorWidth = armorDisplayWidth * scale;
                const armorHeight = assets.shipArmor.naturalHeight * (armorWidth / assets.shipArmor.naturalWidth);
                const armorX = baseX + 84 * scale;
                const armorY = baseY + 151 * scale;
                ctx.drawImage(assets.shipArmor, armorX, armorY, armorWidth, armorHeight);
            }
            
            // 判断两个气泡是否同时显示
            const showSuperWeaponBubble = mp >= 100 && !superWeaponEffect.active;
            const showSplitMineBubble = splitMineBubble.active;
            
            // 更新超级武器气泡动画状态
            if (showSuperWeaponBubble) {
                if (!superWeaponBubbleAnim.active) {
                    // 开始出场动画
                    superWeaponBubbleAnim.active = true;
                    superWeaponBubbleAnim.startTime = Date.now();
                    superWeaponBubbleAnim.phase = 'entry';
                }
            } else {
                if (superWeaponBubbleAnim.active && superWeaponBubbleAnim.phase !== 'exit') {
                    // 开始消失动画
                    superWeaponBubbleAnim.phase = 'exit';
                    superWeaponBubbleAnim.exitStartTime = Date.now();
                }
            }
            
            // 更新分裂弹气泡动画状态
            if (showSplitMineBubble) {
                if (!splitMineBubbleAnim.active) {
                    // 开始出场动画
                    splitMineBubbleAnim.active = true;
                    splitMineBubbleAnim.startTime = Date.now();
                    splitMineBubbleAnim.phase = 'entry';
                }
            } else {
                if (splitMineBubbleAnim.active && splitMineBubbleAnim.phase !== 'exit') {
                    // 开始消失动画
                    splitMineBubbleAnim.phase = 'exit';
                    splitMineBubbleAnim.exitStartTime = Date.now();
                }
            }
            
            // 绘制超级武器提示气泡（当MP满时显示在玩家船右上角）
            if (superWeaponBubbleAnim.active) {
                if (assets.superWeaponBubble.complete && assets.superWeaponBubble.naturalWidth > 0) {
                    const bubbleWidth = 278;
                    const bubbleHeight = 66;
                    const bubbleX = baseX + shipWidth - 80;
                    // 如果同时显示分裂弹气泡，则超级武器气泡在上
                    const baseBubbleY = showSplitMineBubble ? baseY - 80 : baseY - 20;
                    
                    // 计算位移动画偏移
                    let offsetX = 0;
                    let alpha = 1;
                    const now = Date.now();
                    
                    if (superWeaponBubbleAnim.phase === 'entry') {
                        // 出场动画：从右侧滑入
                        const elapsed = now - superWeaponBubbleAnim.startTime;
                        const progress = Math.min(elapsed / superWeaponBubbleAnim.entryDuration, 1);
                        // 使用 easeOutCubic 缓动
                        const easeProgress = 1 - Math.pow(1 - progress, 3);
                        offsetX = (1 - easeProgress) * 50; // 从右侧50px处滑入
                        alpha = easeProgress;
                        if (progress >= 1) {
                            superWeaponBubbleAnim.phase = 'idle';
                        }
                    } else if (superWeaponBubbleAnim.phase === 'exit') {
                        // 消失动画：向右侧滑出
                        const elapsed = now - superWeaponBubbleAnim.exitStartTime;
                        const progress = Math.min(elapsed / superWeaponBubbleAnim.exitDuration, 1);
                        // 使用 easeInCubic 缓动
                        const easeProgress = progress * progress * progress;
                        offsetX = easeProgress * 50; // 向右侧滑出50px
                        alpha = 1 - easeProgress;
                        if (progress >= 1) {
                            superWeaponBubbleAnim.active = false;
                        }
                    }
                    
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.drawImage(assets.superWeaponBubble, bubbleX + offsetX, baseBubbleY, bubbleWidth, bubbleHeight);
                    ctx.restore();
                }
            }
            
            // 绘制分裂水雷提示气泡
            if (splitMineBubbleAnim.active) {
                if (assets.splitMineBubble.complete && assets.splitMineBubble.naturalWidth > 0) {
                    const bubbleWidth = 248;
                    const bubbleHeight = 66;
                    const bubbleX = baseX + shipWidth - 80;
                    // 如果同时显示超级武器气泡，则分裂弹气泡在下
                    const baseBubbleY = showSuperWeaponBubble ? baseY - 20 : baseY - 20;
                    
                    // 计算位移动画偏移
                    let offsetX = 0;
                    let alpha = 1;
                    const now = Date.now();
                    
                    if (splitMineBubbleAnim.phase === 'entry') {
                        // 出场动画：从右侧滑入
                        const elapsed = now - splitMineBubbleAnim.startTime;
                        const progress = Math.min(elapsed / splitMineBubbleAnim.entryDuration, 1);
                        // 使用 easeOutCubic 缓动
                        const easeProgress = 1 - Math.pow(1 - progress, 3);
                        offsetX = (1 - easeProgress) * 50; // 从右侧50px处滑入
                        alpha = easeProgress;
                        if (progress >= 1) {
                            splitMineBubbleAnim.phase = 'idle';
                        }
                    } else if (splitMineBubbleAnim.phase === 'exit') {
                        // 消失动画：向右侧滑出
                        const elapsed = now - splitMineBubbleAnim.exitStartTime;
                        const progress = Math.min(elapsed / splitMineBubbleAnim.exitDuration, 1);
                        // 使用 easeInCubic 缓动
                        const easeProgress = progress * progress * progress;
                        offsetX = easeProgress * 50; // 向右侧滑出50px
                        alpha = 1 - easeProgress;
                        if (progress >= 1) {
                            splitMineBubbleAnim.active = false;
                        }
                    }
                    
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.drawImage(assets.splitMineBubble, bubbleX + offsetX, baseBubbleY, bubbleWidth, bubbleHeight);
                    ctx.restore();
                }
            }
            
            // 绘制护盾效果
            if (player.shield && player.shield.active) {
                const elapsed = Date.now() - player.shield.startTime;
                const progress = elapsed / player.shield.duration;

                // 护盾闪烁效果
                const alpha = 0.3 + Math.sin(progress * Math.PI * 4) * 0.2;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = '#00BFFF'; // 蓝色护盾
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(baseX + shipWidth / 2, baseY + shipHeight / 2, Math.max(shipWidth, shipHeight) * 0.56, 0, Math.PI * 2);
                ctx.stroke();

                // 内部填充
                ctx.fillStyle = 'rgba(0, 191, 255, 0.1)';
                ctx.fill();
                ctx.restore();
            }

        }

        // 绘制免疫伤害提示气泡（独立函数，确保在最上层）
        function drawImmunityBubble() {
            if (!immunityBubble.active) return;

            const elapsed = Date.now() - immunityBubble.startTime;
            const progress = Math.min(elapsed / immunityBubble.duration, 1);

            // 计算透明度（淡入淡出效果）
            let alpha = 1;
            if (progress < 0.1) {
                alpha = progress / 0.1; // 淡入
            } else if (progress > 0.8) {
                alpha = (1 - progress) / 0.2; // 淡出
            }

            // 使用图片素材绘制气泡，位置参考超级武器气泡
            if (assets.immunityBubbleImg.complete && assets.immunityBubbleImg.naturalWidth > 0) {
                const bubbleWidth = 228;
                const bubbleHeight = 66;
                const bubbleX = player.x + player.width - 80;
                const bubbleY = player.y + 50 - 20;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.drawImage(assets.immunityBubbleImg, bubbleX, bubbleY, bubbleWidth, bubbleHeight);
                ctx.restore();

        function drawVisibilityMask() {
            // 绘制可见度遮罩 - 位于玩家船下方，其他场景素材上方
            // 遮罩跟随玩家船同步移动，保持相对静止
            // 根据场景和过渡状态选择遮罩素材
            const hasDayMask = assets.visibilityMask.complete && assets.visibilityMask.naturalWidth > 0;
            const hasNightMask = assets.visibilityMaskNight.complete && assets.visibilityMaskNight.naturalWidth > 0;
            
            if (!hasDayMask) return;
            
            // 素材原始尺寸：3693 * 470
            const ORIGINAL_WIDTH = 3693;
            const ORIGINAL_HEIGHT = 470;
            
            // 素材顶部位置离画面最顶部距离：274
            const maskTopY = 274;
            
            // 计算缩放比例，保持3693*470的长宽比
            // 以画布高度为基准进行缩放，先整体缩小50%，再缩小15%
            const scale = (canvas.height / ORIGINAL_HEIGHT) * 0.5 * 0.85;
            const maskWidth = ORIGINAL_WIDTH * scale;
            const maskHeight = ORIGINAL_HEIGHT * scale;
            
            // 遮罩跟随玩家船同步移动
            // 计算玩家船的中心X坐标
            const playerCenterX = player.x + player.width / 2;
            
            // 遮罩的X位置：以玩家船为中心，遮罩中心与船中心对齐
            const maskX = playerCenterX - maskWidth / 2;
            
            // 根据场景和过渡状态绘制遮罩
            if (isNightScene && hasNightMask && sceneBgTransition.active) {
                // 渐变过渡阶段：同时绘制日间和夜间遮罩，使用透明度混合
                const fadeProgress = sceneBgTransition.progress;
                
                // 绘制日间遮罩（底层，逐渐消失）
                ctx.globalAlpha = 1 - fadeProgress;
                ctx.drawImage(assets.visibilityMask, maskX, maskTopY, maskWidth, maskHeight);
                
                // 绘制夜间遮罩（上层，逐渐增加透明度）
                ctx.globalAlpha = fadeProgress;
                ctx.drawImage(assets.visibilityMaskNight, maskX, maskTopY, maskWidth, maskHeight);
                
                // 恢复透明度
                ctx.globalAlpha = 1;
            } else if (isNightScene && hasNightMask) {
                // 完全夜间场景
                ctx.drawImage(assets.visibilityMaskNight, maskX, maskTopY, maskWidth, maskHeight);
            } else {
                // 白天场景
                ctx.drawImage(assets.visibilityMask, maskX, maskTopY, maskWidth, maskHeight);
            }
        }

        // 绘制导弹发射气泡特效（在潜艇下方）
        function drawMissileLaunchBubbles() {
            const frames = assets.missileLaunchBubbleFrames;
            if (frames.length === 0) return;
            
            missileLaunchBubbles.forEach(bubble => {

                    frames.length - 1
                );
                
                const frame = frames[frameIndex];
                if (frame && frame.complete && frame.naturalWidth > 0) {

        function drawSubmarines() {
            submarines.forEach(sub => {
                let subImage;
                if (sub.isGold) {
                    // 夜晚场景使用暗色版本
                    subImage = isNightScene && assets.goldSubmarineNight.complete ? 
                        assets.goldSubmarineNight : assets.goldSubmarine;
                } else {
                    // 普通潜艇随机使用两种素材之一，夜晚场景使用暗色版本
                    if (isNightScene) {
                        subImage = sub.subType === 1 ? 
                            (assets.submarine2Night.complete ? assets.submarine2Night : assets.submarine2) : 
                            (assets.submarineNight.complete ? assets.submarineNight : assets.submarine);
                    } else {
                        subImage = sub.subType === 1 ? assets.submarine2 : assets.submarine;
                    }
                }
                
                // 计算受击效果
                let shakeX = 0;
                let shakeY = 0;
                let isHit = false;
                
                if (sub.hitEffect && sub.hitEffect.active) {
                    const elapsed = Date.now() - sub.hitEffect.startTime;
                    const duration = 100; // 抖动持续100ms（0.1秒）
                    
                    if (elapsed < duration) {
                        isHit = true;
                        // 随机方向抖动，强度随时间递减
                        const progress = elapsed / duration;
                        const shakeIntensity = 5 * (1 - progress); // 从5逐渐减小到0
                        shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
                        shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
                    } else {
                        sub.hitEffect.active = false;
                    }
                }
                
                // 计算后坐力效果（向下震动）
                let recoilY = 0;
                if (sub.recoilEffect && sub.recoilEffect.active) {
                    const elapsed = Date.now() - sub.recoilEffect.startTime;
                    const duration = 300; // 后坐力持续300ms
                    
                    if (elapsed < duration) {
                        // 使用正弦波模拟向下的震动，然后回弹
                        const progress = elapsed / duration;
                        const recoilIntensity = 15 * Math.sin(progress * Math.PI); // 最大向下15像素
                        recoilY = recoilIntensity;
                    } else {
                        sub.recoilEffect.active = false;
                    }
                }
                
                // 绘制潜艇图片
                if (subImage && subImage.complete && subImage.naturalWidth > 0) {
                    ctx.save();
                    
                    // 应用抖动偏移和后坐力
                    const drawX = sub.x + shakeX;
                    const drawY = sub.y + shakeY + recoilY;
                    
                    // 绘制潜艇图片（去除变红效果，保留抖动）
                    ctx.drawImage(subImage, drawX, drawY, sub.width, sub.height);
                    
                    ctx.restore();
                } else {
                    // 备用绘制
                    ctx.fillStyle = isHit ? '#ff4444' : (sub.isGold ? '#ffd700' : '#8b4513');
                    ctx.fillRect(sub.x + shakeX, sub.y + shakeY + recoilY, sub.width, sub.height);
                }
            });
        }

        function drawMissiles() {
            // 水平面Y坐标
            const waterLevelY = 274;
            
            missiles.forEach(missile => {
                // 根据场景选择导弹素材
                const missileImg = isNightScene && assets.missileNight.complete && assets.missileNight.naturalWidth > 0 ? 
                    assets.missileNight : assets.missile;
                const missileTopImg = assets.missileTop;
                const hasTopImg = missileTopImg.complete && missileTopImg.naturalWidth > 0;
                
                // 计算导弹的上下边界（考虑旋转）
                const missileTop = missile.y;
                const missileBottom = missile.y + missile.height;
                
                // 判断导弹是否与水平面相交
                const isAboveWater = missileBottom <= waterLevelY; // 完全在水面上方
                const isBelowWater = missileTop >= waterLevelY;    // 完全在水面下方
                const isCrossingWater = !isAboveWater && !isBelowWater; // 穿过水平面
                
                // 绘制导弹图片
                if (missileImg.complete && missileImg.naturalWidth > 0) {
                    ctx.save();
                    ctx.translate(missile.x + missile.width/2, missile.y + missile.height/2);
                    
                    if (missile.phase === 'diagonal') {
                        // 斜向阶段：根据方向旋转45度偏左/右
                        ctx.rotate(missile.direction * Math.PI / 4);
                    }
                    
                    if (isCrossingWater && hasTopImg) {
                        // 导弹穿过水平面，需要分段绘制
                        // 计算相对于导弹中心的水平面位置
                        const waterLevelRelativeToCenter = waterLevelY - (missile.y + missile.height/2);

                        // 绘制水面下部分（原素材的下半部分）
                        const bottomHeight = missile.height/2 - waterLevelRelativeToCenter;
                        if (bottomHeight > 0) {
                            const sourceY = missileImg.naturalHeight * (1 - bottomHeight / missile.height);
                            const sourceHeight = missileImg.naturalHeight * (bottomHeight / missile.height);
                            ctx.drawImage(
                                missileImg,
                                0, sourceY, missileImg.naturalWidth, sourceHeight,
                                -missile.width/2, waterLevelRelativeToCenter, missile.width, bottomHeight
                            );
                        }

                        // 绘制水面上部分（新素材的上半部分）
                        const topHeight = missile.height/2 + waterLevelRelativeToCenter;
                        if (topHeight > 0) {
                            const sourceHeight = missileTopImg.naturalHeight * (topHeight / missile.height);
                            ctx.drawImage(
                                missileTopImg,
                                0, 0, missileTopImg.naturalWidth, sourceHeight,
                                -missile.width/2, -missile.height/2, missile.width, topHeight
                            );
                        }
                        // 穿过水平面时，尾焰透明度80%
                        drawMissileTail(missile, 0.8);
                    } else if (isAboveWater && hasTopImg) {
                        // 先绘制尾焰动画（在导弹图层下方）
                        drawMissileTail(missile, 0.6);
                        // 完全在水面上方，使用新素材
                        ctx.drawImage(missileTopImg, -missile.width/2, -missile.height/2, missile.width, missile.height);
                    } else if (isBelowWater) {
                        // 先绘制尾焰动画（在导弹图层下方）
                        drawMissileTail(missile, 1.0);
                        // 完全在水面下方，使用原素材
                        ctx.drawImage(missileImg, -missile.width/2, -missile.height/2, missile.width, missile.height);
                    } else {
                        // 素材未加载，使用原素材
                        ctx.drawImage(missileImg, -missile.width/2, -missile.height/2, missile.width, missile.height);
                    }

                    ctx.restore();
                } else {
                    // 备用绘制
                    ctx.save();
                    ctx.translate(missile.x + missile.width/2, missile.y + missile.height/2);
                    ctx.fillStyle = '#ff4444';
                    
                    if (missile.phase === 'diagonal') {
                        ctx.rotate(missile.direction * Math.PI / 4 - Math.PI / 2);
                    } else {
                        ctx.rotate(-Math.PI / 2);
                    }
                    
                    ctx.fillRect(-missile.width/2, -missile.height/2, missile.width, missile.height);
                    ctx.restore();
                }
            });
        }

        // 绘制导弹尾焰动画（使用精灵图）
        function drawMissileTail(missile, waterAlpha) {
            const sprite = assets.missileTailSprite;
            const spriteData = assets.missileTailSpriteData;

            // 优先使用精灵图
            if (spriteData && sprite.complete && sprite.naturalWidth > 0) {
                const frames = Object.keys(spriteData.frames);
                const tailElapsed = Date.now() - missile.startTime;
                const tailFrameIndex = Math.floor((tailElapsed / 50) % frames.length);
                const frameName = frames[tailFrameIndex];
                const frameData = spriteData.frames[frameName];

                if (frameData) {
                    ctx.save();
                    // 根据场景调整基础透明度：白天100%，夜晚和Boss场景50%
                    const isNightOrBoss = isNightScene || boss.active || bossDefeatState.showBubble;
                    const sceneAlpha = isNightOrBoss ? 0.5 : 1.0;
                    ctx.globalAlpha = waterAlpha * sceneAlpha;
                    const tailScale = 0.345; // 缩放比例（0.3 * 1.15 = 0.345，放大15%）
                    const frame = frameData.frame;
                    const tailWidth = frame.w * tailScale;
                    const tailHeight = frame.h * tailScale;
                    // 尾焰显示在导弹尾部
                    const tailY = missile.height/2 + 0;
                    const tailX = -tailWidth/2 - 4; // 向左移动4像素

                    ctx.drawImage(
                        sprite,
                        frame.x, frame.y, frame.w, frame.h,
                        tailX, tailY, tailWidth, tailHeight
                    );
                    ctx.restore();
                }
            } else if (assets.missileTailFrames.length > 0) {
                // 回退到序列帧
                const tailFrames = assets.missileTailFrames;
                const tailElapsed = Date.now() - missile.startTime;
                const tailFrameIndex = Math.floor((tailElapsed / 50) % tailFrames.length);
                const tailFrame = tailFrames[tailFrameIndex];

                if (tailFrame && tailFrame.complete && tailFrame.naturalWidth > 0) {
                    ctx.save();
                    const isNightOrBoss = isNightScene || boss.active || bossDefeatState.showBubble;
                    const sceneAlpha = isNightOrBoss ? 0.5 : 1.0;
                    ctx.globalAlpha = waterAlpha * sceneAlpha;
                    const tailScale = 0.5;
                    const tailWidth = tailFrame.naturalWidth * tailScale;
                    const tailHeight = tailFrame.naturalHeight * tailScale;
                    const tailOffsetY = 400;
                    const tailY = -missile.height/2 - tailHeight + tailOffsetY;
                    ctx.drawImage(tailFrame, -tailWidth/2, tailY, tailWidth, tailHeight);
                    ctx.restore();
                }
            }
        }

        // 绘制爆炸效果（不包括击中玩家的爆炸）
        function drawExplosions() {
            explosions.forEach(exp => {
                // 跳过击中玩家的爆炸，在 drawPlayerHitExplosions 中绘制
                if (exp.isPlayerHit) return;
                
                const elapsed = Date.now() - exp.startTime;
                const frameCount = assets.explosionFrames.length;
                // 使用每个爆炸自己的动画时长（稀有潜艇750ms，普通500ms）
                const animationDuration = exp.animationDuration || 500;
                
                // 计算当前帧索引
                const progress = elapsed / animationDuration;
                const frameIndex = Math.min(Math.floor(progress * frameCount), frameCount - 1);
                
                // 计算透明度（随时间淡出）
                const alpha = Math.max(0, 1 - elapsed / animationDuration);
                
                // 先绘制背景火光效果（几层同心圆叠加放大）
                ctx.save();
                const baseSize = 60; // 缩小50%（原120）
                const expansion = 1 + elapsed / animationDuration * 2; // 放大到3倍
                
                // 外层火光 - 最大最淡
                ctx.fillStyle = `rgba(255, 100, 0, ${alpha * 0.3})`;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, baseSize * expansion * 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // 中层火光
                ctx.fillStyle = `rgba(255, 150, 50, ${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, baseSize * expansion * 1.0, 0, Math.PI * 2);
                ctx.fill();
                
                // 内层火光 - 最小最亮
                ctx.fillStyle = `rgba(255, 200, 100, ${alpha * 0.7})`;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, baseSize * expansion * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                // 获取当前帧
                const currentFrame = assets.explosionFrames[frameIndex];
                
                // 绘制序列帧（在火光效果之上）
                if (currentFrame && currentFrame.complete && currentFrame.naturalWidth > 0) {
                    const size = 195; // 爆炸显示大小（150 * 1.3 = 195）
                    ctx.drawImage(currentFrame, exp.x - size/2, exp.y - size/2, size, size);
                } else {
                    // 备用绘制
                    const size = baseSize * expansion;
                    ctx.fillStyle = `rgba(255, 150, 50, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(exp.x, exp.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 绘制分数（白色字体，黑色外描边；稀有潜艇金色字体，更大）
                if (exp.scoreValue !== null) {
                    ctx.save();
                    
                    // 稀有潜艇（100分）使用更大的金色字体
                    const isGoldSub = exp.scoreValue === 100;
                    const fontSize = isGoldSub ? 48 : 32;
                    ctx.font = `bold ${fontSize}px "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    // 黑色外描边 - 稀有潜艇更粗
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = isGoldSub ? 7 : 5;
                    ctx.strokeText('+' + exp.scoreValue, exp.x, exp.y);
                    
                    // 字体颜色：稀有潜艇金色，普通白色
                    ctx.fillStyle = isGoldSub ? '#FFD700' : '#ffffff';
                    ctx.fillText('+' + exp.scoreValue, exp.x, exp.y);
                    
                    ctx.restore();
                }
            });
        }
