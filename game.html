        function drawFragments() {
            fragments.forEach(frag => {
                // 使用碎片自带的颜色，如果没有则使用默认棕色
                const colorBase = frag.color || 'rgba(139, 69, 19, ';
                ctx.fillStyle = `${colorBase}${frag.alpha})`;
                ctx.fillRect(frag.x, frag.y, frag.size, frag.size);
            });
        }

        function drawUI() {
            // ========== 顶部UI栏背景（使用图片素材） ==========
            if (assets.uiTopBar.complete && assets.uiTopBar.naturalWidth > 0) {
                // 顶部UI背景图 - 拉伸至画布宽度
                const barHeight = assets.uiTopBar.naturalHeight;
                ctx.drawImage(assets.uiTopBar, 0, 0, canvas.width, barHeight);
            } else {
                // 备用：顶部深色横条背景
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, canvas.width, 70);
            }
            
            // ========== 左上角 - HP和MP条 ==========
            const barX = 50;
            const barWidth = 134;
            const barHeight = 22;
            const labelColor = '#b7b7b7'; // 灰色标签
            
            // 绘制双层斜切角进度条的辅助函数
            // 底层灰色（满值），上层彩色（当前值）
            function drawSlantedBar(x, y, width, height, actualPercent, displayPercent, fillColor, animationColor = '#ffffff') {
                const slant = 8; // 斜切角度
                
                // 底层：灰色（表示满值/总量）
                ctx.fillStyle = '#555555';
                ctx.beginPath();
                ctx.moveTo(x + slant, y);
                ctx.lineTo(x + width, y);
                ctx.lineTo(x + width - slant, y + height);
                ctx.lineTo(x, y + height);
                ctx.closePath();
                ctx.fill();
                
                // 上层：彩色（当前实际状态）
                if (actualPercent > 0) {
                    ctx.fillStyle = fillColor;
                    const actualWidth = width * actualPercent;
                    ctx.beginPath();
                    ctx.moveTo(x + slant, y);
                    ctx.lineTo(x + actualWidth, y);
                    ctx.lineTo(x + actualWidth - slant, y + height);
                    ctx.lineTo(x, y + height);
                    ctx.closePath();
                    ctx.fill();
                }
                
                // 动画层：白色（显示值和实际值之间的过渡区域）
                // 当displayPercent > actualPercent时，白色区域在右侧（MP增加动画）
                // 当displayPercent < actualPercent时，白色区域在右侧（HP减少动画，Boss血条）
                const maxPercent = Math.max(actualPercent, displayPercent);
                const minPercent = Math.min(actualPercent, displayPercent);
                
                if (maxPercent > minPercent) {
                    ctx.fillStyle = animationColor;
                    const minWidth = width * minPercent;
                    const maxWidth = width * maxPercent;
                    const animWidth = maxWidth - minWidth;
                    const animX = x + minWidth;
                    
                    ctx.beginPath();
                    ctx.moveTo(animX + slant, y);
                    ctx.lineTo(animX + animWidth, y);
                    ctx.lineTo(animX + animWidth - slant, y + height);
                    ctx.lineTo(animX, y + height);
                    ctx.closePath();
                    ctx.fill();
                }
            }
            
            // HP标签
            ctx.fillStyle = labelColor;
            ctx.font = '28px "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('HP', barX, 38);
            
            // 更新HP动画
            if (hpAnimation.active) {
                const elapsed = Date.now() - hpAnimation.startTime;
                const progress = Math.min(elapsed / hpAnimation.duration, 1);
                
                // 线性插值计算当前显示HP
                const currentDisplayHp = hpAnimation.fromHp + 
                    (hpAnimation.toHp - hpAnimation.fromHp) * progress;
                hpAnimation.displayHp = currentDisplayHp;
                
                // 动画结束
                if (progress >= 1) {
                    hpAnimation.active = false;
                    hpAnimation.displayHp = hp;
                }
            }
            
            // HP进度条（底层灰色，上层橙色 #ff6b35，动画层白色）
            // HP动画逻辑：displayHp从fromHp动画到toHp（实际hp）
            // 当HP减少时，displayHp > actualHp，白色区域显示在两者之间（从右向左收缩）
            // 当HP增加时，displayHp < actualHp，白色区域显示在两者之间（从左向右扩展）
            const actualHpPercent = Math.max(0, hp / maxHp);
            const displayHpPercent = Math.max(0, hpAnimation.displayHp / maxHp);
            drawSlantedBar(barX + 60, 18, barWidth, barHeight, actualHpPercent, displayHpPercent, '#ff6b35', '#ffffff');
            
            // MP标签
            ctx.fillStyle = labelColor;
            ctx.fillText('MP', barX, 65);
            
            // 更新MP动画
            if (mpAnimation.active) {
                const elapsed = Date.now() - mpAnimation.startTime;
                const progress = Math.min(elapsed / mpAnimation.duration, 1);
                
                // 线性插值计算当前显示MP
                const currentDisplayMp = mpAnimation.fromMp + 
                    (mpAnimation.toMp - mpAnimation.fromMp) * progress;
                mpAnimation.displayMp = currentDisplayMp;
                
                // 动画结束
                if (progress >= 1) {
                    mpAnimation.active = false;
                    mpAnimation.displayMp = mp;
                }
            }
            
            // MP进度条（底层灰色，上层蓝色 #4a9eff，动画层白色）
            // MP动画逻辑：displayMp从fromMp动画到toMp（实际mp）
            // 当MP增加时，displayMp < actualMp，白色区域显示在两者之间
            const actualMpPercent = Math.max(0, mp / 100);
            const displayMpPercent = Math.max(0, mpAnimation.displayMp / 100);
            
            // MP满值时的闪烁效果
            let mpFillColor = '#4a9eff';
            if (mp >= 100) {
                // 浅蓝色闪烁动画：使用正弦波在浅蓝色和原蓝色之间切换
                const flashSpeed = 600; // 闪烁周期600ms（更快更明显）
                const flashProgress = (Date.now() % flashSpeed) / flashSpeed;
                const flashIntensity = (Math.sin(flashProgress * Math.PI * 2) + 1) / 2; // 0-1之间变化
                // 更亮的浅蓝色 #B0E0FF（亮天蓝色）到原蓝色 #4a9eff 的插值
                const r = Math.floor(74 + (176 - 74) * flashIntensity);
                const g = Math.floor(158 + (224 - 158) * flashIntensity);
                const b = Math.floor(255 + (255 - 255) * flashIntensity);
                mpFillColor = `rgb(${r}, ${g}, ${b})`;
            }
            
            drawSlantedBar(barX + 60, 45, barWidth, barHeight, actualMpPercent, displayMpPercent, mpFillColor, '#ffffff');
            
            // ========== 顶部中间 - 弹药库存（菱形） ==========
            const ammoCenterX = canvas.width / 2;
            const ammoY = 25;
            const ammoSize = 14; // 菱形半边长
            const ammoGap = 20;
            const totalAmmoBoxes = maxMineAmmo; // 使用最大弹药容量作为圆点总数
            const filledAmmoBoxes = mineAmmo; // 当前弹药数量
            
            // 计算总宽度以居中
            const totalAmmoWidth = totalAmmoBoxes * (ammoSize * 2) + (totalAmmoBoxes - 1) * ammoGap;
            const startX = ammoCenterX - totalAmmoWidth / 2 + ammoSize;
            
            // 绘制菱形弹药图标
            function drawDiamond(x, y, size, filled) {
                ctx.beginPath();
                ctx.moveTo(x, y - size);
                ctx.lineTo(x + size, y);
                ctx.lineTo(x, y + size);
                ctx.lineTo(x - size, y);
                ctx.closePath();
                
                if (filled) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                } else {
                    ctx.strokeStyle = '#666666';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
            
            for (let i = 0; i < totalAmmoBoxes; i++) {
                const boxX = startX + i * (ammoSize * 2 + ammoGap);
                drawDiamond(boxX, ammoY, ammoSize, i < filledAmmoBoxes);
            }
            
            // ========== 右上角 - 计时器 ==========
            const scoreX = canvas.width - 230;
            const scoreY = 60;

            // 计算游戏时间（秒:毫秒格式）
            // 如果游戏结束且已记录最终时间，使用记录的最终时间；否则使用当前时间
            const elapsedMs = (gameOver && finalGameTime > 0) ? finalGameTime : (Date.now() - gameStartTime);
            const seconds = Math.floor(elapsedMs / 1000).toString().padStart(2, '0');
            const milliseconds = (elapsedMs % 1000).toString().padStart(3, '0').slice(0, 2);
            const timeString = `${seconds}:${milliseconds}`;

            // 时间数字（黄色 #edea74）
            ctx.fillStyle = '#edea74';
            ctx.font = 'bold 60px "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(timeString, scoreX, scoreY);
            
            // ========== 左侧 - 分数进度条 ==========
            if (assets.scoreProgressBar.complete && assets.scoreProgressBar.naturalWidth > 0) {
                const progressBarWidth = assets.scoreProgressBar.naturalWidth;
                const progressBarHeight = assets.scoreProgressBar.naturalHeight;
                const progressBarX = 0; // 紧贴画面左侧
                const progressBarY = (canvas.height - progressBarHeight) / 2; // 垂直居中
                
                // 绘制进度条背景
                ctx.drawImage(assets.scoreProgressBar, progressBarX, progressBarY, progressBarWidth, progressBarHeight);
                
                // 计算指示器位置
                // 500分进入黑夜，1000分进入Boss战（停止运动）
                let progressPercent = 0;
                if (score >= 1000) {
                    progressPercent = 1; // 到达Boss战，停止在底部
                } else {
                    progressPercent = score / 1000; // 0-1000分映射到0-1
                }
                
                // 进度条轨道范围（根据新素材调整）
                const trackTopY = progressBarY + 85; // 进度条轨道顶端（MAP下方圆点中心）
                const trackBottomY = progressBarY + progressBarHeight - 75; // 进度条轨道底端（1000分位置）
                const trackHeight = trackBottomY - trackTopY;
                
                // 指示器位置：从顶端向下移动
                const indicatorY = trackTopY + trackHeight * progressPercent;
                const indicatorX = progressBarX + progressBarWidth / 2; // 进度条中心
                
                // 绘制指示器（玩家船图标）
                if (assets.scoreProgressIndicator.complete && assets.scoreProgressIndicator.naturalWidth > 0) {
                    const indicatorWidth = assets.scoreProgressIndicator.naturalWidth;
                    const indicatorHeight = assets.scoreProgressIndicator.naturalHeight;
                    
                    // 居中绘制指示器
                    ctx.drawImage(
                        assets.scoreProgressIndicator,
                        indicatorX - indicatorWidth / 2,
                        indicatorY - indicatorHeight / 2,
                        indicatorWidth,
                        indicatorHeight
                    );
                }
            }
            
            // ========== 右侧 - 连击显示 ==========
            if (comboSystem.active && comboSystem.count >= 2) {
                const comboX = canvas.width - 40; // X坐标再往右移
                const comboY = 180; // Y坐标保持不变
                
                ctx.save();
                
                // 设置右对齐
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                
                // 金色大字显示连击数（面积缩小20%：50px -> 40px）
                ctx.font = 'bold 40px "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif';
                
                // 黑色外描边（厚度+50%：4 -> 6）
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 6;
                ctx.strokeText('x' + Math.floor(comboSystem.displayCount) + 'HIT', comboX, comboY);
                
                // 色号#EDEA74
                ctx.fillStyle = '#EDEA74';
                ctx.fillText('x' + Math.floor(comboSystem.displayCount) + 'HIT', comboX, comboY);
                
                // 连击提示文字（面积缩小20%：20px -> 16px，描边厚度+50%：2 -> 3）
                ctx.font = 'bold 16px "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3;
                ctx.strokeText('COMBO!', comboX, comboY + 30); // 保持右对齐
                ctx.fillStyle = '#EDEA74';
                ctx.fillText('COMBO!', comboX, comboY + 30);
                
                ctx.restore();
            }
            
        }

        // ==================== 碰撞检测 ====================
        function checkCollisions() {
            // 水雷 vs 潜艇
            for (let mIndex = mines.length - 1; mIndex >= 0; mIndex--) {
                const mine = mines[mIndex];
                
                // 初始化水雷的已击中潜艇记录（如果没有）
                if (mine.hitSubs === undefined) {
                    mine.hitSubs = [];
                }
                
                let hitSubIndex = -1;
                for (let sIndex = submarines.length - 1; sIndex >= 0; sIndex--) {
                    const sub = submarines[sIndex];
                    // 检查是否已击中过这艘潜艇（避免重复击中同一艘）
                    if (mine.hitSubs.includes(sub)) {
                        continue;
                    }
                    
                    if (checkCollision(mine, sub)) {
                        // 触发连锁爆炸
                        triggerChainExplosion(sub);
                        
                        // 记录已击中的潜艇
                        mine.hitSubs.push(sub);
                        hitSubIndex = sIndex;
                        
                        // 穿甲效果：2级弹药可以穿透1艘潜艇击中第2艘
                        if (piercingActive && mine.hitSubs.length < 2) {
                            // 穿甲效果激活且只击中1艘，水雷继续下落，不销毁
                            break;
                        }
                        
                        // 非穿甲效果或已击中2艘，销毁水雷
                        mines.splice(mIndex, 1);
                        break; // 水雷已销毁，跳出潜艇循环
                    }
                }
                
                // 如果已经击中2艘潜艇，销毁水雷
                if (piercingActive && mine.hitSubs && mine.hitSubs.length >= 2) {
                    mines.splice(mIndex, 1);
                }
            }

            // 导弹 vs 玩家
            for (let mIndex = missiles.length - 1; mIndex >= 0; mIndex--) {
                const missile = missiles[mIndex];
                // 强敌来袭横幅显示期间，玩家无敌，跳过碰撞检测
                if (bossWarningEffect.active) {
                    continue;
                }
                
                if (checkCollision(missile, player)) {
                    createExplosion(player.x + player.width/2, player.y + player.height/2, true);
                    missiles.splice(mIndex, 1);

                    // 检查护盾效果
                    if (player.shield && player.shield.active) {
                        // 护盾激活，免疫伤害
                    } else {
                        hp -= 2; // 敌方导弹-2点生命值
                    }
                    
                    // 启动HP动画
                    hpAnimation.active = true;
                    hpAnimation.startTime = Date.now();
                    hpAnimation.fromHp = hpAnimation.displayHp;
                    hpAnimation.toHp = hp;
                    
                    // 触发玩家船抖动效果
                    player.shake.active = true;
                    player.shake.startTime = Date.now();
                    
                    // 触发全屏闪红效果
                    triggerDamageFlash();

                    if (hp <= 0 && !playerDefeatState.active) {
                        // 检查是否可以触发致命伤害免疫
                        if (!checkFatalDamageImmunity()) {
                            playerDefeated();
                        }
                    }
                }
            }

            // 玩家 vs 道具
            for (let pIndex = powerUps.length - 1; pIndex >= 0; pIndex--) {
                const pu = powerUps[pIndex];
                if (checkCollision(pu, player)) {
                    if (pu.type === 'hp') {
                        const newHp = Math.min(hp + maxHp * 0.3, maxHp);
                        
                        // 启动HP动画（恢复HP）
                        hpAnimation.active = true;
                        hpAnimation.startTime = Date.now();
                        hpAnimation.fromHp = hpAnimation.displayHp;
                        hpAnimation.toHp = newHp;
                        hp = newHp;
                    } else {
                        // 激活分裂水雷，设置30颗计数
                        splitMineActive = true;
                        splitMineCount = 30; // 持续30颗水雷
                        // 显示分裂水雷提示气泡
                        splitMineBubble.active = true;
                        splitMineBubble.startTime = Date.now();
                    }
                    powerUps.splice(pIndex, 1);
                }
            }

            // 水雷 vs Boss
            if (boss.active && boss.entryComplete) {
                for (let mIndex = mines.length - 1; mIndex >= 0; mIndex--) {
                    const mine = mines[mIndex];
                    if (checkMineBossCollision(mine)) {
                        // Boss被击中
                        mines.splice(mIndex, 1);
                        boss.hp = Math.max(0, boss.hp - BOSS_DEFENSE.mineDamage);
                        
                        // 启动血量动画
                        boss.hpAnimation.active = true;
                        boss.hpAnimation.startTime = Date.now();
                        boss.hpAnimation.fromHp = boss.displayHp;
                        boss.hpAnimation.toHp = boss.hp;
                        
                        // 玩家获得MP能量（攻击Boss也获得MP）
                        const newMp = Math.min(mp + 10, 100);
                        mpAnimation.active = true;
                        mpAnimation.startTime = Date.now();
                        mpAnimation.fromMp = mpAnimation.displayMp;
                        mpAnimation.toMp = newMp;
                        mp = newMp;
                        
                        // 创建爆炸效果
                        createExplosion(boss.x + boss.width / 2, boss.y + boss.height / 2);
                        
                        console.log('Boss被水雷击中，受到' + BOSS_DEFENSE.mineDamage + '点伤害，剩余HP：' + boss.hp);
                        
                        // 检查Boss是否被击败
                        if (boss.hp <= 0) {
                            bossDefeated();
                        }
                    }
                }
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function createExplosion(x, y, isPlayerHit = false, scoreValue = null) {
            const isGoldSub = scoreValue === 100;
            explosions.push({
                x: x,
                y: y,
                startTime: Date.now(),
                isPlayerHit: isPlayerHit, // 标记是否为击中玩家的爆炸
                scoreValue: scoreValue, // 本次攻击得到的分数（可选）
                isGoldSub: isGoldSub, // 是否是稀有潜艇（用于延长显示时间）
                animationDuration: isGoldSub ? 750 : 500 // 稀有潜艇动画时长+50%（750ms vs 500ms）
            });
        }

        // 连锁爆炸函数
        function triggerChainExplosion(initialSub) {
            const chainRadius = 300; // 连锁爆炸半径
            const explodedSubs = []; // 记录被炸掉的潜艇
            
            // 立即触发初始潜艇的受击效果
            if (initialSub.hitEffect) {
                initialSub.hitEffect.active = true;
                initialSub.hitEffect.startTime = Date.now();
            }
            
            // 找到所有在爆炸范围内的潜艇
            for (let i = submarines.length - 1; i >= 0; i--) {
                const sub = submarines[i];
                const dx = sub.x + sub.width/2 - (initialSub.x + initialSub.width/2);
                const dy = sub.y + sub.height/2 - (initialSub.y + initialSub.height/2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance <= chainRadius) {
                    explodedSubs.push({
                        sub: sub,
                        index: i,
                        distance: distance
                    });
                }
            }
            
            // 按距离排序，近的先爆炸
            explodedSubs.sort((a, b) => a.distance - b.distance);
            
            // 依次触发受击效果（先触发受击，0.5秒后再爆炸）
            explodedSubs.forEach((item, idx) => {
                const sub = item.sub;
                
                // 立即触发受击效果
                if (sub.hitEffect) {
                    sub.hitEffect.active = true;
                    sub.hitEffect.startTime = Date.now();
                }
                
                // 0.5秒后执行爆炸
                setTimeout(() => {
                    // 计算分数（应用连击倍率）
                    const baseScore = sub.isGold ? 100 : 10;
                    const multiplier = getComboMultiplier();
                    const scoreValue = Math.floor(baseScore * multiplier);
                    
                    createExplosion(sub.x + sub.width/2, sub.y + sub.height/2, false, scoreValue);
                    createFragments(sub.x + sub.width/2, sub.y + sub.height/2);
                    
                    if (sub.isGold) {
                        // 第一个稀有潜艇必定掉落分裂弹
                        const dropType = sub.isFirstGold ? 'split' : null;
                        dropPowerUp(sub.x, sub.y, dropType);
                    }
                    
                    // 从数组中移除
                    const subIndex = submarines.indexOf(sub);
                    if (subIndex > -1) {
                        submarines.splice(subIndex, 1);
                    }
                    
                    // 计分
                    score += scoreValue;
                    triggerCombo(); // 触发连击
                    
                    // 启动MP动画
                    const newMp = Math.min(mp + 10, 100);
                    mpAnimation.active = true;
                    mpAnimation.startTime = Date.now();
                    mpAnimation.fromMp = mpAnimation.displayMp;
                    mpAnimation.toMp = newMp;
                    mp = newMp;
                    
                    // 检查是否达到1000分，触发强敌来袭
                    checkBossWarning();
                }, 100 + idx * 50); // 先等待100ms受击效果，再按距离延迟（50ms间隔）
            });
            
            // 如果只有初始潜艇被炸（没有连锁），0.5秒后爆炸
            if (explodedSubs.length === 0) {
                setTimeout(() => {
                    // 计算分数（应用连击倍率）
                    const baseScore = initialSub.isGold ? 100 : 10;
                    const multiplier = getComboMultiplier();
                    const scoreValue = Math.floor(baseScore * multiplier);
                    createExplosion(initialSub.x + initialSub.width/2, initialSub.y + initialSub.height/2, false, scoreValue);
                    createFragments(initialSub.x + initialSub.width/2, initialSub.y + initialSub.height/2);
                    
                    if (initialSub.isGold) {
                        // 第一个稀有潜艇必定掉落分裂弹
                        const dropType = initialSub.isFirstGold ? 'split' : null;
                        dropPowerUp(initialSub.x, initialSub.y, dropType);
                    }
                    
                    const index = submarines.indexOf(initialSub);
                    if (index > -1) {
                        submarines.splice(index, 1);
                    }
                    
                    // 计分（应用连击倍率）
                    score += scoreValue;
                    triggerCombo(); // 触发连击
                    
                    // 启动MP动画
                    const newMp2 = Math.min(mp + 10, 100);
                    mpAnimation.active = true;
                    mpAnimation.startTime = Date.now();
                    mpAnimation.fromMp = mpAnimation.displayMp;
                    mpAnimation.toMp = newMp2;
                    mp = newMp2;
                    
                    // 检查是否达到1000分，触发强敌来袭
                    checkBossWarning();
                }, 100); // 0.1秒后爆炸
            }
        }
        
        // 检查是否触发强敌来袭横幅
        function checkBossWarning() {
            if (score >= 1000 && !bossWarningEffect.shown && !bossWarningEffect.active) {
                bossWarningEffect.active = true;
                bossWarningEffect.shown = true;
                bossWarningEffect.startTime = Date.now();
                bossWarningEffect.currentY = bossWarningEffect.entryOffset;
            }
        }

        // 碎片颜色选项
        const fragmentColors = [
            'rgba(139, 69, 19, ',   // 棕色
            'rgba(160, 82, 45, ',   // 赭色
            'rgba(205, 133, 63, ',  // 秘鲁色
            'rgba(218, 165, 32, ',  // 金黄色
            'rgba(184, 134, 11, ',  // 暗金黄色
            'rgba(128, 128, 128, ', // 灰色
            'rgba(169, 169, 169, ', // 深灰色
            'rgba(255, 140, 0, ',   // 深橙色
            'rgba(255, 69, 0, ',    // 红橙色
            'rgba(139, 0, 0, '      // 深红色
        ];

        function createFragments(x, y) {
            // 碎片数量增加30%：12 * 1.3 ≈ 16
            for (let i = 0; i < 16; i++) {
                // 随机选择一个颜色
                const colorBase = fragmentColors[Math.floor(Math.random() * fragmentColors.length)];
                
                fragments.push({
                    x: x,
                    y: y,
                    size: 8 + Math.random() * 16,
                    speedX: (Math.random() - 0.5) * 6,
                    speedY: 2 + Math.random() * 3,
                    alpha: 1,
                    color: colorBase
                });
            }
        }

        function dropPowerUp(x, y, forceType = null) {
            // 如果指定了强制类型，使用强制类型；否则随机
            const type = forceType || (Math.random() > 0.5 ? 'hp' : 'range');
            // 根据道具类型设置不同尺寸
            let dimensions;
            if (type === 'hp') {
                dimensions = { width: 62, height: 47 };
            } else if (type === 'range') {
                dimensions = { width: 74, height: 59 };
            } else if (type === 'split') {
                dimensions = { width: 74, height: 59 }; // 分裂弹尺寸
            }
            powerUps.push({
                x: x,
                y: y,
                width: dimensions.width,
                height: dimensions.height,
                type: type
            });
        }

        // ==================== 输入处理 ====================
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            // 检测玩家操作，记录移动和发射状态
            if (controlHintBubble.active) {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    controlHintBubble.hasPlayerMoved = true;
                    console.log('玩家移动 detected');
                }
                if (e.key === ' ') {
                    controlHintBubble.hasPlayerFired = true;
                    console.log('玩家发射 detected');
                }
                // 只有同时完成移动和发射后，气泡才消失
                if (controlHintBubble.hasPlayerMoved && controlHintBubble.hasPlayerFired) {
                    controlHintBubble.active = false;
                    console.log('玩家完成所有操作，隐藏操作提示气泡');
                }
            }

            if (gameState.currentScreen === 'game') {
                // 暂停功能 - 回车键暂停/继续
                if (e.key === 'Enter' && !gameOver) {
                    togglePause();
                    return;
                }
                
                // 暂停状态下的菜单导航
                if (gamePaused) {
                    if (e.key === 'ArrowUp') {
                        pauseOption = (pauseOption - 1 + 3) % 3;
                        updatePauseButtons();
                        return;
                    }
                    if (e.key === 'ArrowDown') {
                        pauseOption = (pauseOption + 1) % 3;
                        updatePauseButtons();
                        return;
                    }
                    if (e.key === ' ') {
                        handlePauseAction();
                        return;
                    }
                }
                
                // 游戏结束菜单导航
                if (gameOver) {
                    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                        // 上下键切换选项
                        gameOverOption = gameOverOption === 0 ? 1 : 0;
                        return;
                    }
                    
                    if (e.key === 'Enter') {
                        handleGameOverAction();
                        return;
                    }
                }
                
                if (e.key === ' ' && mineAmmo > 0 && !gameOver && !gamePaused && hp > 0) {
                    mines.push({
                        x: player.x + player.width / 2 - 30,
                        y: player.y + player.height,
                        width: 60,
                        height: 61,
                        speed: 5,
                        isSplitMine: splitMineActive, // 是否为分裂水雷
                        hasSplit: false // 是否已经分裂过
                    });
                    mineAmmo--;
                    mineRegenTime = Date.now();
                    
                    // 如果发射的是分裂水雷，减少计数
                    if (splitMineActive) {
                        splitMineCount--;
                        // 30颗发射完毕后关闭分裂水雷
                        if (splitMineCount <= 0) {
                            splitMineActive = false;
                            splitMineBubble.active = false;
                        }
                    }
                }

                if ((e.key === 'z' || e.key === 'Z') && !gameOver) {
                    if (mp >= 100) {
                        useSuperWeapon();
                    }
                }
                
                // 测试功能：按 T 键直接增加500分，触发强敌来袭横幅
                if ((e.key === 't' || e.key === 'T') && !gameOver) {
                    score += 500;
                    console.log('测试：分数增加到 ' + score);
                    checkBossWarning();
                }
                
                // 金手指：按 M 键直接满MP，测试超级武器
                if ((e.key === 'm' || e.key === 'M') && !gameOver) {
                    mp = 100;
                    console.log('金手指：MP已充满！');
                }
                
                // 作弊键：按 P 键直接通关
                if ((e.key === 'p' || e.key === 'P') && !gameOver) {
                    console.log('作弊：直接通关！');
                    // 直接击败Boss
                    boss.hp = 0;
                    gameOver = true; // 立即停止游戏更新，防止连击超时
                    bossDefeatState.showBubble = true;
                    bossDefeatState.bubbleStartTime = Date.now();
                    bossDefeatState.explosions = [];
                    boss.active = false;
                    // 记录通关时间
                    finalGameTime = Date.now() - gameStartTime;
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // ==================== 暂停功能 ====================
        
        // 切换暂停状态
        function togglePause() {
            if (gamePaused) {
                resumeGame();
            } else {
                pauseGame();
            }
        }
        
        // 暂停游戏
        function pauseGame() {
            gamePaused = true;
            pauseOption = 0;
            showPauseScreen();
            updatePauseButtons();
        }
        
        // 继续游戏
        function resumeGame() {
            gamePaused = false;
            hidePauseScreen();
        }
        
        // 显示暂停画面
        function showPauseScreen() {
            const pauseScreen = document.getElementById('pauseScreen');
            pauseScreen.classList.add('active');
        }
        
        // 隐藏暂停画面
        function hidePauseScreen() {
            const pauseScreen = document.getElementById('pauseScreen');
            pauseScreen.classList.remove('active');
        }
        
        // 更新暂停按钮状态
        function updatePauseButtons() {
            const btnResume = document.getElementById('btnResume');
            const btnRetry = document.getElementById('btnRetryPause');
            const btnConfig = document.getElementById('btnConfigPause');
            
            btnResume.classList.toggle('active', pauseOption === 0);
            btnRetry.classList.toggle('active', pauseOption === 1);
            btnConfig.classList.toggle('active', pauseOption === 2);
        }
        
        // 处理暂停选项
        function handlePauseAction() {
            switch (pauseOption) {
                case 0: // 继续游戏
                    resumeGame();
                    break;
                case 1: // 重新挑战
                    hidePauseScreen();
                    resetGame();
                    break;
                case 2: // 配置战舰
                    transitionToSkillPanel('pause');
                    break;
            }
        }
        
        // 暂停画面按钮事件
        const btnResumeEl = document.getElementById('btnResume');
        const btnRetryPauseEl = document.getElementById('btnRetryPause');
        const btnConfigPauseEl = document.getElementById('btnConfigPause');
        
        btnResumeEl.addEventListener('click', () => {
            if (!gamePaused) return;
            pauseOption = 0;
            handlePauseAction();
        });
        
        btnResumeEl.addEventListener('mouseenter', () => {
            if (!gamePaused) return;
            pauseOption = 0;
            updatePauseButtons();
        });
        
        btnRetryPauseEl.addEventListener('click', () => {
            if (!gamePaused) return;
            pauseOption = 1;
            handlePauseAction();
        });
        
        btnRetryPauseEl.addEventListener('mouseenter', () => {
            if (!gamePaused) return;
            pauseOption = 1;
            updatePauseButtons();
        });
        
        btnConfigPauseEl.addEventListener('click', () => {
            if (!gamePaused) return;
            pauseOption = 2;
            handlePauseAction();
        });
        
        btnConfigPauseEl.addEventListener('mouseenter', () => {
            if (!gamePaused) return;
            pauseOption = 2;
            updatePauseButtons();
        });
        
        // 游戏结束画面按钮事件
        const btnRetryEl = document.getElementById('btnRetry');
        const btnConfigEl = document.getElementById('btnConfig');
        
        btnRetryEl.addEventListener('click', () => {
            if (!gameOver) return;
            gameOverOption = 0;
            handleGameOverAction();
        });
        
        btnRetryEl.addEventListener('mouseenter', () => {
            if (!gameOver) return;
            gameOverOption = 0;
            updateGameOverButtons();
        });
        
        btnRetryEl.addEventListener('mouseleave', () => {
            if (!gameOver) return;
            btnRetryEl.classList.remove('active');
        });
        
        btnConfigEl.addEventListener('click', () => {
            if (!gameOver) return;
            gameOverOption = 1;
            handleGameOverAction();
        });
        
        btnConfigEl.addEventListener('mouseenter', () => {
            if (!gameOver) return;
            gameOverOption = 1;
            updateGameOverButtons();
        });
        
        btnConfigEl.addEventListener('mouseleave', () => {
            if (!gameOver) return;
            btnConfigEl.classList.remove('active');
        });
        
        // 处理游戏结束选项
        function handleGameOverAction() {
            if (gameOverOption === 0) {
                // 重新挑战 - 重置选项并重新开始
                hideGameOverScreen();
                gameOverOption = 0;
                initGame();
            } else {
                // 重新配置战船 - 返回技能面板
                transitionToSkillPanel('gameover');
            }
        }

        // 触发受攻击闪红效果
        function triggerDamageFlash() {
            const damageFlash = document.getElementById('damageFlash');
            damageFlash.classList.add('active');
            setTimeout(() => {
                damageFlash.classList.remove('active');
            }, 150);
        }

        function useSuperWeapon() {
            // 启动MP动画（清空MP）
            mpAnimation.active = true;
            mpAnimation.startTime = Date.now();
            mpAnimation.fromMp = mpAnimation.displayMp;
            mpAnimation.toMp = 0;
            mp = 0;
            
            // 激活超级武器特效（动画展示2秒）
            superWeaponEffect.active = true;
            superWeaponEffect.startTime = Date.now();
            superWeaponEffect.entryOffset = 1920; // 重置入场偏移
            
            // 激活时停效果（游戏暂停0.3秒，直到清屏完成）
            timeStopEffect.active = true;
            timeStopEffect.startTime = Date.now();
            timeStopEffect.duration = 300; // 0.3秒时停
            
            // 0.3秒后执行清屏
            setTimeout(() => {
                // 清空所有敌方导弹
                missiles.forEach(missile => {
                    createExplosion(missile.x + missile.width/2, missile.y + missile.height/2);
                });
                missiles = [];
                
                // 清空Boss发出的子弹
                bossBullets.forEach(bullet => {
                    createExplosion(bullet.x, bullet.y);
                });
                bossBullets = [];
                
                // 清空Boss发出的导弹
                bossMissiles.forEach(missile => {
                    createExplosion(missile.x + missile.width/2, missile.y + missile.height/2);
                });
                bossMissiles = [];
                
                // 消灭所有潜艇
                submarines.forEach(sub => {
                    // 计算分数（应用连击倍率）
                    const baseScore = sub.isGold ? 100 : 10;
                    const multiplier = getComboMultiplier();
                    const scoreValue = Math.floor(baseScore * multiplier);
                    createExplosion(sub.x + sub.width/2, sub.y + sub.height/2, false, scoreValue);
                    createFragments(sub.x + sub.width/2, sub.y + sub.height/2);
                    // 金色潜艇掉落道具
                    if (sub.isGold) {
                        // 第一个稀有潜艇必定掉落分裂弹
                        const dropType = sub.isFirstGold ? 'split' : null;
                        dropPowerUp(sub.x, sub.y, dropType);
                    }
                    // 计分
                    score += scoreValue;
                    triggerCombo(); // 触发连击
                });
                
                submarines = [];
                
                // 对Boss造成伤害（如果Boss在场）
                if (boss.active && boss.entryComplete) {
                    boss.hp = Math.max(0, boss.hp - BOSS_DEFENSE.superWeaponDamage);
                    
                    // 启动血量动画
                    boss.hpAnimation.active = true;
                    boss.hpAnimation.startTime = Date.now();
                    boss.hpAnimation.fromHp = boss.displayHp;
                    boss.hpAnimation.toHp = boss.hp;
                    
                    // 创建大爆炸效果
                    createExplosion(boss.x + boss.width / 2, boss.y + boss.height / 2);
                    createFragments(boss.x + boss.width / 2, boss.y + boss.height / 2);
                    
                    console.log('Boss被超级武器击中，受到' + BOSS_DEFENSE.superWeaponDamage + '点伤害，剩余HP：' + boss.hp);
                    
                    // 检查Boss是否被击败
                    if (boss.hp <= 0) {
                        bossDefeated();
                    }
                }
            }, 300);
            
            // 时停结束后重新生成潜艇（Boss战期间不生成）
            setTimeout(() => {
                timeStopEffect.active = false;
                // Boss出场或被击败后不再生成新潜艇
                if (!boss.active && !bossDefeatState.showBubble) {
                    initSubmarines();
                }
            }, 400);
        }

        // ==================== 启动游戏 ====================
        window.onload = initLoading;
    </script>
</body>
</html>
