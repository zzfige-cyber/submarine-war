<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜艇大战 - 深海猎手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a1628;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        #gameContainer {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(180deg, #1a3a5c 0%, #0d2137 50%, #061220 100%);
            overflow: hidden;
        }
        
        /* 加载页面 */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #222222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loadingLogo {
            width: 528px;
            height: 345px;
            object-fit: contain;
        }
        
        .loadingBarContainer {
            display: flex;
            align-items: center;
            margin-top: 127px;
            width: 520px;
            height: 14px;
            background: #5f5f5f;
            overflow: hidden;
        }
        
        .loadingProgress {
            height: 100%;
            background: #b5fe12;
            width: 0%;
            transition: width 0.3s;
        }
        
        .loadingText {
            margin-top: 14px;
            color: #ffffff;
            font-family: "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 24px;
            letter-spacing: -1.2px;
        }
        
        /* 技能配置面板 - 使用截图作为背景 */
        #skillPanel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: none;
            z-index: 900;
            overflow: hidden;
        }
        
        /* 背景层 - 技能配置界面背景图 */
        .skillBg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/skill_bg.png?v=2');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            z-index: 1;
        }
        
        /* 技能面板容器 - 使用截图作为背景 */
        .skillPanelWrapper {
            position: absolute;
            top: 150px;
            left: 200px;
            width: 518px;
            height: 556px;
            background-image: url('.figma/image/screenshot_211_626.png');
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 10;
        }
        
        /* 剩余技能点数值 - 定位到截图上的位置 */
        .skillPointsValue {
            position: absolute;
            top: 110px;
            left: 350px;
            color: #d9fa05;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 34px;
            font-weight: 700;
            transform: rotate(12deg);
        }
        
        /* 技能按钮区域 - 绝对定位到截图上的位置 */
        .skillButtonsContainer {
            position: absolute;
            top: -15px;
            left: -35px;
            width: 100%;
            height: 100%;
        }
        
        /* 减号按钮 - 移动速度 */
        .skillBtnMinus1 {
            position: absolute;
            top: 238px;
            left: 340px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(2deg);
        }
        
        /* 加号按钮 - 移动速度 */
        .skillBtnPlus1 {
            position: absolute;
            top: 240px;
            left: 455px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(2deg);
        }
        
        /* 减号按钮 - 装甲厚度 */
        .skillBtnMinus2 {
            position: absolute;
            top: 328px;
            left: 355px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(-2deg);
        }
        
        /* 加号按钮 - 装甲厚度 */
        .skillBtnPlus2 {
            position: absolute;
            top: 328px;
            left: 470px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(-2deg);
        }
        
        /* 减号按钮 - 弹药库 */
        .skillBtnMinus3 {
            position: absolute;
            top: 420px;
            left: 365px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(-4deg);
        }
        
        /* 加号按钮 - 弹药库 */
        .skillBtnPlus3 {
            position: absolute;
            top: 408px;
            left: 480px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(-4deg);
        }
        
        .skillButtonsContainer button img {
            width: 100%;
            height: 28px;
        }
        
        /* hpPlus按钮内图片特殊定位 */
        #hpPlusImg {
            position: relative;
            top: -15px;
        }
        
        .skillButtonsContainer button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .skillButtonsContainer button:not(:disabled) {
            transition: transform 0.2s ease;
        }
        
        .skillButtonsContainer button:not(:disabled):hover {
            transform: scale(1.3);
        }
        
        /* 技能点指示器 - 定位到截图上的位置 */
        .skillDotsContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* 技能点 - 移动速度 */
        .skillDotsRow1 {
            position: absolute;
            top: 230px;
            left: 350px;
            display: flex;
            align-items: center;
            gap: 4px;
            transform: rotate(2deg);
        }
        
        /* 技能点 - 装甲厚度 */
        .skillDotsRow2 {
            position: absolute;
            top: 312px;
            left: 365px;
            display: flex;
            align-items: center;
            gap: 4px;
            transform: rotate(-5deg);
        }
        
        /* 技能点 - 弹药库 */
        .skillDotsRow3 {
            position: absolute;
            top: 408px;
            left: 385px;
            display: flex;
            align-items: center;
            gap: 4px;
            transform: rotate(-4deg);
        }
        
        .skillDot {
            width: 17px;
            height: 17px;
        }
        
        /* hpLevel内第二个skillDot使用static定位 */
        #hpLevel > .skillDot:nth-child(2) {
            position: static;
        }
        
        .skillDot img {
            width: 100%;
            height: 100%;
        }
        
        /* 玩家船只展示 */
        .playerShipDisplay {
            position: absolute;
            top: 486px;
            left: 850px;
            width: 522px;
            height: 223px;
            z-index: 15;
        }
        
        /* 船只重量动画 - 下沉又上浮 */
        @keyframes shipWeightBounce {
            0% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(15px);
            }
            60% {
                transform: translateY(-5px);
            }
            100% {
                transform: translateY(0);
            }
        }
        
        .ship-weight-animation {
            animation: shipWeightBounce 0.6s ease-out;
        }
        
        .playerShipDisplay img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* 涡轮增压层 - 在最下层 */
        .shipTurbo {
            z-index: 1;
            display: none;
        }
        
        .shipTurbo.active {
            display: block;
        }
        
        /* 涡轮增压特定样式 */
        #shipTurbo {
            width: 115px;
            top: 27px;
            left: 13px;
        }
        
        /* 弹药库层 */
        .shipAmmo {
            z-index: 2;
            display: none;
        }
        
        .shipAmmo.active {
            display: block;
        }
        
        /* 弹药库特定样式 */
        #shipAmmo {
            width: 60px;
            left: 364px;
            top: 19px;
            z-index: 2;
        }
        
        /* 船只基础层 */
        .shipBase {
            z-index: 3;
        }
        
        /* 船只基础特定样式 */
        #shipBase {
            top: 0px;
        }
        
        /* 装甲层 - 在最上层 */
        .shipArmor {
            z-index: 4;
            display: none;
        }
        
        .shipArmor.active {
            display: block;
        }
        
        /* 装甲特定样式 */
        #shipArmor {
            width: 240px;
            left: 84px;
            top: 55px;
        }
        
        /* 开始游戏按钮 - 使用图片素材 */
        .startGameBtnWrapper {
            position: absolute;
            top: 660px;
            left: 349px;
            z-index: 20;
        }
        
        .startGameBtn {
            width: 355px;
            height: 268px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
        }
        
        .startGameBtn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .startGameBtn:disabled {
            cursor: not-allowed;
        }
        
        .startGameBtn:not(:disabled) {
            transition: transform 0.2s ease;
        }
        
        .startGameBtn:not(:disabled):hover {
            transform: scale(1.05);
        }
        
        /* 游戏画布 */
        #gameCanvas {
            display: none;
            width: 100%;
            height: 100%;
        }
        
        /* 受攻击闪红效果 */
        #damageFlash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0);
            pointer-events: none;
            z-index: 500;
            transition: background 0.1s ease-out;
        }
        
        #damageFlash.active {
            background: rgba(255, 0, 0, 0.25);
        }
        
        /* 游戏结束画面 */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1000;
        }
        
        #gameOverScreen.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .gameOverOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            transition: background 0.5s ease;
        }
        
        #gameOverScreen.active .gameOverOverlay {
            background: rgba(0, 0, 0, 0.65);
        }
        
        .gameOverContent {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .gameOverTitle {
            width: 1000px;
            height: auto;
            margin-top: -60px;
            z-index: 2;
        }
        
        .scorePanel {
            position: absolute;
            top: 260px;
            left: 336px;
            width: 514px;
            height: auto;
            margin-bottom: 20px;
            z-index: 3;
        }
        
        .scorePanelBg {
            width: 100%;
            height: auto;
        }
        
        .finalScore {
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translateY(-50%);
            color: #e8f05c;
            font-family: "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            font-size: 50px;
            font-weight: bold;
        }
        
        .gameOverButtons {
            position: relative;
            width: 972px;
            height: 179px;
            margin-top: 20px;
        }
        
        .gameOverBtn {
            position: absolute;
            height: auto;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.6;
        }
        
        .gameOverBtn:hover,
        .gameOverBtn.active {
            opacity: 1;
            transform: scale(1.08);
        }
        
        #btnRetry {
            width: 488px;
            height: 172px;
            left: 49px;
            top: 0px;
            opacity: 1;
        }
        
        #btnRetry:hover,
        #btnRetry.active {
            transform: scale(1.1);
        }
        
        #btnConfig {
            width: 492px;
            height: 207px;
            left: 459px;
            top: -33px;
            opacity: 1;
        }
        
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- 加载页面 -->
        <div id="loadingScreen">
            <img src="assets/logo.png" alt="潜艇大作战" class="loadingLogo">
            <div class="loadingBarContainer">
                <div class="loadingProgress" id="loadingProgress"></div>
            </div>
            <div class="loadingText" id="loadingText">正在加载海底地形</div>
        </div>
        
        <!-- 技能配置面板 -->
        <div id="skillPanel">
            <!-- 背景层 -->
            <div class="skillBg"></div>
            
            <!-- 玩家船只展示 -->
            <div class="playerShipDisplay">
                <img src=".figma/image/screenshot_211_704.png" alt="战舰基础" class="shipBase" id="shipBase">
                <img src=".figma/image/screenshot_218_1099.png" alt="涡轮增压" class="shipTurbo" id="shipTurbo">
                <img src=".figma/image/screenshot_218_1105.png" alt="装甲" class="shipArmor" id="shipArmor">
                <img src=".figma/image/screenshot_218_1100.png" alt="火药桶" class="shipAmmo" id="shipAmmo">
            </div>
            
            <!-- 技能面板容器 - 使用截图作为背景 -->
            <div class="skillPanelWrapper">
                <!-- 剩余技能点数值 -->
                <span class="skillPointsValue" id="remainingPoints">5/5</span>
                
                <!-- 技能按钮区域 -->
                <div class="skillButtonsContainer">
                    <!-- 移动速度按钮 -->
                    <button class="skillBtnMinus1" id="speedMinus" onclick="adjustSkill('speed', -1)">
                        <img src="assets/btn_minus_disabled.png" id="speedMinusImg" alt="-">
                    </button>
                    <button class="skillBtnPlus1" id="speedPlus" onclick="adjustSkill('speed', 1)">
                        <img src="assets/btn_plus_enabled.png" id="speedPlusImg" alt="+">
                    </button>
                    
                    <!-- 装甲厚度按钮 -->
                    <button class="skillBtnMinus2" id="hpMinus" onclick="adjustSkill('hp', -1)">
                        <img src="assets/btn_minus_disabled.png" id="hpMinusImg" alt="-">
                    </button>
                    <button class="skillBtnPlus2" id="hpPlus" onclick="adjustSkill('hp', 1)">
                        <img src="assets/btn_plus_enabled.png" id="hpPlusImg" alt="+">
                    </button>
                    
                    <!-- 弹药库按钮 -->
                    <button class="skillBtnMinus3" id="ammoMinus" onclick="adjustSkill('ammo', -1)">
                        <img src="assets/btn_minus_disabled.png" id="ammoMinusImg" alt="-">
                    </button>
                    <button class="skillBtnPlus3" id="ammoPlus" onclick="adjustSkill('ammo', 1)">
                        <img src="assets/btn_plus_enabled.png" id="ammoPlusImg" alt="+">
                    </button>
                </div>
                
                <!-- 技能点指示器 -->
                <div class="skillDotsContainer">
                    <div class="skillDotsRow1" id="speedLevel">
                        <div class="skillDot"><img src="assets/skill_dot_empty.png" alt=""></div>
                        <div class="skillDot"><img src="assets/skill_dot_empty.png" alt=""></div>
                        <div class="skillDot"><img src="assets/skill_dot_empty.png" alt=""></div>
                    </div>
                    <div class="skillDotsRow2" id="hpLevel">
                        <div class="skillDot"><img src="assets/skill_dot_empty.png" alt=""></div>
                        <div class="skillDot"><img src="assets/skill_dot_empty.png" alt=""></div>
                        <div class="skillDot"><img src="assets/skill_dot_empty.png" alt=""></div>
                    </div>
                    <div class="skillDotsRow3" id="ammoLevel">
                        <div class="skillDot"><img src="assets/skill_dot_empty.png" alt=""></div>
                        <div class="skillDot"><img src="assets/skill_dot_empty.png" alt=""></div>
                    </div>
                </div>
            </div>
            
            <!-- 开始游戏按钮 -->
            <div class="startGameBtnWrapper">
                <button class="startGameBtn" id="startGameBtn" onclick="startGame()" disabled>
                    <img src="assets/btn_start_disabled.png" id="startGameBtnImg" alt="启航 STAR GAME">
                </button>
            </div>
        </div>
        
        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="1920" height="1080"></canvas>
        
        <!-- 受攻击闪红效果 -->
        <div id="damageFlash"></div>
        
        <!-- 游戏结束画面 -->
        <div id="gameOverScreen">
            <div class="gameOverOverlay"></div>
            <div class="gameOverContent">
                <div class="scorePanel">
                    <img src=".figma/image/screenshot_222_1203.png" alt="最终得分" class="scorePanelBg">
                    <span class="finalScore" id="finalScore">0</span>
                </div>
                <img src=".figma/image/screenshot_222_1196.png" alt="GAME OVER" class="gameOverTitle">
                <div class="gameOverButtons">
                    <img src=".figma/image/screenshot_222_1157.png" alt="重新挑战" class="gameOverBtn" id="btnRetry" data-option="0">
                    <img src=".figma/image/screenshot_222_1158.png" alt="配置战舰" class="gameOverBtn" id="btnConfig" data-option="1">
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 响应式缩放 ====================
        function updateGameScale() {
            const container = document.getElementById('gameContainer');
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const gameWidth = 1920;
            const gameHeight = 1080;
            
            // 计算缩放比例，保持宽高比
            const scaleX = windowWidth / gameWidth;
            const scaleY = windowHeight / gameHeight;
            const scale = Math.min(scaleX, scaleY);
            
            // 应用缩放并居中
            container.style.transform = `scale(${scale})`;
            container.style.position = 'absolute';
            container.style.left = '50%';
            container.style.top = '50%';
            container.style.marginLeft = -(gameWidth / 2) + 'px';
            container.style.marginTop = -(gameHeight / 2) + 'px';
            
            // 调整容器尺寸
            container.style.width = gameWidth + 'px';
            container.style.height = gameHeight + 'px';
        }
        
        // 初始化缩放
        updateGameScale();
        
        // 窗口大小改变时更新缩放
        window.addEventListener('resize', updateGameScale);
        
        // ==================== 游戏配置 ====================
        const GAME_CONFIG = {
            canvas: {
                width: 1920,
                height: 1080
            },
            skillSystem: {
                totalPoints: 5,
                maxLevel: {
                    speed: 3,
                    hp: 3,
                    ammo: 2
                }
            },
            player: {
                baseSpeed: 5,
                baseMaxHp: 100,
                baseAmmo: 3
            }
        };

        // ==================== 游戏状态 ====================
        let gameState = {
            currentScreen: 'loading', // loading, skill, game
            loadingProgress: 0,
            skillPoints: {
                speed: 0,
                hp: 0,
                ammo: 0
            },
            assetsLoaded: false
        };

        // ==================== 素材系统 ====================
        const assets = {
            background: new Image(),
            backgroundWide: new Image(),
            playerShip: new Image(),
            playerShipArmor: new Image(),
            playerShipTurbo: new Image(),
            shipBase: new Image(),
            shipTurbo: new Image(),
            shipArmor: new Image(),
            shipAmmo: new Image(),
            submarine: new Image(),
            submarine2: new Image(),
            goldSubmarine: new Image(),
            missile: new Image(),
            mine: new Image(),
            explosion: new Image(),
            powerUpHp: new Image(),
            powerUpRange: new Image(),
            superWeaponBg: new Image(),
            gameOverTitle: new Image(),
            btnRetry: new Image(),
            btnConfig: new Image(),
            scorePanel: new Image()
        };

        const assetPaths = {
            background: 'assets/background.png',
            backgroundWide: '.figma/image/screenshot_218_1106.png',
            playerShip: 'assets/player_ship.png',
            playerShipArmor: 'assets/player_ship_armor.png',
            playerShipTurbo: 'assets/player_ship_turbo.png',
            shipBase: '.figma/image/screenshot_211_704.png?v=2',
            shipTurbo: '.figma/image/screenshot_218_1099.png?v=2',
            shipArmor: '.figma/image/screenshot_218_1105.png?v=2',
            shipAmmo: '.figma/image/screenshot_218_1100.png?v=2',
            submarine: '.figma/image/screenshot_198_313.png',
            submarine2: '.figma/image/screenshot_202_32.png',
            goldSubmarine: '.figma/image/screenshot_198_304.png',
            missile: '.figma/image/screenshot_199_12.png',
            mine: '.figma/image/screenshot_202_60.png',
            explosion: 'assets/explosion.png',
            powerUpHp: '.figma/image/screenshot_226_1243.png',
            powerUpRange: '.figma/image/screenshot_226_1260.png',
            superWeaponBg: '.figma/image/screenshot_202_206.png',
            gameOverTitle: '.figma/image/screenshot_222_1196.png',
            btnRetry: '.figma/image/screenshot_222_1157.png',
            btnConfig: '.figma/image/screenshot_222_1158.png',
            scorePanel: '.figma/image/screenshot_222_1203.png'
        };
        
        // 背景滚动状态
        let backgroundScrollX = 0;
        const backgroundScrollSpeed = 0.5; // 滚动速度，越小越慢
        
        // 超级武器特效状态
        let superWeaponEffect = {
            active: false,
            startTime: 0,
            duration: 2000, // 特效持续2秒
            entryOffset: 1920 // 入场偏移量（从右侧进入）
        };

        // ==================== 加载系统 ====================
        function initLoading() {
            const totalAssets = Object.keys(assets).length;
            let loadedCount = 0;

            function updateProgress() {
                loadedCount++;
                const progress = Math.floor((loadedCount / totalAssets) * 100);
                gameState.loadingProgress = progress;
                
                document.getElementById('loadingProgress').style.width = progress + '%';
                document.getElementById('loadingText').textContent = `加载素材... ${progress}%`;

                if (loadedCount === totalAssets) {
                    gameState.assetsLoaded = true;
                    console.log('所有素材加载完成');
                    setTimeout(() => {
                        showSkillPanel();
                    }, 500);
                }
            }

            // 立即开始加载素材
            document.getElementById('loadingText').textContent = `加载素材... 0%`;
            
            for (const key in assets) {
                assets[key].src = assetPaths[key];
                
                // 检查是否已经缓存
                if (assets[key].complete) {
                    console.log(`素材 ${key} 已缓存`);
                    updateProgress();
                } else {
                    assets[key].onload = () => {
                        console.log(`素材 ${key} 加载成功`);
                        updateProgress();
                    };
                    assets[key].onerror = () => {
                        console.warn(`素材 ${key} 加载失败，使用备用方案`);
                        updateProgress();
                    };
                }
            }
        }

        // ==================== 技能系统 ====================
        function showSkillPanel() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('skillPanel').style.display = 'flex';
            gameState.currentScreen = 'skill';
            updateSkillUI();
        }

        function adjustSkill(skill, delta) {
            const currentLevel = gameState.skillPoints[skill];
            const maxLevel = GAME_CONFIG.skillSystem.maxLevel[skill];
            const usedPoints = Object.values(gameState.skillPoints).reduce((a, b) => a + b, 0);
            const remainingPoints = GAME_CONFIG.skillSystem.totalPoints - usedPoints;

            if (delta > 0 && currentLevel < maxLevel && remainingPoints > 0) {
                gameState.skillPoints[skill]++;
            } else if (delta < 0 && currentLevel > 0) {
                gameState.skillPoints[skill]--;
            }

            updateSkillUI();
        }

        function updateSkillUI() {
            const usedPoints = Object.values(gameState.skillPoints).reduce((a, b) => a + b, 0);
            const remainingPoints = GAME_CONFIG.skillSystem.totalPoints - usedPoints;

            document.getElementById('remainingPoints').textContent = `${remainingPoints}/${GAME_CONFIG.skillSystem.totalPoints}`;

            // 更新各技能显示
            ['speed', 'hp', 'ammo'].forEach(skill => {
                const level = gameState.skillPoints[skill];
                const maxLevel = GAME_CONFIG.skillSystem.maxLevel[skill];
                const dots = document.querySelectorAll(`#${skill}Level .skillDot img`);
                
                dots.forEach((dot, index) => {
                    dot.src = index < level ? 'assets/skill_dot_active.png' : 'assets/skill_dot_empty.png';
                });

                // 更新按钮状态和图片
                const minusBtn = document.getElementById(`${skill}Minus`);
                const plusBtn = document.getElementById(`${skill}Plus`);
                const minusImg = document.getElementById(`${skill}MinusImg`);
                const plusImg = document.getElementById(`${skill}PlusImg`);
                
                // 减号按钮：等级为0时不可用
                minusBtn.disabled = level === 0;
                minusImg.src = level === 0 ? 'assets/btn_minus_disabled.png' : 'assets/btn_minus_enabled.png';
                
                // 加号按钮：达到最大等级或没有剩余点数时不可用
                plusBtn.disabled = level >= maxLevel || remainingPoints === 0;
                plusImg.src = (level >= maxLevel || remainingPoints === 0) ? 'assets/btn_plus_disabled.png' : 'assets/btn_plus_enabled.png';
            });

            // 更新开始游戏按钮
            const startBtn = document.getElementById('startGameBtn');
            const startBtnImg = document.getElementById('startGameBtnImg');
            startBtn.disabled = remainingPoints > 0;
            startBtnImg.src = remainingPoints > 0 ? 'assets/btn_start_disabled.png' : 'assets/btn_start_enabled.png';
            
            // 更新船只展示图片
            updateSkillPanelShip();
        }
        
        // 保存上一次的技能等级，用于检测变化
        let lastSkillLevels = { speed: 0, hp: 0, ammo: 0 };
        
        function updateSkillPanelShip() {
            const speedLevel = gameState.skillPoints.speed;
            const hpLevel = gameState.skillPoints.hp;
            const ammoLevel = gameState.skillPoints.ammo;
            
            // 获取各层元素
            const shipTurbo = document.getElementById('shipTurbo');
            const shipArmor = document.getElementById('shipArmor');
            const shipAmmo = document.getElementById('shipAmmo');
            const shipDisplay = document.querySelector('.playerShipDisplay');
            
            // 检测是否有新增的技能点（总等级增加）
            const currentTotal = speedLevel + hpLevel + ammoLevel;
            const lastTotal = lastSkillLevels.speed + lastSkillLevels.hp + lastSkillLevels.ammo;
            const hasNewSkill = currentTotal > lastTotal;
            
            // 根据技能等级显示/隐藏对应层
            // 涡轮增压 >= 1级时显示
            if (speedLevel >= 1) {
                shipTurbo.classList.add('active');
            } else {
                shipTurbo.classList.remove('active');
            }
            
            // 装甲厚度 >= 1级时显示
            if (hpLevel >= 1) {
                shipArmor.classList.add('active');
            } else {
                shipArmor.classList.remove('active');
            }
            
            // 弹药库 >= 1级时显示
            if (ammoLevel >= 1) {
                shipAmmo.classList.add('active');
            } else {
                shipAmmo.classList.remove('active');
            }
            
            // 如果有新增技能点，触发动画
            if (hasNewSkill) {
                shipDisplay.classList.add('ship-weight-animation');
                setTimeout(() => {
                    shipDisplay.classList.remove('ship-weight-animation');
                }, 600);
            }
            
            // 更新上一次的技能等级
            lastSkillLevels = { speed: speedLevel, hp: hpLevel, ammo: ammoLevel };
        }

        // ==================== 游戏初始化 ====================
        let gameLoopId = null;
        
        function startGame() {
            const skillPanel = document.getElementById('skillPanel');
            const shipDisplay = document.querySelector('.playerShipDisplay');
            
            // 创建过渡遮罩层
            const transitionOverlay = document.createElement('div');
            transitionOverlay.style.cssText = `
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #000;
                opacity: 0;
                pointer-events: none;
                z-index: 1000;
                transition: opacity 0.8s ease-in;
            `;
            skillPanel.appendChild(transitionOverlay);
            
            // 船只容器向右移动的动画 - 所有分层素材一起移动
            shipDisplay.style.transition = 'transform 1s ease-in';
            shipDisplay.style.transform = 'translateX(120%)';
            
            // 延迟后开始变黑
            setTimeout(() => {
                transitionOverlay.style.opacity = '1';
            }, 200);
            
            // 动画结束后切换到游戏
            setTimeout(() => {
                skillPanel.style.display = 'none';
                document.getElementById('gameCanvas').style.display = 'block';
                gameState.currentScreen = 'game';
                
                initGame();
                
                // 确保只有一个游戏循环在运行
                if (gameLoopId === null) {
                    gameLoop();
                }
                
                // 清理过渡层
                if (transitionOverlay.parentNode) {
                    transitionOverlay.parentNode.removeChild(transitionOverlay);
                }
            }, 1000);
        }

        // ==================== 游戏主逻辑 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏对象
        let player, submarines, missiles, mines, explosions, powerUps, fragments;
        let score, hp, maxHp, mp, gameOver;
        let mineAmmo, maxMineAmmo, mineRegenTime;
        let superWeaponReady;
        let splitMineActive; // 分裂水雷是否激活

        function initGame() {
            // 根据技能点计算属性
            const speedLevel = gameState.skillPoints.speed;
            const hpLevel = gameState.skillPoints.hp;
            const ammoLevel = gameState.skillPoints.ammo;

            // 初始化玩家 - 适应1920x1080分辨率
            player = {
                x: canvas.width / 2 - 136,
                y: 168,
                width: 273,
                height: 117,
                maxSpeed: GAME_CONFIG.player.baseSpeed + speedLevel * 4,
                velocityX: 0,  // 当前水平速度
                maxHp: GAME_CONFIG.player.baseMaxHp + hpLevel * 50,
                hp: GAME_CONFIG.player.baseMaxHp + hpLevel * 50,
                skillLevels: {
                    speed: speedLevel,
                    hp: hpLevel,
                    ammo: ammoLevel
                },
                shake: {
                    active: false,
                    startTime: 0,
                    duration: 300, // 抖动持续300ms
                    intensity: 5   // 抖动幅度
                }
            };

            // 初始化游戏状态
            score = 0;
            hp = player.maxHp;
            maxHp = player.maxHp;
            mp = 0;
            gameOver = false;
            superWeaponReady = false;
            
            // 重置背景滚动位置
            backgroundScrollX = 0;

            // 弹药系统
            maxMineAmmo = GAME_CONFIG.player.baseAmmo + ammoLevel * 2;
            mineAmmo = maxMineAmmo;
            mineRegenTime = 0;
            splitMineActive = false; // 重置分裂水雷状态

            // 游戏对象数组
            submarines = [];
            missiles = [];
            mines = [];
            explosions = [];
            powerUps = [];
            fragments = [];

            // 初始化潜艇
            initSubmarines();
        }

        function initSubmarines() {
            // 初始生成6艘潜艇，适应1920x1080分辨率
            const positions = [680, 760, 840, 920, 1000, 1080];
            positions.forEach((y, index) => {
                const subType = Math.random() > 0.5 ? 1 : 0; // 随机选择普通潜艇类型
                // 橘色潜艇 192*72，银色潜艇 192*80
                const width = 192;
                const height = subType === 1 ? 80 : 72;
                submarines.push({
                    x: canvas.width + index * 250,
                    y: y,
                    width: width,
                    height: height,
                    id: index,
                    isGold: false,
                    subType: subType,
                    lastMissileTime: 0
                });
            });
        }
        
        // 获取当前难度系数 (随分数增加) - 提升30%难度节奏
        function getDifficultyMultiplier() {
            // 基础难度1.0，每15分增加0.2，最高2.8
            return Math.min(1.0 + score * 0.0133, 2.8);
        }
        
        // 获取潜艇速度 - 所有潜艇初始速度快10%
        function getSubmarineSpeed() {
            return 1.87 * getDifficultyMultiplier();
        }
        
        // 获取导弹发射间隔
        function getMissileCooldown() {
            // 从2500ms逐渐降低到900ms
            return Math.max(2500 - score * 26, 900);
        }
        
        // 获取导弹发射概率
        function getMissileChance() {
            // 从0.007逐渐增加到0.028
            return Math.min(0.007 + score * 0.00042, 0.028);
        }
        
        // 检查位置是否与其他潜艇重叠
        function isOverlapping(x, y, width, height, excludeSub = null) {
            const minDistance = 150; // 最小间距
            for (const sub of submarines) {
                if (sub === excludeSub) continue;
                
                const dx = (x + width/2) - (sub.x + sub.width/2);
                const dy = (y + height/2) - (sub.y + sub.height/2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < minDistance) {
                    return true;
                }
            }
            return false;
        }

        // ==================== 游戏循环 ====================
        function gameLoop() {
            if (gameState.currentScreen !== 'game') {
                gameLoopId = null;
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            drawBackground();

            if (!gameOver) {
                update();
            }

            draw();

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function update() {
            // 更新玩家
            updatePlayer();

            // 更新水雷
            updateMines();

            // 更新潜艇
            updateSubmarines();

            // 更新导弹
            updateMissiles();

            // 更新爆炸
            updateExplosions();

            // 更新道具
            updatePowerUps();

            // 更新碎片
            updateFragments();

            // 弹药恢复
            updateMineRegen();

            // 碰撞检测
            checkCollisions();
        }

        function updatePlayer() {
            // 目标速度计算
            let targetVelocityX = 0;
            if (keys.ArrowLeft && player.x > 0) {
                targetVelocityX = -player.maxSpeed;
            }
            if (keys.ArrowRight && player.x < canvas.width - player.width) {
                targetVelocityX = player.maxSpeed;
            }
            
            // 缓动动画：平滑过渡到目标速度
            const acceleration = player.maxSpeed * 0.15; // 加速度
            const deceleration = player.maxSpeed * 0.1;  // 减速度
            
            if (targetVelocityX !== 0) {
                // 加速阶段
                if (player.velocityX < targetVelocityX) {
                    player.velocityX = Math.min(player.velocityX + acceleration, targetVelocityX);
                } else if (player.velocityX > targetVelocityX) {
                    player.velocityX = Math.max(player.velocityX - acceleration, targetVelocityX);
                }
            } else {
                // 减速阶段（停止时的缓动）
                if (player.velocityX > 0) {
                    player.velocityX = Math.max(player.velocityX - deceleration, 0);
                } else if (player.velocityX < 0) {
                    player.velocityX = Math.min(player.velocityX + deceleration, 0);
                }
            }
            
            // 应用速度
            player.x += player.velocityX;
            
            // 边界检查
            if (player.x < 0) {
                player.x = 0;
                player.velocityX = 0;
            }
            if (player.x > canvas.width - player.width) {
                player.x = canvas.width - player.width;
                player.velocityX = 0;
            }
        }

        function updateMines() {
            for (let i = mines.length - 1; i >= 0; i--) {
                const mine = mines[i];
                mine.y += mine.speed;
                
                // 分裂水雷逻辑：下降200距离后分裂为两个
                if (mine.isSplitMine && !mine.hasSplit && mine.y > player.y + player.height + 200) {
                    mine.hasSplit = true;
                    // 在原水雷位置创建两个新的水雷，向左右分开
                    mines.push({
                        x: mine.x - 30,
                        y: mine.y,
                        width: 60,
                        height: 61,
                        speed: mine.speed,
                        isSplitMine: false,
                        hasSplit: false,
                        vx: -2 // 向左偏移
                    });
                    mines.push({
                        x: mine.x + 30,
                        y: mine.y,
                        width: 60,
                        height: 61,
                        speed: mine.speed,
                        isSplitMine: false,
                        hasSplit: false,
                        vx: 2 // 向右偏移
                    });
                    // 移除原水雷
                    mines.splice(i, 1);
                    continue;
                }
                
                // 应用水平速度（用于分裂后的水雷）
                if (mine.vx) {
                    mine.x += mine.vx;
                }
                
                if (mine.y > canvas.height) {
                    mines.splice(i, 1);
                }
            }
        }

        function updateSubmarines() {
            const speed = getSubmarineSpeed();
            const missileCooldown = getMissileCooldown();
            const missileChance = getMissileChance();
            
            for (let i = submarines.length - 1; i >= 0; i--) {
                const sub = submarines[i];
                // 金色潜艇更慢(0.7倍)，普通潜艇更快
                // 橘色潜艇(subType=0)比灰色潜艇(subType=1)快10%
                let subSpeed;
                if (sub.isGold) {
                    subSpeed = speed * 0.7;
                } else {
                    const typeMultiplier = sub.subType === 0 ? 1.32 : 1.2; // 橘色潜艇快10%
                    subSpeed = speed * typeMultiplier;
                }
                sub.x -= subSpeed;

                if (sub.x < -240) {
                    if (sub.isGold) {
                        submarines.splice(i, 1);
                    } else {
                        // 重置位置时检查重叠
                        let newX = canvas.width + Math.random() * 300;
                        let newY = 680 + Math.random() * 320;
                        let attempts = 0;
                        while (isOverlapping(newX, newY, sub.width, sub.height, sub) && attempts < 10) {
                            newY = 680 + Math.random() * 320;
                            attempts++;
                        }
                        sub.x = newX;
                        sub.y = newY;
                    }
                }

                // 发射导弹 - 使用动态难度，限制屏幕上最多8枚导弹
                if (!sub.isGold && missiles.length < 8 && Date.now() - sub.lastMissileTime > missileCooldown) {
                    if (Math.random() < missileChance) {
                        fireMissile(sub);
                        sub.lastMissileTime = Date.now();
                    }
                }
            }

            // 动态补充潜艇 - 根据分数增加密度，但限制最大数量
            const targetSubCount = Math.min(6 + Math.floor(score / 6), 14); // 最多14艘，增长更快
            const normalSubCount = submarines.filter(s => !s.isGold).length;
            if (normalSubCount < targetSubCount) {
                if (Math.random() < 0.02) { // 2%概率每帧补充
                    spawnNewSubmarine();
                }
            }

            // 生成金色潜艇
            if (score >= 5 && !submarines.some(s => s.isGold)) {
                if (Date.now() % 10000 < 50) { // 每10秒检查一次
                    spawnGoldSubmarine();
                }
            }
        }
        
        function spawnNewSubmarine() {
            let x = canvas.width + 150;
            let y = 680 + Math.random() * 320;
            const subType = Math.random() > 0.5 ? 1 : 0; // 随机选择普通潜艇类型
            // 橘色潜艇 192*72，银色潜艇 192*80
            const width = 192;
            const height = subType === 1 ? 80 : 72;
            
            // 尝试找到不重叠的位置（最多尝试10次）
            let attempts = 0;
            while (isOverlapping(x, y, width, height) && attempts < 10) {
                y = 680 + Math.random() * 320;
                attempts++;
            }
            
            // 如果找到合适位置才生成
            if (!isOverlapping(x, y, width, height)) {
                submarines.push({
                    x: x,
                    y: y,
                    width: width,
                    height: height,
                    id: 'sub_' + Date.now(),
                    isGold: false,
                    subType: subType,
                    lastMissileTime: 0
                });
            }
        }

        function fireMissile(sub) {
            // 导弹先斜向发射，然后转为垂直
            const direction = Math.random() > 0.5 ? 1 : -1;
            missiles.push({
                x: sub.x + sub.width / 2,
                y: sub.y,
                width: 20, // 素材旋转90度后的宽度
                height: 104, // 素材旋转90度后的高度
                phase: 'diagonal', // diagonal, vertical
                direction: direction,
                startY: sub.y,
                targetHeight: sub.y - 150
            });
        }

        function updateMissiles() {
            const missileSpeed = 2.21 * getDifficultyMultiplier(); // 基础速度加快20%
            for (let i = missiles.length - 1; i >= 0; i--) {
                const missile = missiles[i];
                if (missile.phase === 'diagonal') {
                    missile.x -= missileSpeed * 0.7;
                    missile.y -= missileSpeed * 0.7;
                    if (missile.y <= missile.targetHeight) {
                        missile.phase = 'vertical';
                    }
                } else {
                    missile.y -= missileSpeed * 0.9;
                }

                if (missile.y < -50) {
                    missiles.splice(i, 1);
                }
            }
        }

        function updateExplosions() {
            for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                if (Date.now() - exp.startTime > 500) {
                    explosions.splice(i, 1);
                }
            }
        }

        function updatePowerUps() {
            // 道具上浮速度比敌方导弹快50%，再上调20%
            const powerUpSpeed = 2.3 * 1.5 * 1.2;
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const pu = powerUps[i];
                pu.y -= powerUpSpeed;
                if (pu.y < -60) {
                    powerUps.splice(i, 1);
                }
            }
        }

        function updateFragments() {
            for (let i = fragments.length - 1; i >= 0; i--) {
                const frag = fragments[i];
                frag.y += frag.speedY;
                frag.x += frag.speedX;
                frag.alpha -= 0.01;
                
                if (frag.alpha <= 0) {
                    fragments.splice(i, 1);
                }
            }
        }

        function updateMineRegen() {
            if (mineAmmo < maxMineAmmo) {
                const now = Date.now();
                if (now - mineRegenTime >= 1000) {
                    mineAmmo++;
                    mineRegenTime = now;
                }
            }
        }

        function spawnGoldSubmarine() {
            let x = canvas.width + 150;
            let y = 700 + Math.random() * 250;
            // 稀有潜艇素材尺寸 370*88
            const width = 370;
            const height = 88;
            
            // 尝试找到不重叠的位置（最多尝试10次）
            let attempts = 0;
            while (isOverlapping(x, y, width, height) && attempts < 10) {
                y = 700 + Math.random() * 250;
                attempts++;
            }
            
            // 如果找到合适位置才生成
            if (!isOverlapping(x, y, width, height)) {
                submarines.push({
                    x: x,
                    y: y,
                    width: width,
                    height: height,
                    id: 'gold_' + Date.now(),
                    isGold: true,
                    lastMissileTime: 0
                });
            }
        }

        // ==================== 绘制函数 ====================
        function draw() {
            drawPlayer();
            drawSubmarines();
            drawMissiles();
            drawMines();
            drawExplosions();
            drawPowerUps();
            drawFragments();
            drawUI();
        }
        
        // 游戏结束菜单选项
        let gameOverOption = 0; // 0 = 重新挑战, 1 = 重新配置
        
        // 显示游戏结束画面
        function showGameOverScreen() {
            const gameOverScreen = document.getElementById('gameOverScreen');
            const finalScoreEl = document.getElementById('finalScore');
            const btnRetry = document.getElementById('btnRetry');
            const btnConfig = document.getElementById('btnConfig');

            // 显示游戏结束画面
            gameOverScreen.classList.add('active');
        }
        
        // 隐藏游戏结束画面
        function hideGameOverScreen() {
            const gameOverScreen = document.getElementById('gameOverScreen');
            gameOverScreen.classList.remove('active');
        }
        
        // 更新游戏结束按钮状态
        function updateGameOverButtons() {
            const btnRetry = document.getElementById('btnRetry');
            const btnConfig = document.getElementById('btnConfig');
            
            btnRetry.classList.toggle('active', gameOverOption === 0);
            btnConfig.classList.toggle('active', gameOverOption === 1);
        }

        function drawBackground() {
            // 检查超级武器特效是否激活
            if (superWeaponEffect.active) {
                const elapsed = Date.now() - superWeaponEffect.startTime;
                if (elapsed >= superWeaponEffect.duration) {
                    superWeaponEffect.active = false;
                }
            }
            
            // 优先使用超宽背景图
            if (assets.backgroundWide.complete && assets.backgroundWide.naturalWidth > 0) {
                const img = assets.backgroundWide;
                const imgWidth = img.naturalWidth;
                const imgHeight = img.naturalHeight;
                
                // 计算缩放比例，使背景图高度填满画布
                const scale = canvas.height / imgHeight;
                const scaledWidth = imgWidth * scale;
                
                // 更新滚动位置（从右向左）
                backgroundScrollX -= backgroundScrollSpeed;
                
                // 当滚动超过一张图宽度时重置，实现无缝循环
                if (Math.abs(backgroundScrollX) >= scaledWidth) {
                    backgroundScrollX = 0;
                }
                
                // 绘制两张图实现无缝滚动
                // 第一张图
                ctx.drawImage(img, backgroundScrollX, 0, scaledWidth, canvas.height);
                // 第二张图（接在第一张后面）
                ctx.drawImage(img, backgroundScrollX + scaledWidth, 0, scaledWidth, canvas.height);
                
                // 超级武器特效：天空素材 + 海面蒙层（位于背景上，潜艇素材下）
                if (superWeaponEffect.active) {
                    const elapsed = Date.now() - superWeaponEffect.startTime;
                    const progress = Math.min(elapsed / superWeaponEffect.duration, 1);
                    
                    // 入场动画：前20%时间快速从右侧滑入
                    let entryProgress = 1;
                    if (progress < 0.2) {
                        entryProgress = progress / 0.2; // 0到1
                        // 使用缓动函数让入场更自然
                        entryProgress = 1 - Math.pow(1 - entryProgress, 3);
                    }
                    
                    // 渐隐效果：最后50%时间开始渐隐
                    let alpha = 1;
                    if (progress > 0.5) {
                        alpha = 1 - (progress - 0.5) * 2; // 从1渐变到0
                    }
                    
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    
                    // 绘制超级武器天空素材（上方）
                    // 素材尺寸 1920*259，从顶部开始显示
                    if (assets.superWeaponBg.complete && assets.superWeaponBg.naturalWidth > 0) {
                        const bgImg = assets.superWeaponBg;
                        const bgWidth = 1920;
                        const bgHeight = 259;
                        // 计算入场偏移
                        const offsetX = (1 - entryProgress) * 1920;
                        ctx.drawImage(bgImg, -offsetX, 0, bgWidth, bgHeight);
                    }
                    
                    // 海面添加80%黑色蒙层
                    ctx.fillStyle = `rgba(0, 0, 0, 0.8)`;
                    ctx.fillRect(0, 259, canvas.width, canvas.height - 259);
                    
                    ctx.restore();
                }
                
            } else if (assets.background.complete && assets.background.naturalWidth > 0) {
                // 备用：使用原来的背景图
                ctx.drawImage(assets.background, 0, 0, canvas.width, canvas.height);
            } else {
                // 备用渐变背景
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#1a3a5c');
                gradient.addColorStop(0.5, '#0d2137');
                gradient.addColorStop(1, '#061220');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function drawPlayer() {
            const skillLevels = player.skillLevels || { speed: 0, hp: 0, ammo: 0 };
            
            // 技能面板中 playerShipDisplay 的尺寸（参考容器）
            const displayWidth = 522;
            const displayHeight = 223;
            
            // 游戏内玩家船只尺寸
            const shipWidth = player.width;
            const shipHeight = player.height;
            
            // 计算缩放比例 - 游戏内船只相对于技能面板容器的比例
            const scale = shipWidth / displayWidth;
            
            // 计算抖动偏移
            let shakeX = 0;
            let shakeY = 0;
            if (player.shake && player.shake.active) {
                const elapsed = Date.now() - player.shake.startTime;
                if (elapsed >= player.shake.duration) {
                    player.shake.active = false;
                } else {
                    // 随机方向抖动
                    const angle = Math.random() * Math.PI * 2;
                    const intensity = player.shake.intensity * (1 - elapsed / player.shake.duration);
                    shakeX = Math.cos(angle) * intensity;
                    shakeY = Math.sin(angle) * intensity;
                }
            }
            
            // 基础船位置 - 使用 player.x, player.y 作为基准，加上抖动偏移
            // 技能面板中 #shipBase 的 top: 0，所以基础船从 player.y 开始
            const baseX = player.x + shakeX;
            const baseY = player.y + shakeY;
            
            // 按层级顺序绘制：涡轮增压(底层) -> 弹药库 -> 基础船 -> 装甲(顶层)
            
            // 1. 涡轮增压层 (最下层)
            // CSS: #shipTurbo { width: 115px; top: 27px; left: 13px; }
            if (skillLevels.speed >= 1 && assets.shipTurbo.complete && assets.shipTurbo.naturalWidth > 0) {
                const turboDisplayWidth = 115;
                const turboWidth = turboDisplayWidth * scale;
                const turboHeight = assets.shipTurbo.naturalHeight * (turboWidth / assets.shipTurbo.naturalWidth);
                const turboX = baseX + 13 * scale;
                const turboY = baseY + 27 * scale;
                ctx.drawImage(assets.shipTurbo, turboX, turboY, turboWidth, turboHeight);
            }
            
            // 2. 弹药库层
            // CSS: #shipAmmo { width: 60px; left: 364px; top: 19px; }
            if (skillLevels.ammo >= 1 && assets.shipAmmo.complete && assets.shipAmmo.naturalWidth > 0) {
                const ammoDisplayWidth = 60;
                const ammoWidth = ammoDisplayWidth * scale;
                const ammoHeight = assets.shipAmmo.naturalHeight * (ammoWidth / assets.shipAmmo.naturalWidth);
                const ammoX = baseX + 364 * scale;
                const ammoY = baseY + 19 * scale;
                ctx.drawImage(assets.shipAmmo, ammoX, ammoY, ammoWidth, ammoHeight);
            }
            
            // 3. 基础船只层
            // CSS: #shipBase { top: 0px; width: 100%(522px); }
            if (assets.shipBase.complete && assets.shipBase.naturalWidth > 0) {
                const baseImgWidth = assets.shipBase.naturalWidth;
                const baseImgHeight = assets.shipBase.naturalHeight;
                // 保持宽高比，按宽度缩放
                const drawWidth = shipWidth;
                const drawHeight = baseImgHeight * (drawWidth / baseImgWidth);
                ctx.drawImage(assets.shipBase, baseX, baseY, drawWidth, drawHeight);
            } else {
                // 备用绘制
                ctx.fillStyle = '#4a9eff';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }
            
            // 4. 装甲层 (最上层)
            // CSS: #shipArmor { width: 240px; left: 84px; top: 55px; }
            if (skillLevels.hp >= 1 && assets.shipArmor.complete && assets.shipArmor.naturalWidth > 0) {
                const armorDisplayWidth = 240;
                const armorWidth = armorDisplayWidth * scale;
                const armorHeight = assets.shipArmor.naturalHeight * (armorWidth / assets.shipArmor.naturalWidth);
                const armorX = baseX + 84 * scale;
                const armorY = baseY + 55 * scale;
                ctx.drawImage(assets.shipArmor, armorX, armorY, armorWidth, armorHeight);
            }
        }

        function drawSubmarines() {
            submarines.forEach(sub => {
                let subImage;
                if (sub.isGold) {
                    subImage = assets.goldSubmarine;
                } else {
                    // 普通潜艇随机使用两种素材之一
                    subImage = sub.subType === 1 ? assets.submarine2 : assets.submarine;
                }
                
                // 绘制潜艇图片
                if (subImage && subImage.complete && subImage.naturalWidth > 0) {
                    ctx.drawImage(subImage, sub.x, sub.y, sub.width, sub.height);
                } else {
                    // 备用绘制
                    ctx.fillStyle = sub.isGold ? '#ffd700' : '#8b4513';
                    ctx.fillRect(sub.x, sub.y, sub.width, sub.height);
                }
            });
        }

        function drawMissiles() {
            missiles.forEach(missile => {
                // 绘制导弹图片
                if (assets.missile.complete && assets.missile.naturalWidth > 0) {
                    ctx.save();
                    ctx.translate(missile.x + missile.width/2, missile.y + missile.height/2);
                    
                    if (missile.phase === 'diagonal') {
                        // 斜向阶段：根据方向旋转45度偏左/右
                        // 素材是垂直的，需要旋转到斜向
                        ctx.rotate(missile.direction * Math.PI / 4);
                    } else {
                        // 垂直阶段：素材本身就是垂直的，不需要旋转
                        // 或者旋转0度保持垂直向上
                    }
                    
                    ctx.drawImage(assets.missile, -missile.width/2, -missile.height/2, missile.width, missile.height);
                    ctx.restore();
                } else {
                    // 备用绘制
                    ctx.save();
                    ctx.translate(missile.x + missile.width/2, missile.y + missile.height/2);
                    ctx.fillStyle = '#ff4444';
                    
                    if (missile.phase === 'diagonal') {
                        ctx.rotate(missile.direction * Math.PI / 4 - Math.PI / 2);
                    } else {
                        ctx.rotate(-Math.PI / 2);
                    }
                    
                    ctx.fillRect(-missile.width/2, -missile.height/2, missile.width, missile.height);
                    ctx.restore();
                }
            });
        }

        function drawMines() {
            mines.forEach(mine => {
                // 绘制水雷图片
                if (assets.mine.complete && assets.mine.naturalWidth > 0) {
                    ctx.drawImage(assets.mine, mine.x, mine.y, mine.width, mine.height);
                } else {
                    // 备用绘制
                    ctx.fillStyle = '#4444ff';
                    ctx.beginPath();
                    ctx.arc(mine.x + mine.width/2, mine.y + mine.height/2, mine.width/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawExplosions() {
            explosions.forEach(exp => {
                const elapsed = Date.now() - exp.startTime;
                const alpha = 1 - elapsed / 500;
                const size = 120 * (1 + elapsed / 500);
                
                // 绘制爆炸图片
                if (assets.explosion.complete && assets.explosion.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.drawImage(assets.explosion, exp.x - size, exp.y - size, size * 2, size * 2);
                    ctx.restore();
                } else {
                    // 备用绘制
                    ctx.fillStyle = `rgba(255, 150, 50, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(exp.x, exp.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawPowerUps() {
            powerUps.forEach(pu => {
                const puImage = pu.type === 'hp' ? assets.powerUpHp : assets.powerUpRange;
                
                // 绘制道具图片
                if (puImage && puImage.complete && puImage.naturalWidth > 0) {
                    ctx.drawImage(puImage, pu.x, pu.y, pu.width, pu.height);
                } else {
                    // 备用绘制
                    ctx.font = '48px Arial';
                    if (pu.type === 'hp') {
                        ctx.fillText('❤️', pu.x, pu.y + 45);

                        ctx.fillText('💥', pu.x, pu.y + 45);
                    }
                }

        }

        function drawFragments() {
            fragments.forEach(frag => {
                ctx.fillStyle = `rgba(139, 69, 19, ${frag.alpha})`;
                ctx.fillRect(frag.x, frag.y, frag.size, frag.size);
            });
        }

            ctx.fillStyle = '#1a1a1a';

            const ammoCenterX = canvas.width / 2;

            const totalAmmoWidth = totalAmmoBoxes * ammoBoxSize + (totalAmmoBoxes - 1) * ammoGap;

                    ctx.fillStyle = '#ffffff';

                    ctx.fillRect(boxX + 2, ammoY + 2, ammoBoxSize - 4, ammoBoxSize - 4);

                // 方块边框
                ctx.strokeStyle = '#1a1a1a';

            // 超级武器提示（当MP满时显示在MP条下方）
            if (mp >= 100) {

                ctx.textAlign = 'left';
                ctx.fillText('按 Z 释放超级武器!', barX, 85);
            }
        }

        // ==================== 碰撞检测 ====================
        function checkCollisions() {
            // 水雷 vs 潜艇
            for (let mIndex = mines.length - 1; mIndex >= 0; mIndex--) {
                const mine = mines[mIndex];
                for (let sIndex = submarines.length - 1; sIndex >= 0; sIndex--) {
                    const sub = submarines[sIndex];
                    if (checkCollision(mine, sub)) {
                        // 触发连锁爆炸
                        triggerChainExplosion(sub);
                        
                        mines.splice(mIndex, 1);
                        
                        break; // 水雷已销毁，跳出潜艇循环
                    }
                }
            }

            // 导弹 vs 玩家
            for (let mIndex = missiles.length - 1; mIndex >= 0; mIndex--) {
                const missile = missiles[mIndex];
                if (checkCollision(missile, player)) {
                    createExplosion(player.x + player.width/2, player.y + player.height/2);
                    missiles.splice(mIndex, 1);
                    hp -= 20;
                    
                    // 触发玩家船抖动效果
                    player.shake.active = true;
                    player.shake.startTime = Date.now();
                    
                    // 触发全屏闪红效果
                    triggerDamageFlash();
                    
                    if (hp <= 0) {
                        gameOver = true;
                        showGameOverScreen();
                    }
                }
            }

            // 玩家 vs 道具
            for (let pIndex = powerUps.length - 1; pIndex >= 0; pIndex--) {
                const pu = powerUps[pIndex];
                if (checkCollision(pu, player)) {
                    if (pu.type === 'hp') {
                        hp = Math.min(hp + maxHp * 0.3, maxHp);
                    } else {
                        // 激活分裂水雷
                        splitMineActive = true;
                    }
                    powerUps.splice(pIndex, 1);
                }
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function createExplosion(x, y) {
            explosions.push({
                x: x,
                y: y,
                startTime: Date.now()
            });
        }

        // 连锁爆炸函数
        function triggerChainExplosion(initialSub) {
            const chainRadius = 300; // 连锁爆炸半径
            const explodedSubs = []; // 记录被炸掉的潜艇
            
            // 找到所有在爆炸范围内的潜艇
            for (let i = submarines.length - 1; i >= 0; i--) {
                const sub = submarines[i];
                const dx = sub.x + sub.width/2 - (initialSub.x + initialSub.width/2);
                const dy = sub.y + sub.height/2 - (initialSub.y + initialSub.height/2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance <= chainRadius) {
                    explodedSubs.push({
                        sub: sub,
                        index: i,
                        distance: distance
                    });
                }
            }
            
            // 按距离排序，近的先爆炸
            explodedSubs.sort((a, b) => a.distance - b.distance);
            
            // 依次爆炸
            explodedSubs.forEach((item, idx) => {
                setTimeout(() => {
                    const sub = item.sub;
                    createExplosion(sub.x + sub.width/2, sub.y + sub.height/2);
                    createFragments(sub.x + sub.width/2, sub.y + sub.height/2);
                    
                    if (sub.isGold) {
                        dropPowerUp(sub.x, sub.y);
                    }
                    
                    // 从数组中移除
                    const subIndex = submarines.indexOf(sub);
                    if (subIndex > -1) {
                        submarines.splice(subIndex, 1);
                    }
                    
                    // 计分：普通潜艇10分，金色潜艇100分
                    score += sub.isGold ? 100 : 10;
                    mp = Math.min(mp + 10, 100);
                }, idx * 100); // 每个延迟100ms
            });
            
            // 如果只有初始潜艇被炸（没有连锁），立即处理
            if (explodedSubs.length === 0) {
                createExplosion(initialSub.x + initialSub.width/2, initialSub.y + initialSub.height/2);
                createFragments(initialSub.x + initialSub.width/2, initialSub.y + initialSub.height/2);
                
                if (initialSub.isGold) {
                    dropPowerUp(initialSub.x, initialSub.y);
                }
                
                const index = submarines.indexOf(initialSub);
                if (index > -1) {
                    submarines.splice(index, 1);
                }
                
                // 计分：普通潜艇10分，金色潜艇100分
                score += initialSub.isGold ? 100 : 10;
                mp = Math.min(mp + 10, 100);
            }
        }

        function createFragments(x, y) {
            for (let i = 0; i < 12; i++) {
                fragments.push({
                    x: x,
                    y: y,
                    size: 8 + Math.random() * 16,
                    speedX: (Math.random() - 0.5) * 6,
                    speedY: 2 + Math.random() * 3,
                    alpha: 1
                });
            }
        }

        function dropPowerUp(x, y) {
            const type = Math.random() > 0.5 ? 'hp' : 'range';
            // 根据道具类型设置不同尺寸
            const dimensions = type === 'hp' 
                ? { width: 62, height: 47 }
                : { width: 74, height: 59 };
            powerUps.push({
                x: x,
                y: y,
                width: dimensions.width,
                height: dimensions.height,
                type: type
            });
        }

        // ==================== 输入处理 ====================
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (gameState.currentScreen === 'game') {
                // 游戏结束菜单导航
                if (gameOver) {
                    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                        // 上下键切换选项
                        gameOverOption = gameOverOption === 0 ? 1 : 0;
                        return;
                    }
                    
                    if (e.key === 'Enter') {
                        handleGameOverAction();
                        return;
                    }
                }
                
                if (e.key === ' ' && mineAmmo > 0 && !gameOver) {
                    mines.push({
                        x: player.x + player.width / 2 - 30,
                        y: player.y + player.height,
                        width: 60,
                        height: 61,
                        speed: 5,
                        isSplitMine: splitMineActive, // 是否为分裂水雷
                        hasSplit: false // 是否已经分裂过
                    });
                    mineAmmo--;
                    mineRegenTime = Date.now();
                }

                if ((e.key === 'z' || e.key === 'Z') && !gameOver) {
                    if (mp >= 100) {
                        useSuperWeapon();
                    }
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // 游戏结束画面按钮事件
        const btnRetryEl = document.getElementById('btnRetry');
        const btnConfigEl = document.getElementById('btnConfig');
        
        btnRetryEl.addEventListener('click', () => {
            if (!gameOver) return;
            gameOverOption = 0;
            handleGameOverAction();
        });
        
        btnRetryEl.addEventListener('mouseenter', () => {
            if (!gameOver) return;
            gameOverOption = 0;
            updateGameOverButtons();
        });
        
        btnRetryEl.addEventListener('mouseleave', () => {
            if (!gameOver) return;
            btnRetryEl.classList.remove('active');
        });
        
        btnConfigEl.addEventListener('click', () => {
            if (!gameOver) return;
            gameOverOption = 1;
            handleGameOverAction();
        });
        
        btnConfigEl.addEventListener('mouseenter', () => {
            if (!gameOver) return;
            gameOverOption = 1;
            updateGameOverButtons();
        });
        
        btnConfigEl.addEventListener('mouseleave', () => {
            if (!gameOver) return;
            btnConfigEl.classList.remove('active');
        });
        
        // 处理游戏结束选项
        function handleGameOverAction() {
            hideGameOverScreen();
            
            if (gameOverOption === 0) {
                // 重新挑战 - 重置选项并重新开始
                gameOverOption = 0;
                initGame();
            } else {
                // 重新配置战船 - 返回技能面板
                gameOverOption = 0;
                gameState.currentScreen = 'skill';
                document.getElementById('gameCanvas').style.display = 'none';
                document.getElementById('skillPanel').style.display = 'flex';
                // 重置技能点
                gameState.skillPoints = { speed: 0, hp: 0, ammo: 0 };
                // 重置船只位置
                document.querySelector('.playerShipDisplay').style.transform = '';
                document.querySelector('.playerShipDisplay').style.transition = '';
                updateSkillUI();
            }
        }

        // 触发受攻击闪红效果
        function triggerDamageFlash() {
            const damageFlash = document.getElementById('damageFlash');
            damageFlash.classList.add('active');
            setTimeout(() => {
                damageFlash.classList.remove('active');
            }, 150);
        }

        function useSuperWeapon() {
            mp = 0;
            
            // 激活超级武器特效
            superWeaponEffect.active = true;
            superWeaponEffect.startTime = Date.now();
            superWeaponEffect.entryOffset = 1920; // 重置入场偏移
            
            // 清空所有敌方导弹
            missiles.forEach(missile => {
                createExplosion(missile.x + missile.width/2, missile.y + missile.height/2);
            });
            missiles = [];
            
            // 时停效果 - 消灭所有潜艇
            submarines.forEach(sub => {
                createExplosion(sub.x + sub.width/2, sub.y + sub.height/2);
                createFragments(sub.x + sub.width/2, sub.y + sub.height/2);
                // 金色潜艇掉落道具
                if (sub.isGold) {
                    dropPowerUp(sub.x, sub.y);
                }
                // 计分：普通潜艇10分，金色潜艇100分
                score += sub.isGold ? 100 : 10;
            });
            
            submarines = [];
            
            setTimeout(() => {
                initSubmarines();
            }, 500);
        }

        // ==================== 启动游戏 ====================
        window.onload = initLoading;
    </script>
</body>
</html>
