<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜艇大战 - 深海猎手</title>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- 自定义字体 -->
    <style>
        @font-face {
            font-family: 'HYQiHeiY3';
            src: url('assets/fonts/HYQiHeiY3-HEW.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a1628;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        #gameContainer {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(180deg, #1a3a5c 0%, #0d2137 50%, #061220 100%);
            overflow: hidden;
        }
        
        /* 加载页面 */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #222222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loadingLogo {
            width: 528px;
            height: 345px;
            object-fit: contain;
        }
        
        .loadingBarContainer {
            display: flex;
            align-items: center;
            margin-top: 127px;
            width: 520px;
            height: 14px;
            background: #5f5f5f;
            overflow: hidden;
        }
        
        .loadingProgress {
            height: 100%;
            background: #b5fe12;
            width: 0%;
            transition: width 0.3s;
        }
        
        .loadingText {
            margin-top: 14px;
            color: #ffffff;
            font-family: "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 24px;
            letter-spacing: -1.2px;
        }
        
        /* 转场到技能面板的遮罩动画 */
        .skillTransitionOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            opacity: 0;
            z-index: 2000;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        
        .skillTransitionOverlay.active {
            opacity: 1;
        }
        
        /* 技能配置面板 - 使用截图作为背景 */
        #skillPanel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: none;
            z-index: 900;
            overflow: hidden;
        }
        
        /* 背景层 - 技能配置界面背景图 */
        .skillBg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        
        /* 天空背景 - 缓慢从右往左移动 */
        .skillSkyBg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .skillSkyBgInner {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%; /* 两倍宽度用于无缝滚动 */
            height: 100%;
            display: flex;
            animation: skillSkyScroll 30s linear infinite;
        }
        
        .skillSkyBgInner .skyLayer {
            width: 50.1%; /* 稍微增加宽度，确保没有缝隙 */
            height: 100%;
            background-image: url('assets/figma_image/screenshot_508_118.png');
            background-size: cover; /* 使用 cover 确保填充 */
            background-repeat: no-repeat;
            background-position: center;
            margin-right: -1px; /* 负边距消除接缝 */
        }
        
        @keyframes skillSkyScroll {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }
        
        /* 遮罩图层 */
        .skillMaskOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/figma_image/screenshot_513_177.png');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            z-index: 2;
            pointer-events: none;
        }
        
        /* 技能面板容器 - 使用截图作为背景 */
        .skillPanelWrapper {
            position: absolute;
            top: 175px;
            left: 88px;
            width: 635px;
            height: 558px;
            background-image: url('assets/figma_image/screenshot_618_177.png');
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 100; /* 标题图片要在所有图层最上方 */
        }

        /* 技能配置面板右侧按钮 */
        .skillPanelSideButtons {
            position: absolute;
            top: 175px;
            left: 1665px;
            width: 274px;
            height: 152px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .skillPanelSideBtn {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .skillPanelSideBtn:hover {
            transform: scale(1.05);
        }

        #btnGameInfo {
            width: 255px;
            height: auto;
        }

        #btnGlobalLeaderboard {
            width: 227px;
            height: auto;
            position: absolute;
            left: 36px;
            top: 75px;
        }

        /* 通关页面右侧按钮 */
        .victorySideButtons {
            position: absolute;
            top: 175px;
            left: 1665px;
            width: 274px;
            height: 152px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 300;
            display: none; /* 默认隐藏，通关时显示 */
        }

        .victorySideButtons.active {
            display: flex;
        }

        .victorySideBtn {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .victorySideBtn:hover {
            transform: scale(1.05);
        }

        #btnVictoryGameInfo {
            width: 255px;
            height: auto;
        }

        #btnVictoryLeaderboard {
            width: 227px;
            height: auto;
            position: absolute;
            left: 36px;
            top: 75px;
        }

        /* 剩余技能点数值 - 定位到截图上的位置 */
        .skillPointsValue {
            position: absolute;
            top: 110px;
            left: 413px;
            width: 65px;
            color: #d9fa05;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 34px;
            font-weight: 700;
            transform: rotate(12deg);
        }
        
        /* 技能按钮区域 - 绝对定位到截图上的位置 */
        .skillButtonsContainer {
            position: absolute;
            top: -13px;
            left: 23px;
            width: 100%;
            height: 100%;
        }
        
        /* 减号按钮 - 移动速度 */
        .skillBtnMinus1 {
            position: absolute;
            top: 238px;
            left: 368px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(2deg);
        }
        
        /* 加号按钮 - 移动速度 */
        .skillBtnPlus1 {
            position: absolute;
            top: 240px;
            left: 455px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(2deg);
        }
        
        /* 减号按钮 - 装甲厚度 */
        .skillBtnMinus2 {
            position: absolute;
            top: 324px;
            left: 409px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(-2deg);
        }
        
        /* 加号按钮 - 装甲厚度 */
        .skillBtnPlus2 {
            position: absolute;
            top: 328px;
            left: 494px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(-2deg);
        }
        
        /* 减号按钮 - 弹药库 */
        .skillBtnMinus3 {
            position: absolute;
            top: 420px;
            left: 394px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(-4deg);
        }
        
        /* 加号按钮 - 弹药库 */
        .skillBtnPlus3 {
            position: absolute;
            top: 408px;
            left: 480px;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transform: rotate(-4deg);
        }
        
        .skillButtonsContainer button img {
            width: 100%;
            height: 28px;
        }
        
        /* hpPlus按钮内图片特殊定位 */
        #hpPlusImg {
            position: relative;
            top: -15px;
        }
        
        .skillButtonsContainer button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .skillButtonsContainer button:not(:disabled) {
            transition: transform 0.2s ease;
        }
        
        .skillButtonsContainer button:not(:disabled):hover {
            transform: scale(1.3);
        }
        
        /* 技能点指示器 - 定位到截图上的位置 */
        .skillDotsContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* 技能点 - 移动速度 */
        .skillDotsRow1 {
            position: absolute;
            top: 231px;
            left: 428px;
            display: flex;
            align-items: center;
            gap: 4px;
            transform: rotate(2deg);
        }

        /* 技能点 - 装甲厚度 */
        .skillDotsRow2 {
            position: absolute;
            top: 312px;
            left: 470px;
            display: flex;
            align-items: center;
            gap: 4px;
            transform: rotate(-5deg);
        }

        /* 技能点 - 弹药库 */
        .skillDotsRow3 {
            position: absolute;
            top: 405px;
            left: 458px;
            display: flex;
            align-items: center;
            gap: 4px;
            transform: rotate(-4deg);
        }
        
        .skillDot {
            width: 17px;
            height: 17px;
        }
        
        /* hpLevel内第二个skillDot使用static定位 */
        #hpLevel > .skillDot:nth-child(2) {
            position: static;
        }
        
        .skillDot img {
            width: 100%;
            height: 100%;
        }

        /* 玩家船只展示 */
        .playerShipDisplay {
            position: absolute;
            top: 486px;
            left: 850px;
            width: 522px;
            height: 223px;
            z-index: 15;
        }
        
        /* 船只重量动画 - 下沉又上浮 */
        @keyframes shipWeightBounce {
            0% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(15px);
            }
            60% {
                transform: translateY(-5px);
            }
            100% {
                transform: translateY(0);
            }
        }
        
        .ship-weight-animation {
            animation: shipWeightBounce 0.6s ease-out;
        }
        
        .playerShipDisplay img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* 涡轮增压层 - 在最下层 */
        .shipTurbo {
            z-index: 1;
            display: none;
        }
        
        .shipTurbo.active {
            display: block;
        }
        
        /* 涡轮增压特定样式 */
        #shipTurbo {
            width: 115px;
            top: 27px;
            left: 13px;
        }
        
        /* 弹药库层 */
        .shipAmmo {
            z-index: 2;
            display: none;
        }
        
        .shipAmmo.active {
            display: block;
        }
        
        /* 弹药库特定样式 */
        #shipAmmo {
            width: 60px;
            left: 364px;
            top: 19px;
            z-index: 2;
        }
        
        /* 船只基础层 */
        .shipBase {
            z-index: 3;
        }
        
        /* 船只基础特定样式 */
        #shipBase {
            top: 0px;
        }
        
        /* 装甲层 - 在最上层 */
        .shipArmor {
            z-index: 4;
            display: none;
        }
        
        .shipArmor.active {
            display: block;
        }
        
        /* 装甲特定样式 */
        #shipArmor {
            width: 240px;
            left: 84px;
            top: 55px;
        }

        /* 技能描述文本 */
        .skillDescriptions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .skillDesc {
            position: absolute;
            font-family: "Lantinghei SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            width: 200px;
            text-align: left;
        }

        #speedDesc {
            top: 233px;
            left: 113px;
            transform: rotate(-1deg);
        }

        #hpDesc {
            top: 342px;
            left: 160px;
            transform: rotate(-9deg);
        }

        #ammoDesc {
            top: 436px;
            left: 195px;
            transform: rotate(-12deg);
        }

        .skillDescHighlight {
            color: #6fc900;
        }

        .skillDescNormal {
            color: #a3a3a3;
        }

        /* 血量描述特殊颜色 */
        #hpDesc .skillDescHighlight {
            color: #ff5e00;
        }

        /* 弹药描述特殊颜色 */
        #ammoDesc .skillDescHighlight {
            color: #6fc900;
        }

        /* 开始游戏按钮 - 使用图片素材 */
        .startGameBtnWrapper {
            position: absolute;
            top: 660px;
            left: 349px;
            z-index: 20;
        }
        
        .startGameBtn {
            position: absolute;
            top: 22px;
            left: -115px;
            width: 355px;
            height: 268px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
        }
        
        .startGameBtn img {
            position: absolute;
            top: 9px;
            left: 0px;
            transform: rotate(-6deg);
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .startGameBtn:disabled {
            cursor: not-allowed;
        }
        
        .startGameBtn:not(:disabled) {
            transition: transform 0.2s ease;
        }
        
        .startGameBtn:not(:disabled):hover {
            transform: scale(1.05);
        }
        
        /* 随机点数按钮 */
        .randomPointsBtnWrapper {
            position: absolute;
            top: 596px;
            left: 584px;
            width: 180px;
            height: 180px;
            z-index: 200;
        }

        .randomPointsBtn {
            width: 180px;
            height: 180px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s ease;
            position: absolute;
            left: 0;
            top: 0;
        }

        .randomPointsBtn img {
            position: absolute;
            left: 0;
            top: 0;
            transform: rotate(7deg);
            width: 180px;
            height: 180px;
            object-fit: contain;
            pointer-events: none;
        }

        .randomPointsBtn:hover {
            transform: scale(1.1);
        }

        .randomPointsBtn:hover img {
            transform: rotate(7deg) scale(1.1);
        }

        .randomPointsBtn:active {
            transform: scale(0.95);
        }

        .randomPointsBtn:active img {
            transform: rotate(7deg) scale(0.95);
        }
        
        /* 游戏画布 */
        #gameCanvas {
            display: none;
            width: 100%;
            height: 100%;
        }
        
        /* 受攻击闪红效果 */
        #damageFlash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0);
            pointer-events: none;
            z-index: 500;
            transition: background 0.1s ease-out;
        }
        
        #damageFlash.active {
            background: rgba(255, 0, 0, 0.25);
        }
        
        /* 游戏结束画面 */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1000;
        }
        
        #gameOverScreen.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .gameOverOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        #gameOverScreen.active .gameOverOverlay {
            background: rgba(0, 0, 0, 0.65);
            opacity: 1;
            animation: gameOverOverlayFadeIn 0.5s ease forwards;
        }
        
        @keyframes gameOverOverlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .gameOverContent {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .gameOverTitle {
            width: 1000px;
            height: auto;
            margin-top: -60px;
            z-index: 2;
            opacity: 0;
            transform: translateY(-100px) scale(0.8);
        }
        
        #gameOverScreen.active .gameOverTitle {
            animation: gameOverTitleBounce 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.2s forwards;
        }
        
        @keyframes gameOverTitleBounce {
            0% {
                opacity: 0;
                transform: translateY(-100px) scale(0.8);
            }
            60% {
                opacity: 1;
                transform: translateY(10px) scale(1.05);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .scorePanel {
            position: absolute;
            top: 260px;
            left: 336px;
            width: 514px;
            height: auto;
            margin-bottom: 20px;
            z-index: 3;
            opacity: 0;
            transform: translateY(50px);
        }
        
        #gameOverScreen.active .scorePanel {
            animation: gameOverScoreSlide 0.6s ease-out 0.5s forwards;
        }
        
        @keyframes gameOverScoreSlide {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .scorePanelBg {
            width: 100%;
            height: auto;
        }
        
        .finalScore {
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translateY(-50%);
            color: #e8f05c;
            font-family: "HYQiHeiY3", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            font-size: 50px;
            font-weight: bold;
            opacity: 0;
        }
        
        #gameOverScreen.active .finalScore {
            animation: gameOverScoreFadeIn 0.4s ease-out 0.9s forwards;
        }
        
        @keyframes gameOverScoreFadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        
        .gameOverButtons {
            position: relative;
            width: 972px;
            height: 179px;
            margin-top: 20px;
            opacity: 0;
            transform: scale(0.9);
        }
        
        #gameOverScreen.active .gameOverButtons {
            animation: gameOverButtonsPop 0.5s ease-out 0.8s forwards;
        }
        
        @keyframes gameOverButtonsPop {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .gameOverBtn {
            position: absolute;
            height: auto;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.6;
        }
        
        .gameOverBtn:hover,
        .gameOverBtn.active {
            opacity: 1;
            transform: scale(1.08);
        }
        
        #btnRetry {
            width: 488px;
            height: 172px;
            left: 49px;
            top: 0px;
            opacity: 1;
        }
        
        #btnRetry:hover,
        #btnRetry.active {
            transform: scale(1.1);
        }
        
        #btnConfig {
            width: 492px;
            height: 207px;
            left: 459px;
            top: -33px;
            opacity: 1;
        }
        
        /* 暂停画面样式 */
        #pauseScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1000;
        }
        
        #pauseScreen.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .pauseOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            opacity: 0;
        }
        
        #pauseScreen.active .pauseOverlay {

            opacity: 1;
            animation: pauseOverlayFadeIn 0.4s ease forwards;
        }
        
        @keyframes pauseOverlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .pauseContent {

            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

            left: -453px;
            top: -213px;
            opacity: 0;
            transform: translateY(-80px) scale(0.8);
        }

        }
        
        @keyframes pauseTitleBounce {
            0% {
                opacity: 0;
                transform: translateY(-80px) scale(0.8);

        // ==================== 技能系统 ====================
        function showSkillPanel() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('skillPanel').style.display = 'flex';
            gameState.currentScreen = 'skill';
            
            // 重置船只位置和过渡

            shipDisplay.style.transition = '';
            shipDisplay.style.transform = '';

        // 转场到技能配置面板的动画
        function transitionToSkillPanel(fromScreen) {
            // 创建转场遮罩
            const transitionOverlay = document.createElement('div');
            transitionOverlay.className = 'skillTransitionOverlay';
            document.body.appendChild(transitionOverlay);
            
            // 触发重绘以确保动画生效
            transitionOverlay.offsetHeight;
            
            // 开始淡出动画
            transitionOverlay.classList.add('active');
            
            // 在遮罩淡入过程中就开始准备技能面板
            setTimeout(() => {
                // 根据来源界面隐藏对应界面
                if (fromScreen === 'pause') {
                    hidePauseScreen();
                } else if (fromScreen === 'gameover') {
                    hideGameOverScreen();
                } else if (fromScreen === 'victory') {
                    hideVictoryScreen();
                }
                
                // 隐藏游戏画布
                document.getElementById('gameCanvas').style.display = 'none';
                
                // 重置技能点
                gameState.skillPoints = { speed: 0, hp: 0, ammo: 0 };
                
                // 重置船只位置
                const shipDisplay = document.querySelector('.playerShipDisplay');
                shipDisplay.style.transform = '';
                shipDisplay.style.transition = '';
                
                updateSkillUI();
                
                // 显示技能面板（在遮罩最黑的时候显示）
                document.getElementById('skillPanel').style.display = 'flex';
                gameState.currentScreen = 'skill';
                
                // 开始淡出遮罩，露出技能面板
                transitionOverlay.classList.remove('active');
                
                // 移除转场遮罩
                setTimeout(() => {
                    if (transitionOverlay.parentNode) {
                        transitionOverlay.parentNode.removeChild(transitionOverlay);
                    }
                }, 300);
            }, 200);
        }

        function adjustSkill(skill, delta) {
            const currentLevel = gameState.skillPoints[skill];
            const maxLevel = GAME_CONFIG.skillSystem.maxLevel[skill];
            const usedPoints = Object.values(gameState.skillPoints).reduce((a, b) => a + b, 0);
            const remainingPoints = GAME_CONFIG.skillSystem.totalPoints - usedPoints;

            if (delta > 0 && currentLevel < maxLevel && remainingPoints > 0) {
                gameState.skillPoints[skill]++;
            } else if (delta < 0 && currentLevel > 0) {
                gameState.skillPoints[skill]--;
            }

            updateSkillUI();
        }

        // 随机分配技能点数
        function randomizeSkills() {
            const totalPoints = GAME_CONFIG.skillSystem.totalPoints;
            const skills = ['speed', 'hp', 'ammo'];
            const maxLevels = {
                speed: GAME_CONFIG.skillSystem.maxLevel.speed,
                hp: GAME_CONFIG.skillSystem.maxLevel.hp,
                ammo: GAME_CONFIG.skillSystem.maxLevel.ammo
            };
            
            // 重置所有技能点为0
            skills.forEach(skill => {
                gameState.skillPoints[skill] = 0;
            });
            
            // 随机分配5点
            let remainingPoints = totalPoints;
            while (remainingPoints > 0) {
                // 获取当前可以升级的技能（未满级）
                const availableSkills = skills.filter(skill => 
                    gameState.skillPoints[skill] < maxLevels[skill]
                );
                
                // 如果没有可用技能，退出循环
                if (availableSkills.length === 0) break;
                
                // 随机选择一个技能
                const randomSkill = availableSkills[Math.floor(Math.random() * availableSkills.length)];
                gameState.skillPoints[randomSkill]++;
                remainingPoints--;
            }
            
            // 更新UI
            updateSkillUI();
        }

        function updateSkillUI() {
            const usedPoints = Object.values(gameState.skillPoints).reduce((a, b) => a + b, 0);
            const remainingPoints = GAME_CONFIG.skillSystem.totalPoints - usedPoints;

            document.getElementById('remainingPoints').textContent = `${remainingPoints}/${GAME_CONFIG.skillSystem.totalPoints}`;

            // 更新各技能显示
            ['speed', 'hp', 'ammo'].forEach(skill => {
                const level = gameState.skillPoints[skill];
                const maxLevel = GAME_CONFIG.skillSystem.maxLevel[skill];
                const dots = document.querySelectorAll(`#${skill}Level .skillDot img`);
                
                dots.forEach((dot, index) => {
                    dot.src = index < level ? 'assets/figma_image/screenshot_619_741.png' : 'assets/skill_dot_empty.png';
                });

                // 更新按钮状态和图片
                const minusBtn = document.getElementById(`${skill}Minus`);
                const plusBtn = document.getElementById(`${skill}Plus`);
                const minusImg = document.getElementById(`${skill}MinusImg`);
                const plusImg = document.getElementById(`${skill}PlusImg`);
                
                // 减号按钮：等级为0时不可用
                minusBtn.disabled = level === 0;
                minusImg.src = level === 0 ? 'assets/btn_minus_disabled.png' : 'assets/btn_minus_enabled.png';
                
                // 加号按钮：达到最大等级或没有剩余点数时不可用
                plusBtn.disabled = level >= maxLevel || remainingPoints === 0;
                plusImg.src = (level >= maxLevel || remainingPoints === 0) ? 'assets/btn_plus_disabled.png' : 'assets/btn_plus_enabled.png';
            });

            // 更新开始游戏按钮
            const startBtn = document.getElementById('startGameBtn');
            const startBtnImg = document.getElementById('startGameBtnImg');
            startBtn.disabled = remainingPoints > 0;
            startBtnImg.src = remainingPoints > 0 ? 'assets/figma_image/screenshot_508_131.png' : 'assets/figma_image/screenshot_472_104.png';

            // 更新技能描述
            updateSkillDescriptions();

            // 更新船只展示图片
            updateSkillPanelShip();
        }

        // 保存上一次的技能等级，用于检测变化

        function updateSkillPanelShip() {
            const speedLevel = gameState.skillPoints.speed;
            const hpLevel = gameState.skillPoints.hp;
            const ammoLevel = gameState.skillPoints.ammo;
            
            // 获取各层元素
            const shipTurbo = document.getElementById('shipTurbo');
            const shipArmor = document.getElementById('shipArmor');
            const shipAmmo = document.getElementById('shipAmmo');
            const shipDisplay = document.querySelector('.playerShipDisplay');
            
            // 检测是否有新增的技能点（总等级增加）
            const currentTotal = speedLevel + hpLevel + ammoLevel;
            const lastTotal = lastSkillLevels.speed + lastSkillLevels.hp + lastSkillLevels.ammo;
            const hasNewSkill = currentTotal > lastTotal;
            
            // 根据技能等级显示/隐藏对应层
            // 涡轮增压 >= 1级时显示
            if (speedLevel >= 1) {
                shipTurbo.classList.add('active');
            } else {
                shipTurbo.classList.remove('active');
            }
            
            // 装甲厚度 >= 1级时显示
            if (hpLevel >= 1) {
                shipArmor.classList.add('active');
            } else {
                shipArmor.classList.remove('active');
            }
            
            // 弹药库 >= 1级时显示
            if (ammoLevel >= 1) {
                shipAmmo.classList.add('active');
            } else {
                shipAmmo.classList.remove('active');
            }
            
            // 如果有新增技能点，触发动画
            if (hasNewSkill) {
                shipDisplay.classList.add('ship-weight-animation');
                setTimeout(() => {
                    shipDisplay.classList.remove('ship-weight-animation');
                }, 600);
            }
            
            // 更新上一次的技能等级
            lastSkillLevels = { speed: speedLevel, hp: hpLevel, ammo: ammoLevel };
        }

        function startGame() {
            const skillPanel = document.getElementById('skillPanel');
            const shipDisplay = document.querySelector('.playerShipDisplay');
            
            // 先移除可能正在进行的动画类
            shipDisplay.classList.remove('ship-weight-animation');
            
            // 先重置船只位置和过渡，确保从正确位置开始动画
            shipDisplay.style.transition = 'none';
            shipDisplay.style.transform = 'translateX(0)';

            shipDisplay.offsetHeight;
            
            // 创建过渡遮罩层
            const transitionOverlay = document.createElement('div');
            transitionOverlay.style.cssText = `
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #000;
                opacity: 0;
                pointer-events: none;
                z-index: 1000;
                transition: opacity 0.8s ease-in;
            `;
            skillPanel.appendChild(transitionOverlay);
            
            // 船只容器向右移动的动画 - 所有分层素材一起移动
            // 使用 requestAnimationFrame 确保在下一帧才开始动画
            requestAnimationFrame(() => {
                shipDisplay.style.transition = 'transform 1s ease-in';
                shipDisplay.style.transform = 'translateX(120%)';
            });
            
            // 延迟后开始变黑
            setTimeout(() => {
                transitionOverlay.style.opacity = '1';
            }, 200);
            
            // 动画结束后切换到游戏
            setTimeout(() => {
                skillPanel.style.display = 'none';
                document.getElementById('gameCanvas').style.display = 'block';
                gameState.currentScreen = 'game';
                
                initGame();
                
                // 确保只有一个游戏循环在运行
                if (gameLoopId === null) {
                    gameLoop();
                }
                
                // 清理过渡层
                if (transitionOverlay.parentNode) {
                    transitionOverlay.parentNode.removeChild(transitionOverlay);
                }
            }, 1000);
        }

        function initSubmarines() {
            // 初始生成6艘潜艇，适应1920x1080分辨率
            const positions = [680, 760, 840, 920, 1000, 1080];
            positions.forEach((y, index) => {
                const subType = Math.random() > 0.5 ? 1 : 0; // 随机选择普通潜艇类型
                // 橘色潜艇 192*72，银色潜艇 192*80
                const width = 192;
                const height = subType === 1 ? 80 : 72;
                submarines.push({
                    x: canvas.width + index * 250,
                    y: y,
                    width: width,
                    height: height,
                    id: index,
                    isGold: false,
                    subType: subType,
                    lastMissileTime: 0,
                    hitEffect: { active: false, startTime: 0, shakeOffset: { x: 0, y: 0 } },
                    recoilEffect: { active: false, startTime: 0, offsetY: 0 }
                });
            });
        }

        // 获取当前难度系数 (随分数增加) - 更平缓的难度曲线
        function getDifficultyMultiplier() {
            // 基础难度1.0，每50分增加0.3，最高2.0
            return Math.min(1.0 + score * 0.006, 2.0);
        }
        
        // 获取潜艇速度 - 所有潜艇初始速度快10%
        function getSubmarineSpeed() {
            return 1.87 * getDifficultyMultiplier();
        }
        
        // 获取导弹发射间隔
        function getMissileCooldown() {
            // 从2500ms逐渐降低到900ms
            return Math.max(2500 - score * 26, 900);
        }
        
        // 获取导弹发射概率
        function getMissileChance() {
            // 从0.007逐渐增加到0.028
            return Math.min(0.007 + score * 0.00042, 0.028);
        }
        
        // 检查位置是否与其他潜艇重叠
        function isOverlapping(x, y, width, height, excludeSub = null) {
            const minDistance = 150; // 最小间距
            for (const sub of submarines) {
                if (sub === excludeSub) continue;
                
                const dx = (x + width/2) - (sub.x + sub.width/2);
                const dy = (y + height/2) - (sub.y + sub.height/2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < minDistance) {
                    return true;
                }
            }
            return false;
        }

        // ==================== 游戏循环 ====================
        function gameLoop() {
            if (gameState.currentScreen !== 'game') {
                gameLoopId = null;
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            drawBackground();

            // 只有在未暂停、未时停且游戏未结束时才更新
            if (!gameOver && !gamePaused && !timeStopEffect.active) {
                update();
            }
            
            // 检查时停效果是否结束（超级武器时停由setTimeout控制，这里只处理非超级武器情况）
            if (timeStopEffect.active && !superWeaponEffect.active) {
                const timeStopElapsed = Date.now() - timeStopEffect.startTime;
                if (timeStopElapsed >= timeStopEffect.duration) {
                    timeStopEffect.active = false;
                }
            }

            draw();

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function update() {
            // 更新玩家
            updatePlayer();

            // 更新护盾状态
            updateShield();

            // 更新免疫伤害提示气泡
            updateImmunityBubble();

            // 更新连击状态
            updateCombo();

            // 更新连击数字动画
            updateComboAnimation();

            // 更新水雷
            updateMines();

            // 更新潜艇
            updateSubmarines();

            // 更新导弹
            updateMissiles();

            // 更新导弹发射气泡特效
            updateMissileLaunchBubbles();

            // 更新海面浪花特效
            updateWaterSplashes();

            // 更新爆炸
            updateExplosions();

            // 更新道具
            updatePowerUps();

            // 更新碎片
            updateFragments();

            // 弹药恢复
            updateMineRegen();

            // 更新玩家死亡爆炸效果
            updatePlayerDefeatEffects();

            // 碰撞检测
            checkCollisions();
            
            // 更新强敌来袭横幅
            updateBossWarning();
            
            // 更新Boss
            updateBoss();
            updateBossBullets();
            updateBossMissiles();
            
            // 检查场景切换（500分后切换到夜晚场景）
            if (score >= 500 && !isNightScene) {
                isNightScene = true;
                // 启动速度过渡动画
                sceneSpeedTransition.active = true;
                sceneSpeedTransition.startTime = Date.now();
                // 启动背景渐变过渡
                sceneBgTransition.active = true;
                sceneBgTransition.startTime = Date.now();
                sceneBgTransition.progress = 0;
                console.log('切换到夜晚场景，开始加速和背景渐变过渡');
            }
            
            // 更新场景速度过渡
            if (sceneSpeedTransition.active) {
                const elapsed = Date.now() - sceneSpeedTransition.startTime;
                if (elapsed >= sceneSpeedTransition.duration) {
                    sceneSpeedTransition.active = false;
                    console.log('加速过渡完成');
                }
            }
            
            // 更新场景背景渐变过渡
            if (sceneBgTransition.active) {
                const elapsed = Date.now() - sceneBgTransition.startTime;
                sceneBgTransition.progress = Math.min(elapsed / sceneBgTransition.duration, 1);
                if (elapsed >= sceneBgTransition.duration) {
                    sceneBgTransition.active = false;
                    sceneBgTransition.progress = 1;
                    console.log('背景渐变过渡完成');
                }
            }
        }

        function updateBossWarning() {
            if (!bossWarningEffect.active) return;
            
            const now = Date.now();
            const elapsed = now - bossWarningEffect.startTime;
            
            // 检查是否结束显示
            if (elapsed > bossWarningEffect.duration) {
                bossWarningEffect.active = false;
                // 横幅结束后激活Boss
                if (!boss.active) {
                    activateBoss();
                }
                return;
            }
            
            // 入场动画：从上方滑入到屏幕正中心
            const bannerHeight = assets.bossWarning.complete ? assets.bossWarning.naturalHeight : 200;
            const targetY = (canvas.height - bannerHeight) / 2; // 屏幕正中心
            const entryDuration = 500; // 入场动画500ms
            
            if (elapsed < entryDuration) {
                // 入场阶段
                const progress = elapsed / entryDuration;
                bossWarningEffect.currentY = bossWarningEffect.entryOffset + (targetY - bossWarningEffect.entryOffset) * easeOutBack(progress);
            } else {
                // 保持在目标位置
                bossWarningEffect.currentY = targetY;
            }
        }
        
        // 缓动函数
        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        // 激活Boss
        function activateBoss() {
            boss.active = true;
            boss.x = 2100; // 从右侧屏幕外开始
            boss.y = 584; // 往上移动40%后的位置
            boss.hp = BOSS_DEFENSE.maxHp;
            boss.displayHp = BOSS_DEFENSE.maxHp;
            boss.hpAnimation.fromHp = BOSS_DEFENSE.maxHp;
            boss.hpAnimation.toHp = BOSS_DEFENSE.maxHp;
            boss.hpAnimation.active = false;
            // 启动血条入场动画
            boss.hpBarEntry.active = true;
            boss.hpBarEntry.startTime = Date.now();
            boss.hpBarEntry.hpFillProgress = 0;
            boss.entryComplete = false;
            boss.currentAttackIndex = 0;
            boss.lastAttackTime = Date.now();
            boss.laserPreparing = false;
            bossBullets = [];
            bossMissiles = [];

            // Boss出场时启动场景速度过渡（从夜晚速度过渡回白天速度）
            bossSceneSpeedTransition.active = true;
            bossSceneSpeedTransition.startTime = Date.now();
            // 根据当前实际速度设置起始速度
            if (isNightScene && sceneSpeedTransition.active) {
                // 如果正在夜晚加速过渡中，使用当前过渡速度
                const elapsed = Date.now() - sceneSpeedTransition.startTime;
                const progress = Math.min(elapsed / sceneSpeedTransition.duration, 1);
                bossSceneSpeedTransition.fromSpeed = sceneSpeedTransition.fromSpeed + 
                    (sceneSpeedTransition.toSpeed - sceneSpeedTransition.fromSpeed) * progress;
            } else if (isNightScene) {
                // 夜晚场景已完成加速，使用最大速度
                bossSceneSpeedTransition.fromSpeed = sceneSpeedTransition.toSpeed;
            } else {
                // 白天场景，使用白天速度
                bossSceneSpeedTransition.fromSpeed = backgroundScrollSpeed;
            }
            
            // Boss出场时不清除现有潜艇，让它们继续移动直到离开画面
            
            console.log('Boss激活，开始入场');
        }

        // 更新Boss
        function updateBoss() {
            if (!boss.active) return;

            // 入场动画
            if (!boss.entryComplete) {
                const targetX = (canvas.width - boss.width) / 2; // 停在屏幕中间
                const entrySpeed = 4; // 加快30%（从3增加到4）
                
                if (boss.x > targetX) {
                    boss.x -= entrySpeed;
                } else {
                    boss.x = targetX;
                    boss.entryComplete = true;
                    // 首次攻击间隔大幅缩短（500ms）
                    boss.lastAttackTime = Date.now() - (boss.attackCooldown - 500);
                    boss.moveTargetX = targetX;
                    boss.moveTargetY = boss.y;
                    boss.lastMoveTime = Date.now();
                    console.log('Boss入场完成，开始攻击');
                }
                return;
            }

            // 攻击逻辑
            const now = Date.now();
            
            // Boss左右移动（激光攻击期间停止移动）
            if (!boss.laserActive && !boss.laserWarning) {
                updateBossMovement();
                
                // 更新移动计时器
                if (now - boss.lastMoveTime > boss.moveInterval) {
                    // 随机选择新的目标位置（在屏幕中间区域左右移动）
                    const minX = (canvas.width - boss.width) / 2 - 200;
                    const maxX = (canvas.width - boss.width) / 2 + 200;
                    boss.moveTargetX = minX + Math.random() * (maxX - minX);
                    
                    // 随机选择Y位置（上下轻微移动）
                    const minY = 500;
                    const maxY = 700;
                    boss.moveTargetY = minY + Math.random() * (maxY - minY);
                    
                    boss.lastMoveTime = now;
                }
            }
            
            // 激光预警期间
            if (boss.laserWarning) {
                if (now - boss.laserWarningStartTime > boss.laserWarningDuration) {
                    // 预警结束，开始实际激光攻击
                    boss.laserWarning = false;
                    boss.laserActive = true;
                    boss.laserStartTime = now;
                    console.log('Boss攻击3：激光发射！');
                }
                return;
            }
            
            // 激光攻击期间不执行其他攻击
            if (boss.laserActive) {
                // 激光打在水面位置，持续播放浪花特效
                const waterLevelY = 274; // 水平面Y坐标
                const laserX = boss.x + boss.width / 2;
                // 每200毫秒创建一个新的浪花特效，形成持续效果
                const laserElapsed = now - boss.laserStartTime;
                const splashInterval = 200; // 每200ms创建一个浪花
                const lastSplashIndex = Math.floor((laserElapsed - 16) / splashInterval); // 上一帧的索引
                const currentSplashIndex = Math.floor(laserElapsed / splashInterval);
                if (currentSplashIndex > lastSplashIndex) {
                    // 激光产生的浪花持续时间减少30%（490ms vs 700ms）
                    createLaserWaterSplash(laserX, waterLevelY);
                }
                
                if (now - boss.laserStartTime > boss.laserDuration) {
                    boss.laserActive = false;
                    boss.lastAttackTime = now;
                    boss.currentAttackIndex = (boss.currentAttackIndex + 1) % boss.attackSequence.length;
                }
                return;
            }

            // 更新Boss后坐力动画
            if (boss.recoilEffect && boss.recoilEffect.active) {
                const recoilElapsed = now - boss.recoilEffect.startTime;
                if (recoilElapsed >= boss.recoilEffect.duration) {
                    boss.recoilEffect.active = false;
                    boss.recoilEffect.offsetY = 0;
                } else {
                    // 后坐力动画：先向下快速移动，然后缓慢回位
                    const progress = recoilElapsed / boss.recoilEffect.duration;
                    if (progress < 0.3) {
                        // 前30%时间向下移动（后坐）
                        const p = progress / 0.3;
                        boss.recoilEffect.offsetY = 20 * Math.sin(p * Math.PI / 2);
                    } else {
                        // 后70%时间回位
                        const p = (progress - 0.3) / 0.7;
                        boss.recoilEffect.offsetY = 20 * (1 - Math.sin(p * Math.PI / 2));
                    }
                }
            }

            // 检查攻击冷却
            if (now - boss.lastAttackTime < boss.attackCooldown) return;

            // 执行当前攻击
            const currentAttack = boss.attackSequence[boss.currentAttackIndex];
            
            // 激光攻击前，先快速移动到玩家X轴位置
            if (currentAttack === 3 && !boss.laserPreparing) {
                boss.laserPreparing = true;
                boss.laserTargetX = player.x + player.width / 2 - boss.width / 2;
                boss.laserMoveStartTime = now;
                boss.laserMoveDuration = 800; // 0.8秒快速移动到玩家位置
                boss.laserOriginalX = boss.x;
                console.log('Boss准备激光攻击，快速移动到玩家位置');
                return;
            }
            
            // 激光准备移动期间
            if (boss.laserPreparing) {
                const moveElapsed = now - boss.laserMoveStartTime;
                if (moveElapsed < boss.laserMoveDuration) {
                    // 使用缓动函数平滑移动
                    const progress = moveElapsed / boss.laserMoveDuration;
                    const easeProgress = 1 - Math.pow(1 - progress, 3); // easeOutCubic
                    boss.x = boss.laserOriginalX + (boss.laserTargetX - boss.laserOriginalX) * easeProgress;
                    return;
                } else {
                    // 移动完成，开始激光攻击
                    boss.x = boss.laserTargetX;
                    boss.laserPreparing = false;
                }
            }
            
            switch (currentAttack) {
                case 1:
                    spawnBossBullets();
                    break;
                case 2:
                    spawnBossMissiles();
                    break;
                case 3:
                    activateBossLaser();
                    break;
            }

            // 激光攻击会自己处理索引增加，其他攻击在这里增加
            if (currentAttack !== 3) {
                boss.currentAttackIndex = (boss.currentAttackIndex + 1) % boss.attackSequence.length;
                boss.lastAttackTime = now;
            }
        }

        // Boss移动函数
        function updateBossMovement() {
            // X方向移动
            const dx = boss.moveTargetX - boss.x;
            if (Math.abs(dx) > boss.moveSpeed) {
                boss.x += Math.sign(dx) * boss.moveSpeed;
            } else {
                boss.x = boss.moveTargetX;
            }
            
            // Y方向移动（上下轻微移动）
            const dy = boss.moveTargetY - boss.y;
            if (Math.abs(dy) > boss.moveSpeed) {
                boss.y += Math.sign(dy) * boss.moveSpeed;
            } else {
                boss.y = boss.moveTargetY;
            }
        }

        // 攻击方式1：密集圆点子弹
        function spawnBossBullets() {
            console.log('Boss攻击1：圆点子弹');
            const bulletCount = 10;
            
            for (let i = 0; i < bulletCount; i++) {
                const angle = (Math.PI / bulletCount) * i + Math.random() * 0.5; // 扇形分布
                const speed = 3 + Math.random() * 2;
                
                bossBullets.push({
                    x: boss.x + boss.width / 2,
                    y: boss.y + boss.height / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 10.4, // 子弹大小增加30%（8 * 1.3 = 10.4）
                    delay: 2000, // 2秒延迟后开始上浮
                    startTime: Date.now(),
                    active: true,
                    damage: 1 // Boss子弹-1点生命值
                });
            }
        }

        // 更新Boss子弹
        function updateBossBullets() {
            const now = Date.now();
            
            for (let i = bossBullets.length - 1; i >= 0; i--) {
                const bullet = bossBullets[i];
                const elapsed = now - bullet.startTime;
                
                if (elapsed < bullet.delay) {
                    // 延迟期内做无规律运动
                    bullet.x += bullet.vx;
                    bullet.y += bullet.vy;
                    
                    // 边界反弹
                    if (bullet.x < 0 || bullet.x > canvas.width) bullet.vx *= -1;
                    if (bullet.y < 0 || bullet.y > canvas.height) bullet.vy *= -1;
                } else {
                    // 延迟结束后垂直上浮
                    const prevY = bullet.y;
                    bullet.y -= 4;
                    
                    // 检测子弹是否飞出海平面（从水下到水上）
                    const waterLevelY = 274; // 水平面Y坐标
                    const wasBelowWater = prevY > waterLevelY;
                    const isAboveWater = bullet.y < waterLevelY;
                    
                    if (wasBelowWater && isAboveWater && !bullet.splashCreated) {
                        // 子弹飞出海平面，创建浪花特效（大小减少80%）
                        createBossBulletWaterSplash(bullet.x, waterLevelY);
                        bullet.splashCreated = true;
                    }
                    
                    // 检查与玩家碰撞
                    // 强敌来袭横幅显示期间，玩家无敌，跳过碰撞检测
                    if (bossWarningEffect.active) {
                        continue;
                    }
                    
                    if (checkBulletPlayerCollision(bullet)) {
                        // 检查护盾效果
                        if (player.shield && player.shield.active) {
                            // 护盾激活，免疫伤害
                        } else {
                            hp -= bullet.damage;
                        }
                        
                        // 创建爆炸效果
                        createExplosion(bullet.x, bullet.y);
                        
                        // 启动HP动画
                        hpAnimation.active = true;
                        hpAnimation.startTime = Date.now();
                        hpAnimation.fromHp = hpAnimation.displayHp;
                        hpAnimation.toHp = hp;
                        
                        triggerDamageFlash();
                        bossBullets.splice(i, 1);

                        if (hp <= 0 && !playerDefeatState.active) {
                            // 检查是否可以触发致命伤害免疫
                            if (!checkFatalDamageImmunity()) {
                                playerDefeated();
                            }
                        }
                        continue;
                    }

                    // 移除超出屏幕的子弹
                    if (bullet.y < -20) {
                        bossBullets.splice(i, 1);
                    }
                }
            }
        }

        // 更新Boss导弹
        function updateBossMissiles() {
            const now = Date.now();
            const waterLevelY = 274; // 水平面Y坐标
            
            for (let i = bossMissiles.length - 1; i >= 0; i--) {
                const missile = bossMissiles[i];
                const prevY = missile.y; // 记录上一帧的Y坐标
                
                // 上升阶段
                if (missile.phase === 'rising') {
                    const elapsed = now - missile.riseStartTime;
                    
                    // 垂直上升
                    missile.y += Math.sin(missile.angle) * missile.speed;
                    
                    // 检查是否完成上升阶段
                    if (elapsed >= missile.riseDuration) {
                        missile.phase = 'tracking';
                        // 锁定玩家当前位置
                        missile.targetX = player.x + player.width / 2;
                        missile.targetY = player.y + player.height / 2;
                        // 计算朝向锁定位置的角度
                        const dx = missile.targetX - missile.x;
                        const dy = missile.targetY - missile.y;
                        missile.angle = Math.atan2(dy, dx);
                        // 追踪阶段速度增加20%
                        missile.speed *= 1.2;
                        console.log('导弹转向，锁定目标位置，速度提升20%：', missile.targetX, missile.targetY);
                    }
                } else {
                    // 追踪阶段 - 直接朝锁定位置直线前进
                    missile.x += Math.cos(missile.angle) * missile.speed;
                    missile.y += Math.sin(missile.angle) * missile.speed;
                }
                
                // 检查是否穿过水平面（从水下到水上），创建海浪特效
                const wasBelowWater = prevY + missile.height > waterLevelY;
                const isAboveWater = missile.y < waterLevelY;
                
                if (wasBelowWater && isAboveWater && !missile.splashCreated) {
                    // 导弹飞出海平面，创建浪花特效（使用夜晚版本，因为Boss场景使用夜晚特效）
                    createWaterSplash(missile.x + missile.width / 2, waterLevelY);
                    missile.splashCreated = true; // 标记已创建浪花，避免重复创建
                }
                
                // 检查与玩家碰撞
                // 强敌来袭横幅显示期间，玩家无敌，跳过碰撞检测
                if (bossWarningEffect.active) {
                    continue;
                }
                
                if (checkMissilePlayerCollision(missile)) {
                    // 检查护盾效果
                    if (player.shield && player.shield.active) {
                        // 护盾激活，免疫伤害
                    } else {
                        hp -= missile.damage;
                    }
                    
                    // 创建爆炸效果
                    createExplosion(missile.x + missile.width / 2, missile.y + missile.height / 2);
                    
                    // 启动HP动画
                    hpAnimation.active = true;
                    hpAnimation.startTime = Date.now();
                    hpAnimation.fromHp = hpAnimation.displayHp;
                    hpAnimation.toHp = hp;
                    
                    triggerDamageFlash();
                    bossMissiles.splice(i, 1);

                    if (hp <= 0 && !playerDefeatState.active) {
                        // 检查是否可以触发致命伤害免疫
                        if (!checkFatalDamageImmunity()) {
                            playerDefeated();
                        }
                    }
                    continue;
                }

                // 移除超出屏幕的导弹
                if (missile.x < -50 || missile.x > canvas.width + 50 ||
                    missile.y < -50 || missile.y > canvas.height + 50) {
                    bossMissiles.splice(i, 1);
                }
            }
        }

        // 检查子弹与玩家碰撞
        function checkBulletPlayerCollision(bullet) {
            const dx = bullet.x - (player.x + player.width / 2);
            const dy = bullet.y - (player.y + player.height / 2);
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < bullet.radius + player.width / 3;
        }

        // 检查导弹与玩家碰撞
        function checkMissilePlayerCollision(missile) {
            // 使用导弹中心点和缩小后的碰撞区域
            const missileCenterX = missile.x + missile.width / 2;
            const missileCenterY = missile.y + missile.height / 2;
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            
            // 使用较小的碰撞半径（导弹实际大小的60%）
            const collisionRadiusX = missile.width * 0.3;
            const collisionRadiusY = missile.height * 0.3;
            
            const dx = Math.abs(missileCenterX - playerCenterX);
            const dy = Math.abs(missileCenterY - playerCenterY);
            
            return dx < collisionRadiusX + player.width / 3 &&
                   dy < collisionRadiusY + player.height / 3;
        }

        // 更新玩家死亡爆炸效果
        function updatePlayerDefeatEffects() {
            if (!playerDefeatState.active || !playerDefeatState.explosionsStarted) return;

            const now = Date.now();
            const explosionElapsed = now - playerDefeatState.explosionsStartTime;

            // 触发爆炸
            playerDefeatState.explosions.forEach(exp => {
                if (!exp.triggered && explosionElapsed >= exp.delay) {
                    exp.triggered = true;
                    createExplosion(exp.x, exp.y, true);
                }
            });

            // 爆炸结束后显示游戏结束画面
            if (explosionElapsed >= playerDefeatState.explosionsDuration + 500) {
                if (!playerDefeatState.gameOverTriggered) {
                    playerDefeatState.gameOverTriggered = true;
                    gameOver = true;
                    showGameOverScreen();
                }
            }
        }

        // 加载排行榜数据（从 Supabase）
        async function loadLeaderboard() {
            if (!supabaseClient) {
                // 如果没有配置 Supabase，使用本地存储作为后备
                const data = localStorage.getItem('submarineWarLeaderboard');
                if (data) {
                    leaderboardData = JSON.parse(data);
                }
                return;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from('leaderboard')
                    .select('*')
                    .order('time', { ascending: true })
                    .order('combo', { ascending: false })
                    .limit(100);
                
                if (error) {
                    console.error('加载排行榜失败:', error);
                    return;
                }
                
                // 转换数据格式
                leaderboardData = data.map(item => ({
                    name: item.name,
                    time: item.time,
                    combo: item.combo,
                    skills: {
                        speed: item.speed_level,
                        hp: item.hp_level,
                        ammo: item.ammo_level
                    },
                    date: item.created_at
                }));
            } catch (err) {
                console.error('加载排行榜出错:', err);
            }
        }
        
        // 保存排行榜数据到本地（后备方案）
        function saveLeaderboard() {
            localStorage.setItem('submarineWarLeaderboard', JSON.stringify(leaderboardData));
        }
        
        // 上传分数到排行榜（保存到 Supabase）
        async function uploadToLeaderboard(playerName) {
            if (!playerName || playerName.trim() === '') {
                alert('请输入姓名！');
                return false;
            }
            
            // 检查是否只包含英文
            if (!/^[a-zA-Z0-9\s]+$/.test(playerName)) {
                alert('只能输入英文字母和数字！');
                return false;
            }
            
            currentPlayerData.name = playerName.trim();
            
            // 添加到本地数据
            leaderboardData.push({
                name: currentPlayerData.name,
                time: currentPlayerData.time,
                combo: currentPlayerData.combo,
                skills: { ...currentPlayerData.skills },
                date: new Date().toISOString()
            });
            
            // 排序：按时间从低到高，时间相同按连击从高到低
            leaderboardData.sort((a, b) => {
                if (a.time !== b.time) {
                    return a.time - b.time;
                }
                return b.combo - a.combo;
            });
            
            // 只保留前100条记录
            if (leaderboardData.length > 100) {
                leaderboardData = leaderboardData.slice(0, 100);
            }
            
            // 保存到本地作为后备
            saveLeaderboard();
            
            // 如果配置了 Supabase，上传到云端
            if (supabaseClient) {
                try {
                    console.log('正在上传到 Supabase...', {
                        name: currentPlayerData.name,
                        time: currentPlayerData.time,
                        combo: currentPlayerData.combo,
                        speed_level: currentPlayerData.skills.speed,
                        hp_level: currentPlayerData.skills.hp,
                        ammo_level: currentPlayerData.skills.ammo
                    });
                    
                    const { data, error } = await supabaseClient
                        .from('leaderboard')
                        .insert({
                            name: currentPlayerData.name,
                            time: currentPlayerData.time,
                            combo: currentPlayerData.combo,
                            speed_level: currentPlayerData.skills.speed,
                            hp_level: currentPlayerData.skills.hp,
                            ammo_level: currentPlayerData.skills.ammo
                        })
                        .select();
                    
                    if (error) {

        function renderLeaderboard(showHighlight = true) {
            const listEl = document.getElementById('leaderboardList');
            listEl.innerHTML = '';

            let playerRank = -1;
            let playerIndex = -1;
            
            if (showHighlight && currentPlayerData.name) {
                playerIndex = leaderboardData.findIndex(p => 
                    p.name === currentPlayerData.name && 
                    p.time === currentPlayerData.time &&
                    p.combo === currentPlayerData.combo
                );
                
                if (playerIndex !== -1) {
                    playerRank = playerIndex + 1;
                }
            }
            
            // 显示Top10
            const top10 = leaderboardData.slice(0, 10);
            top10.forEach((player, index) => {
                const isCurrentPlayer = showHighlight && index === playerIndex;
                const item = createLeaderboardItem(index + 1, player, isCurrentPlayer);
                listEl.appendChild(item);
            });
            
            // 如果玩家不在Top10但在100名内，显示玩家行
            if (showHighlight && playerRank > 10 && playerRank <= 100) {
                const playerData = leaderboardData[playerIndex];
                const item = createLeaderboardItem(playerRank, playerData, true);
                listEl.appendChild(item);

        // 绘制Boss
        function drawBoss() {
            // Boss被击败后，在爆炸期间仍然显示
            if (!boss.active && !bossDefeatState.showBubble) return;
            
            if (assets.boss.complete && assets.boss.naturalWidth > 0) {

        // 绘制Boss死亡对话气泡和爆炸效果
        function drawBossDefeatEffects() {
            if (!bossDefeatState.showBubble) return;
            
            const now = Date.now();
            const bubbleElapsed = now - bossDefeatState.bubbleStartTime;
            
            // 绘制对话气泡（显示4秒）
            if (bubbleElapsed < bossDefeatState.bubbleDuration) {
                if (assets.bossDefeatBubble.complete && assets.bossDefeatBubble.naturalWidth > 0) {
                    // 气泡目标显示尺寸 488*171
                    const targetWidth = 488;
                    const targetHeight = 171;
                    // 获取素材原始尺寸
                    const imgWidth = assets.bossDefeatBubble.naturalWidth;
                    const imgHeight = assets.bossDefeatBubble.naturalHeight;
                    // 计算缩放比例，保持宽高比
                    const scale = Math.min(targetWidth / imgWidth, targetHeight / imgHeight);
                    const displayWidth = imgWidth * scale;
                    const displayHeight = imgHeight * scale;
                    // 往右往下移动一些距离（右移80px，下移30px）
                    const bubbleX = boss.x + boss.width / 2 - displayWidth / 2 + 80;
                    const bubbleY = boss.y - displayHeight - 20 + 30;
                    
                    // 入场动画（前300ms）
                    let alpha = 1;
                    let animScale = 1;
                    if (bubbleElapsed < 300) {
                        const progress = bubbleElapsed / 300;
                        alpha = progress;
                        animScale = 0.8 + 0.2 * progress;
                    }
                    
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(bubbleX + displayWidth / 2, bubbleY + displayHeight / 2);
                    ctx.scale(animScale, animScale);
                    // 按保持比例的尺寸绘制气泡
                    ctx.drawImage(assets.bossDefeatBubble, -displayWidth / 2, -displayHeight / 2, displayWidth, displayHeight);
                    ctx.restore();
                }
            }
            
            // 触发爆炸（与气泡同步进行）
            if (bossDefeatState.explosionsStarted) {
                const explosionElapsed = now - bossDefeatState.explosionsStartTime;
                bossDefeatState.explosions.forEach(exp => {
                    if (!exp.triggered && explosionElapsed >= exp.delay) {
                        exp.triggered = true;
                        createExplosion(exp.x, exp.y);
                    }
                });
            }
            
            // 气泡消失时（4秒后）显示通关画面
            if (bubbleElapsed >= bossDefeatState.bubbleDuration) {
                if (!bossDefeatState.gameOverTriggered) {
                    bossDefeatState.gameOverTriggered = true;
                    showVictoryScreen();
                }
            }
        }
        
        // 绘制Boss死亡时的血条（随爆炸逐渐消失）
        function drawBossDefeatHpBar() {
            if (!bossDefeatState.showBubble || !bossDefeatState.explosionsStarted) return;
            
            const now = Date.now();
            const explosionElapsed = now - bossDefeatState.explosionsStartTime;
            
            // 计算血条透明度（随爆炸逐渐减少）
            let alpha = 1;
            if (explosionElapsed > 0) {
                const fadeProgress = Math.min(explosionElapsed / bossDefeatState.explosionsDuration, 1);
                alpha = 1 - fadeProgress;
            }
            
            if (alpha <= 0) return;
            
            const barWidth = 636;
            const barHeight = 132;
            const barX = (canvas.width - barWidth) / 2;
            const barY = canvas.height - barHeight - 20;
            
            ctx.save();
            ctx.globalAlpha = alpha;
            
            // 绘制血条背景
            if (assets.bossHpBar.complete && assets.bossHpBar.naturalWidth > 0) {
                ctx.drawImage(assets.bossHpBar, barX, barY, barWidth, barHeight);
            }
            
            ctx.restore();
        }
        
        // 绘制Boss血条（位于画面底部居中）
        function drawBossHpBar() {
            // Boss活跃时显示，或被击败后气泡显示期间也显示，直到爆炸开始
            if (!boss.active && (!bossDefeatState.showBubble || bossDefeatState.explosionsStarted)) return;

            const barWidth = 636;
            const barHeight = 132;
            const barX = (canvas.width - barWidth) / 2;
            const barY = canvas.height - barHeight - 20;

            // 血量显示区域（根据素材调整）- 填满黑色边框内部
            const hpAreaX = barX + 104; // (636-532)/2 + 偏移量，使血量居中
            const hpAreaY = barY + 30;  // 往下移动4px
            const hpAreaWidth = 528;    // 保持宽度
            const hpAreaHeight = 90;

            // 更新血条入场动画
            let entryOffsetY = 0;
            let entryHpPercent = 1;
            if (boss.hpBarEntry.active) {
                const elapsed = Date.now() - boss.hpBarEntry.startTime;
                const progress = Math.min(elapsed / boss.hpBarEntry.duration, 1);

                // 入场动画：从底部外进入，使用缓动函数
                if (progress < 1) {
                    // 位置动画：从底部外进入（barHeight + 100）到最终位置
                    // 血条位置动画在入场的前30%完成
                    if (progress < 0.3) {
                        const entryProgress = 1 - Math.pow(1 - (progress / 0.3), 3); // easeOutCubic
                        entryOffsetY = (1 - entryProgress) * (barHeight + 100);
                    } else {
                        entryOffsetY = 0;
                    }

                    // 血量填充动画：在整个入场过程中缓慢从0%上涨到100%
                    // 使用线性增长，与Boss入场同步完成
                    entryHpPercent = progress;
                    // 使用轻微的缓动让填充更自然
                    entryHpPercent = 1 - Math.pow(1 - entryHpPercent, 2);
                } else {
                    // 动画结束
                    boss.hpBarEntry.active = false;
                    entryOffsetY = 0;
                    entryHpPercent = 1;
                }
            }

            // 更新血量动画（受到伤害时的动画）
            if (boss.hpAnimation.active) {
                const elapsed = Date.now() - boss.hpAnimation.startTime;
                const progress = Math.min(elapsed / boss.hpAnimation.duration, 1);
                
                // 线性插值计算当前显示血量
                const currentDisplayHp = boss.hpAnimation.fromHp + 
                    (boss.hpAnimation.toHp - boss.hpAnimation.fromHp) * progress;
                boss.displayHp = currentDisplayHp;
                
                // 动画结束
                if (progress >= 1) {
                    boss.hpAnimation.active = false;
                    boss.displayHp = boss.hp;
                }
            }

            // 计算百分比
            const actualHpPercent = boss.hp / boss.maxHp;
            const displayHpPercent = boss.displayHp / boss.maxHp;
            
            // 应用入场动画的血量百分比（入场时空血，快速上涨到100%）
            const finalActualHpPercent = boss.hpBarEntry.active ? 
                actualHpPercent * entryHpPercent : actualHpPercent;
            const finalDisplayHpPercent = boss.hpBarEntry.active ? 
                displayHpPercent * entryHpPercent : displayHpPercent;

            // 保存当前状态
            ctx.save();
            
            // 应用入场动画的位移
            ctx.translate(0, entryOffsetY);

            // 创建箭头形状的裁剪区域 - 匹配素材的黑色边框内部
            ctx.beginPath();
            // 左侧斜切起点（中间偏右，填满左上角）
            ctx.moveTo(hpAreaX + 8, hpAreaY + hpAreaHeight / 2);
            // 左上斜切到上边缘
            ctx.lineTo(hpAreaX + 45, hpAreaY);
            // 上边缘到箭头尖端前（往右挪，避免右侧小红角）
            ctx.lineTo(hpAreaX + hpAreaWidth - 20, hpAreaY);
            // 右箭头尖端（往内收，避免右侧边缘）
            ctx.lineTo(hpAreaX + hpAreaWidth - 3, hpAreaY + hpAreaHeight / 2);
            // 右下斜切（往内收，避免右下角红线）
            ctx.lineTo(hpAreaX + hpAreaWidth - 28, hpAreaY + hpAreaHeight);
            // 下边缘
            ctx.lineTo(hpAreaX + 45, hpAreaY + hpAreaHeight);
            // 左下斜切回起点
            ctx.lineTo(hpAreaX + 8, hpAreaY + hpAreaHeight / 2);
            ctx.closePath();
            ctx.clip();

            // 绘制血量背景（深灰色，与玩家HP/MP容器一致）
            ctx.fillStyle = '#555555';
            ctx.fillRect(hpAreaX, hpAreaY, hpAreaWidth, hpAreaHeight);

            // 绘制实际当前血量（桔红色）
            if (finalActualHpPercent > 0) {
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(hpAreaX, hpAreaY, hpAreaWidth * finalActualHpPercent, hpAreaHeight);
            }

            // 绘制损失的血量（白色，在显示血量和实际血量之间）
            if (!boss.hpBarEntry.active && boss.hpAnimation.active && finalDisplayHpPercent > finalActualHpPercent) {
                const lostHpWidth = hpAreaWidth * (finalDisplayHpPercent - finalActualHpPercent);
                const lostHpX = hpAreaX + hpAreaWidth * finalActualHpPercent;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(lostHpX, hpAreaY, lostHpWidth, hpAreaHeight);
            }

            // 恢复状态
            ctx.restore();

            // 绘制血条素材（覆盖在血量上）- 也应用入场动画位移
            ctx.save();
            ctx.translate(0, entryOffsetY);
            if (assets.bossHpBar.complete && assets.bossHpBar.naturalWidth > 0) {
                ctx.drawImage(assets.bossHpBar, barX, barY, barWidth, barHeight);
            }
            ctx.restore();
        }

        // 绘制Boss子弹
        function drawBossBullets() {

        // 绘制Boss导弹
        function drawBossMissiles() {
            // 调试日志
            if (!window.bossMissileDebugLogged) {
                console.log('drawBossMissiles 被调用, bossMissiles数量:', bossMissiles.length);
                window.bossMissileDebugLogged = true;

                    drawBossMissileTail(missile);
                    ctx.drawImage(assets.bossMissile, -missile.height / 2, -missile.width / 2, missile.height, missile.width);

                    ctx.save();
                    ctx.translate(missile.x + missile.width / 2, missile.y + missile.height / 2);
                    ctx.rotate(missile.angle);
                    ctx.fillRect(-missile.width / 2, -missile.height / 2, missile.width, missile.height);
                    ctx.restore();
                }
